<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>CMA 2次 完全攻略</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=JetBrains+Mono:wght@400;600&display=swap');

/* ── ROOT VARS ── */
:root {
  --bg: #07090f;
  --s1: #0d1118;
  --s2: #111722;
  --s3: #18202e;
  --border: #1e2a3e;
  --border2: #263450;
  --acc: #3b6ef5;
  --acc2: #5585ff;
  --acc3: #7da4ff;
  --gold: #f5a623;
  --gold2: #fbbe45;
  --green: #0fb981;
  --green2: #34d399;
  --red: #f04747;
  --cyan: #06c0d4;
  --purple: #9061f9;
  --t1: #dde4f5;
  --t2: #8896b8;
  --t3: #3d4d70;
  --mono: 'JetBrains Mono', monospace;
  --tab-h: 64px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --hd-h: 52px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { height: 100%; overflow: hidden; }
body {
  height: 100%; overflow: hidden;
  background: var(--bg); color: var(--t1);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 14px; line-height: 1.65;
  -webkit-font-smoothing: antialiased;
}

/* ── SHELL ── */
#shell { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }

/* ── HEADER ── */
#hd {
  height: var(--hd-h); flex-shrink: 0;
  background: var(--s1); border-bottom: 1px solid var(--border2);
  display: flex; align-items: center; gap: 10px; padding: 0 16px;
  padding-top: env(safe-area-inset-top, 0);
  position: relative; z-index: 100;
}
#hd::after {
  content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--acc) 40%, var(--cyan) 60%, transparent);
  opacity: .45;
}
.hd-logo { display: flex; align-items: center; gap: 8px; }
.hd-mark {
  width: 28px; height: 28px; border-radius: 7px; flex-shrink: 0;
  background: linear-gradient(135deg, var(--acc), var(--cyan));
  display: flex; align-items: center; justify-content: center; font-size: 14px;
}
.hd-title {
  font-weight: 900; font-size: 13px; white-space: nowrap;
  background: linear-gradient(90deg, var(--acc3), var(--cyan));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.hd-sp { flex: 1; }
.hd-search-wrap { position: relative; }
.hd-search {
  background: var(--s2); border: 1px solid var(--border2);
  border-radius: 18px; padding: 6px 12px 6px 32px;
  color: var(--t1); font-size: 13px; width: 160px; outline: none;
  font-family: 'Noto Sans JP', sans-serif; transition: width .25s, border-color .2s;
}
.hd-search:focus { border-color: var(--acc); width: 220px; }
.hd-search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--t3); font-size: 13px; pointer-events: none; }
.hd-menu-btn {
  width: 36px; height: 36px; border-radius: 8px;
  background: var(--s2); border: 1px solid var(--border2);
  color: var(--t2); font-size: 16px; display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all .15s; flex-shrink: 0;
}
.hd-menu-btn:hover { border-color: var(--acc); color: var(--acc3); }

/* ── MAIN AREA ── */
#main {
  flex: 1; overflow: hidden; display: flex;
  min-height: 0;
}

/* ── SIDEBAR (desktop) ── */
#sidebar {
  width: 240px; min-width: 240px;
  background: var(--s1); border-right: 1px solid var(--border);
  overflow-y: auto; flex-shrink: 0;
}
#sidebar::-webkit-scrollbar { width: 3px; }
#sidebar::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

.sb-top {
  padding: 10px 12px 6px;
  font-size: 9px; font-weight: 900; letter-spacing: .12em; color: var(--t3); text-transform: uppercase;
  border-bottom: 1px solid var(--border);
}
.sb-home {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 14px; cursor: pointer;
  font-size: 12px; font-weight: 700; color: var(--t2);
  border-bottom: 1px solid var(--border); transition: all .15s;
}
.sb-home:hover, .sb-home.on { color: var(--acc3); background: rgba(59,110,245,.08); }

.ch-block { }
.ch-hd {
  display: flex; align-items: center; gap: 7px;
  padding: 9px 14px; cursor: pointer;
  font-size: 10px; font-weight: 900; letter-spacing: .1em; color: var(--t3); text-transform: uppercase;
  border-bottom: 1px solid var(--border); user-select: none;
  position: sticky; top: 0; background: var(--s1); z-index: 5; transition: color .15s;
}
.ch-hd:hover { color: var(--t2); }
.ch-bar { width: 3px; height: 12px; border-radius: 2px; flex-shrink: 0; }
.ch-hd-name { flex: 1; }
.ch-hd-cnt { font-size: 9px; font-weight: 400; }
.ch-hd-arr { font-size: 9px; transition: transform .2s; }
.ch-hd.open .ch-hd-arr { transform: rotate(90deg); }
.ch-units { display: none; }
.ch-units.open { display: block; }
.unit-btn {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 14px 8px 20px; cursor: pointer;
  font-size: 11.5px; color: var(--t2); border-bottom: 1px solid var(--border);
  transition: all .15s; border-left: 2px solid transparent;
}
.unit-btn:hover { background: var(--s2); color: var(--t1); }
.unit-btn.on { color: var(--t1); background: rgba(59,110,245,.1); border-left-color: var(--acc); }
.unit-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
.unit-btn.on .unit-dot { background: var(--acc) !important; }
.unit-btn-name { flex: 1; }
.unit-btn-cnt { font-size: 10px; color: var(--t3); }

/* ── CONTENT ── */
#content {
  flex: 1; overflow-y: auto; min-width: 0;
  padding-bottom: calc(var(--tab-h) + var(--safe-bottom) + 16px);
}
#content::-webkit-scrollbar { width: 4px; }
#content::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

/* ── TAB BAR ── */
#tabbar {
  flex-shrink: 0; height: calc(var(--tab-h) + var(--safe-bottom));
  background: var(--s1); border-top: 1px solid var(--border2);
  display: flex; align-items: stretch;
  padding-bottom: var(--safe-bottom);
  position: relative; z-index: 100;
}
#tabbar::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--acc) 40%, var(--cyan) 60%, transparent);
  opacity: .3;
}
.tab-item {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 4px; cursor: pointer; padding: 6px 4px;
  transition: all .15s; position: relative; color: var(--t3);
  -webkit-tap-highlight-color: transparent;
}
.tab-item.on { color: var(--acc3); }
.tab-item:active { opacity: .7; }
.tab-icon { font-size: 20px; line-height: 1; }
.tab-label { font-size: 10px; font-weight: 700; letter-spacing: .02em; white-space: nowrap; }
.tab-item.on .tab-label { color: var(--acc3); }
.tab-indicator {
  position: absolute; top: 0; left: 20%; right: 20%; height: 2px;
  background: var(--acc); border-radius: 0 0 2px 2px; opacity: 0;
  transition: opacity .2s;
}
.tab-item.on .tab-indicator { opacity: 1; }

/* ── PAGES ── */
.page { display: none; }
.page.active { display: block; animation: fadeUp .22s ease; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

/* ── OVERVIEW (Theory home) ── */
.ov-wrap { padding: 20px 16px; max-width: 800px; margin: 0 auto; }
.ov-hero {
  background: linear-gradient(135deg, var(--s2), var(--s3));
  border: 1px solid var(--border2); border-radius: 14px;
  padding: 20px; margin-bottom: 20px;
}
.ov-hero-title {
  font-size: 20px; font-weight: 900; margin-bottom: 4px;
  background: linear-gradient(135deg, var(--t1), var(--acc3));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.ov-hero-sub { color: var(--t2); font-size: 12px; line-height: 1.7; margin-bottom: 16px; }
.ov-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
.ov-stat { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px; text-align: center; }
.ov-stat-n { font-size: 22px; font-weight: 900; line-height: 1;
  background: linear-gradient(135deg, var(--acc3), var(--cyan));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 2px; }
.ov-stat-l { font-size: 9px; color: var(--t3); }

.ov-ch-title {
  font-size: 10px; font-weight: 900; letter-spacing: .1em; text-transform: uppercase;
  color: var(--t3); margin: 16px 0 8px; padding-left: 4px;
}
.ov-unit-grid { display: grid; gap: 8px; }
.ov-unit-card {
  background: var(--s1); border: 1px solid var(--border); border-radius: 10px;
  padding: 12px 14px; display: flex; align-items: center; gap: 10px;
  cursor: pointer; transition: all .15s; -webkit-tap-highlight-color: transparent;
}
.ov-unit-card:active { opacity: .75; transform: scale(.98); }
.ov-unit-card:hover { border-color: var(--border2); transform: translateX(2px); }
.ov-unit-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.ov-unit-info { flex: 1; min-width: 0; }
.ov-unit-name { font-size: 12px; font-weight: 700; }
.ov-unit-cnt { font-size: 10px; color: var(--t3); margin-top: 1px; }
.ov-unit-arr { color: var(--t3); font-size: 11px; flex-shrink: 0; }

/* ── UNIT PAGE ── */
.unit-wrap { padding: 0; }
.unit-hd {
  position: sticky; top: 0; z-index: 10;
  background: var(--bg); border-bottom: 1px solid var(--border);
  padding: 12px 16px 10px;
}
.unit-hd-eyebrow { font-size: 9px; font-weight: 900; letter-spacing: .12em; text-transform: uppercase; margin-bottom: 2px; }
.unit-hd-title { font-size: 17px; font-weight: 900; line-height: 1.25; }
.unit-hd-meta { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
.unit-hd-cnt { font-size: 10px; color: var(--t3); }
.unit-expand-btn {
  padding: 3px 10px; border-radius: 12px; font-size: 10px; font-weight: 700;
  cursor: pointer; border: 1px solid var(--border2); color: var(--t2); background: var(--s2);
  transition: all .15s;
}
.unit-expand-btn:active { opacity: .7; }
.unit-content { padding: 12px 16px; }

.section-label {
  font-size: 10px; font-weight: 900; letter-spacing: .1em; text-transform: uppercase;
  color: var(--t3); margin: 4px 0 10px; display: flex; align-items: center; gap: 8px;
}
.section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* ── CONCEPT CARD ── */
.cc {
  background: var(--s1); border: 1px solid var(--border);
  border-radius: 12px; margin-bottom: 10px; overflow: hidden;
  transition: border-color .2s;
}
.cc-hd {
  display: flex; align-items: center; gap: 10px;
  padding: 13px 14px; cursor: pointer; user-select: none;
  -webkit-tap-highlight-color: transparent;
}
.cc-hd:active { opacity: .8; }
.cc-icon {
  width: 32px; height: 32px; border-radius: 8px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; font-size: 15px;
}
.cc-info { flex: 1; min-width: 0; }
.cc-name { font-size: 13px; font-weight: 700; line-height: 1.3; }
.cc-tag {
  display: inline-block; margin-top: 3px;
  font-size: 9px; font-weight: 700; padding: 1px 7px; border-radius: 8px;
}
.cc-tag.freq { background: rgba(240,71,71,.18); color: #ff8080; }
.cc-tag.std { background: rgba(59,110,245,.18); color: var(--acc3); }
.cc-tag.adv { background: rgba(144,97,249,.18); color: #c4b0ff; }
.cc-arr { color: var(--t3); font-size: 10px; flex-shrink: 0; transition: transform .2s; }
.cc.open .cc-arr { transform: rotate(90deg); }

/* ── ARTICLE (concept body) ── */
.cc-body { display: none; }
.cc.open .cc-body { display: block; }
.cc-article {
  padding: 0 14px 16px;
  border-top: 1px solid var(--border);
}

/* SECTION HEADERS inside article */
.art-sec {
  display: flex; align-items: center; gap: 8px;
  padding: 12px 0 6px; font-size: 10px; font-weight: 900;
  letter-spacing: .1em; text-transform: uppercase;
}
.art-sec-icon { font-size: 13px; }

/* INTUITION */
.art-intuition {
  background: linear-gradient(135deg, rgba(15,185,129,.08), rgba(6,192,212,.04));
  border: 1px solid rgba(15,185,129,.22); border-left: 3px solid var(--green);
  border-radius: 10px; padding: 13px 14px; margin-bottom: 12px;
  font-size: 13px; line-height: 1.8; color: var(--t1);
}
.art-intuition-label {
  font-size: 9px; font-weight: 900; color: var(--green2);
  letter-spacing: .12em; text-transform: uppercase; margin-bottom: 6px;
}

/* FORMULA */
.art-formula {
  background: var(--s2); border: 1px solid var(--border2);
  border-left: 3px solid var(--acc);
  border-radius: 10px; padding: 13px 14px; margin-bottom: 12px;
  font-family: var(--mono); font-size: 12px; line-height: 1.9;
  white-space: pre-wrap; color: var(--acc3); overflow-x: auto;
}
.art-formula-label {
  font-size: 9px; font-weight: 900; color: var(--acc3);
  letter-spacing: .12em; text-transform: uppercase; margin-bottom: 6px;
  font-family: 'Noto Sans JP', sans-serif;
}

/* EXAMPLE */
.art-example {
  background: linear-gradient(135deg, rgba(59,110,245,.07), rgba(144,97,249,.04));
  border: 1px solid rgba(59,110,245,.22); border-left: 3px solid var(--acc2);
  border-radius: 10px; padding: 13px 14px; margin-bottom: 12px;
  font-size: 13px; line-height: 1.8;
}
.art-example-label {
  font-size: 9px; font-weight: 900; color: var(--acc3);
  letter-spacing: .12em; text-transform: uppercase; margin-bottom: 6px;
}

/* WARN */
.art-warn {
  background: rgba(240,71,71,.07);
  border: 1px solid rgba(240,71,71,.22); border-left: 3px solid var(--red);
  border-radius: 10px; padding: 13px 14px; margin-bottom: 12px;
  font-size: 13px; line-height: 1.8; color: var(--t2);
}
.art-warn-label {
  font-size: 9px; font-weight: 900; color: #ff8080;
  letter-spacing: .12em; text-transform: uppercase; margin-bottom: 6px;
}

/* TIP */
.art-tip {
  background: rgba(245,166,35,.07);
  border: 1px solid rgba(245,166,35,.22); border-left: 3px solid var(--gold);
  border-radius: 10px; padding: 13px 14px; margin-bottom: 12px;
  font-size: 13px; line-height: 1.8; color: var(--t2);
}
.art-tip-label {
  font-size: 9px; font-weight: 900; color: var(--gold2);
  letter-spacing: .12em; text-transform: uppercase; margin-bottom: 6px;
}

/* STEPS */
.art-steps { margin-bottom: 12px; }
.art-step { display: flex; gap: 10px; margin-bottom: 8px; align-items: flex-start; }
.art-step-n {
  width: 22px; height: 22px; border-radius: 50%; flex-shrink: 0;
  background: var(--acc); color: #fff; font-size: 10px; font-weight: 700;
  display: flex; align-items: center; justify-content: center; margin-top: 1px;
}
.art-step-t { font-size: 13px; line-height: 1.65; flex: 1; }

/* TABLE */
.art-table-wrap { overflow-x: auto; margin-bottom: 12px; -webkit-overflow-scrolling: touch; }
.art-table {
  width: 100%; border-collapse: collapse; font-size: 12px; min-width: 320px;
}
.art-table th {
  background: var(--s2); padding: 8px 10px; text-align: left;
  border: 1px solid var(--border2); color: var(--t2); font-weight: 700; white-space: nowrap;
}
.art-table td {
  padding: 8px 10px; border: 1px solid var(--border);
  vertical-align: top; line-height: 1.55;
}
.art-table tr:nth-child(even) td { background: rgba(255,255,255,.015); }

/* ── DRAWER (mobile unit nav) ── */
#drawer-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6);
  z-index: 300; backdrop-filter: blur(4px);
}
#drawer-overlay.open { display: block; }
#drawer {
  position: fixed; top: 0; left: 0; bottom: 0; width: 80%; max-width: 320px;
  background: var(--s1); z-index: 301; overflow-y: auto;
  transform: translateX(-100%); transition: transform .28s cubic-bezier(.4,0,.2,1);
  padding-top: env(safe-area-inset-top, 0);
}
#drawer.open { transform: translateX(0); }
#drawer::-webkit-scrollbar { width: 3px; }
#drawer::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
.drawer-hd {
  display: flex; align-items: center; gap: 8px; padding: 16px 14px 10px;
  border-bottom: 1px solid var(--border2);
}
.drawer-hd-title { flex: 1; font-size: 13px; font-weight: 900; color: var(--acc3); }
.drawer-close {
  width: 30px; height: 30px; border-radius: 8px; background: var(--s2);
  border: 1px solid var(--border2); color: var(--t2);
  display: flex; align-items: center; justify-content: center; font-size: 16px;
  cursor: pointer;
}

/* ── DRILL PAGE ── */
.drill-wrap { padding: 16px; max-width: 680px; margin: 0 auto; }
.drill-header { margin-bottom: 16px; }
.drill-filter-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
.df-btn {
  padding: 5px 12px; border-radius: 14px; font-size: 11px; font-weight: 700;
  cursor: pointer; border: 1px solid var(--border2); color: var(--t2); background: var(--s2);
  transition: all .15s;
}
.df-btn.on { background: var(--acc); color: #fff; border-color: var(--acc); }

.drill-card {
  background: var(--s1); border: 1px solid var(--border);
  border-radius: 14px; padding: 20px; margin-bottom: 16px;
}
.drill-progress-row { display: flex; gap: 4px; margin-bottom: 16px; }
.dp-dot {
  flex: 1; height: 4px; border-radius: 2px; background: var(--border2); transition: background .3s;
}
.dp-dot.done { background: var(--green); }
.dp-dot.curr { background: var(--acc2); }
.dp-dot.wrong { background: var(--red); }

/* PQ filter scrollable on mobile */
#pq-filter-row { overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 4px; }
#pq-filter-row::-webkit-scrollbar { display: none; }

.drill-unit-badge {
  display: inline-block; font-size: 10px; font-weight: 700; padding: 2px 9px;
  border-radius: 10px; background: var(--s2); border: 1px solid var(--border2);
  color: var(--t2); margin-bottom: 10px;
}
.drill-q { font-size: 14px; line-height: 1.8; margin-bottom: 16px; font-weight: 500; }
.drill-choices { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
.drill-choice {
  padding: 13px 14px; border-radius: 10px; border: 1px solid var(--border2);
  cursor: pointer; font-size: 13px; line-height: 1.6; display: flex; gap: 10px;
  transition: all .15s; align-items: flex-start;
  -webkit-tap-highlight-color: transparent;
}
.drill-choice:hover:not(.locked) { border-color: var(--acc); background: rgba(59,110,245,.07); }
.drill-choice:active:not(.locked) { opacity: .8; }
.drill-choice.correct { border-color: var(--green); background: rgba(15,185,129,.1); }
.drill-choice.wrong { border-color: var(--red); background: rgba(240,71,71,.08); }
.dc-key {
  width: 24px; height: 24px; border-radius: 6px; flex-shrink: 0;
  background: var(--s2); display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; margin-top: 1px;
}
.drill-choice.correct .dc-key { background: var(--green); color: #fff; }
.drill-choice.wrong .dc-key { background: var(--red); color: #fff; }
.dc-text { flex: 1; }

.drill-exp {
  background: var(--s2); border: 1px solid var(--border2); border-left: 3px solid var(--acc);
  border-radius: 10px; padding: 12px 14px;
  font-size: 12.5px; line-height: 1.75; display: none; margin-bottom: 14px;
}
.drill-exp.show { display: block; }
.drill-exp-label { font-size: 9px; font-weight: 900; color: var(--acc3); letter-spacing: .1em; margin-bottom: 5px; }

.drill-actions { display: flex; gap: 8px; justify-content: flex-end; }
.drill-btn {
  padding: 10px 22px; border-radius: 10px; font-size: 13px; font-weight: 700;
  cursor: pointer; border: none; transition: all .15s; font-family: 'Noto Sans JP', sans-serif;
}
.drill-btn.primary { background: var(--acc); color: #fff; }
.drill-btn.primary:active { opacity: .85; }
.drill-btn.ghost { background: var(--s2); color: var(--t1); border: 1px solid var(--border2); }
.drill-btn.ghost:active { opacity: .8; }

.score-card { text-align: center; padding: 40px 20px; }
.score-num {
  font-size: 72px; font-weight: 900; line-height: 1;
  background: linear-gradient(135deg, var(--gold), var(--acc3));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 6px;
}
.score-sub { font-size: 14px; color: var(--t2); margin-bottom: 12px; }
.score-msg { font-size: 18px; font-weight: 700; margin-bottom: 24px; }

const CHAPTERS = [

  {id:'u1_2', ch:'ch1', name:'1-2 パフォーマンス評価'},
  {id:'u1_3', ch:'ch1', name:'1-3 債券分析と債券PF戦略'},
  {id:'u1_4', ch:'ch1', name:'1-4 デリバティブ分析と投資戦略'},
  {id:'u1_5', ch:'ch1', name:'1-5 投資政策とアセットアロケーション'},
  {id:'u1_6', ch:'ch1', name:'1-6 国際証券投資'},
  {id:'u1_7', ch:'ch1', name:'1-7 オルタナティブ投資'},

  {id:'u2_2', ch:'ch2', name:'2-2 会計制度（IFRS・日本基準）'},
  {id:'u2_3', ch:'ch2', name:'2-3 財務諸表分析'},
  {id:'u3_1', ch:'ch3', name:'3-1 マクロ経済学と金融政策'},
  {id:'u3_2', ch:'ch3', name:'3-2 国際金融'},
  {id:'u3_3', ch:'ch3', name:'3-3 ミクロ経済学'},
  {id:'u4_1', ch:'ch4', name:'4-1 職業倫理・行動基準'},

// ── CONCEPTS (full data) ──
const CONCEPTS = [
{unit:'u1_1',id:'ddm',name:'DDM（配当割引モデル）',tag:'freq',icon:'💰',color:'#3b6ef5',
intuition:`株式の価値 ＝ 「将来もらえる配当を今の価値に直したもの」の合計。\n\n1円の配当でも、10年後よりも1年後の方が価値が高い。割引率（Ke）が高いほど将来配当の現在価値は低い→株価は下がる。\n\nGordon成長モデルは「配当が毎年g%ずつ永遠に増える」という仮定。シンプルだが強力。`,
formula:`定率成長DDM（Gordonモデル）：\nP₀ = D₁ / (Ke − g)\n\nD₁ = D₀ × (1+g)  ← 来期配当\nKe  = 株主資本コスト\ng   = ROE × 内部留保率 = ROE × (1 − 配当性向)\n\nPERとの関係：\nP₀/E₁ = 配当性向 / (Ke − g)`,
example:`EPS₁=100円、配当性向40%、ROE=15%、Ke=10%\ng = 15% × (1−0.4) = 9%\nD₁ = 100 × 0.4 = 40円\nP₀ = 40 / (0.10 − 0.09) = 4,000円\n\nKe↑ → P₀↓（割引率↑→株価↓）\ng↑  → P₀↑（成長期待↑→株価↑）`,
warn:`Ke>g でなければ計算不可（分母がゼロ・マイナス）\ng=ROE×留保率：内部留保を同じROEで再投資する仮定\n配当性向ではなく「留保率（1−配当性向）」をgに使う`,
tip:`「PBR＞1の企業は将来RI＞0を市場が期待」という論点も頻出。\nROE＞KeならPBR＞1。`},

{unit:'u1_1',id:'capm',name:'CAPM（資本資産評価モデル）',tag:'freq',icon:'📈',color:'#5585ff',
intuition:`「リスクに見合うリターンとはいくらか？」に答える公式。\n\n分散投資で消せるリスク（固有リスク）は報われない。消せないリスク（β=市場リスク）だけが報われる。\n\nβ＞1：市場より大きく動く　β＜1：市場より小さく動く　β＝0：無リスク資産`,
formula:`E(Ri) = Rf + βi × (E(Rm) − Rf)\n         ↑      ↑           ↑\n     無リスク金利  ベータ   市場リスクプレミアム\n\nβ = Cov(Ri,Rm)/Var(Rm) = ρ × (σi/σm)\n\nジェンセンα：α = Rp − CAPM期待リターン`,
example:`Rf=2%, E(Rm)=8%, β=1.5\nE(R) = 2% + 1.5×(8%−2%) = 11%\n\nβ計算：ρ=0.7, σi=20%, σm=12%\nβ = 0.7×(20/12) = 1.17`,
warn:`CML：σ（全リスク）でプロット → 分散済みPFのみ\nSML：β でプロット → すべての資産\nCMLはSMLの特殊ケース`,
tip:`アンレバードβ（事業リスクのみ）：βU = βL / [1+(1−t)×D/E]`},

{unit:'u1_1',id:'multifactor',name:'マルチファクターモデル・APT',tag:'std',icon:'🧩',color:'#7da4ff',
intuition:`CAPMは「市場1ファクター」だけで説明。でも実際のリターンは景気・金利・規模・割安度など複数の要因で動く。\n\nAPT：複数ファクターのβ×リスクプレミアムの合計が期待リターン。`,
formula:`APT：E(Ri) = Rf + β₁λ₁ + β₂λ₂ + … + βkλk\nλk：ファクターのリスクプレミアム\n\nFama-French 3ファクター：\nE(R) = Rf + βmkt×MRP + βSMB×SMB + βHML×HML\nSMB=小型−大型、HML=バリュー−グロース`,
example:`βmkt=1.0(λ=5%), βSMB=0.5(λ=3%), Rf=2%\nE(R) = 2%+1.0×5%+0.5×3% = 8.5%`,
warn:`APTはCAPMの一般化。裁定機会がない→APT成立\nファクターリスクは体系的リスク（分散不能）`},

{unit:'u1_1',id:'residual',name:'残余利益（RI）・EVA',tag:'std',icon:'💎',color:'#3b6ef5',
intuition:`純利益がプラスでも「株主の期待リターン」を下回れば価値を破壊している。\n\nRI = 株主の期待を超えた超過利益\nEVA = 全投下資本コストを超えた超過利益\n\nRI＞0 ⟺ ROE＞Ke ⟺ PBR＞1`,
formula:`RI = 純利益 − Ke × 期首株主資本\n\n株式内在価値（RI法）：\nV = 現在BPS + Σ[RIt/(1+Ke)^t]\n\nEVA = NOPAT − WACC × 投下資本`,
example:`純利益120億, Ke=10%, 期首株主資本800億\nRI = 120−10%×800 = 40億円（価値創造）\n\nNOPAT=150, WACC=8%, 投下資本1500億\nEVA = 150−8%×1500 = 30億円`,
warn:`「利益プラス=RI>0」ではない。コストとの比較が必要\nRIはKe超過分、EVAはWACC超過分`},

{unit:'u1_1',id:'stock_strategy',name:'株式PF戦略（アクティブ vs パッシブ）',tag:'std',icon:'⚔️',color:'#5585ff',
intuition:`アクティブ：「私は市場より賢い」→ 銘柄選択でベンチマークに勝つ\nパッシブ：「市場は効率的」→ インデックスに連動\n\n効率的市場仮説（EMH）：弱形→準強形→強形の3段階。`,
formula:`EMH（効率的市場仮説）：\n弱形：過去株価は織り込み済み（テクニカル無効）\n準強形：公開情報は織り込み済み（FA無効）\n強形：インサイダー情報も織り込み済み\n\nIR = IC × √BR × TC\n（IC=情報係数、BR=予測回数、TC=制約度）`,
warn:`IRが高くてもTCが低い（制約多）と実際のαは小さい\nアクティブリスク=TE（トラッキングエラー）`},

{unit:'u1_2',id:'sharpe',name:'シャープ・トレイナー・ジェンセンα',tag:'freq',icon:'📊',color:'#0fb981',
intuition:`3つの指標は「何をリスクとみなすか」が違う。\n\nシャープ：全リスク（σ） → 非分散PFや唯一の投資資産\nトレイナー：体系的リスク（β） → 分散済みPFの一部\nジェンセンα：CAPMとの差（絶対額）`,
formula:`シャープ：SR = (Rp−Rf) / σp\nトレイナー：TR = (Rp−Rf) / βp\nジェンセンα：α = Rp − [Rf + β×(Rm−Rf)]\nIR：IR = (Rp−Rb) / TE`,
example:`Rp=12%, Rf=2%, σp=15%, βp=0.8, Rm=10%\nSR = (12−2)/15 = 0.67\nTR = (12−2)/0.8 = 12.5%\nα  = 12%−[2%+0.8×8%] = 3.6%`,
warn:`R²が低い場合→シャープが適切（未分散リスク大）\nR²が高い場合→シャープ≈トレイナー順位`,
tip:`「BM比較→IR」「絶対評価→シャープ」「完全分散前提→トレイナー」`},

{unit:'u1_2',id:'bhb',name:'BHB帰属分析（パフォーマンス帰属）',tag:'freq',icon:'🔬',color:'#34d399',
intuition:`超過リターンがどこから来たか？を3つに分解する。\n\n配分効果：ウェイト配分の巧拙\n選択効果：各セクター内の銘柄選択の巧拙\n交互効果：配分×選択の組み合わせ`,
formula:`配分：Aᵢ = (wPᵢ−wBᵢ) × (RBᵢ−RB)\n選択：Sᵢ = wBᵢ × (RPᵢ−RBᵢ)\n交互：Iᵢ = (wPᵢ−wBᵢ) × (RPᵢ−RBᵢ)\n\n合計 = Rp − Rb（アクティブリターン）`,
example:`株式：wB=50%, wP=60%, RB株=8%, RP株=10%, RB全=6%\n配分：(60−50)%×(8−6)% = +0.20%\n選択：50%×(10−8)% = +1.00%\n交互：(60−50)%×(10−8)% = +0.20%`,
warn:`配分効果：「セクターBM−全体BM」（セクターBMだけではない）\n選択効果：BMのウェイトを使う（PFのウェイトではない）`},

{unit:'u1_2',id:'twrr_mwrr',name:'TWRR vs MWRR（時間加重 vs 金額加重）',tag:'freq',icon:'⏱️',color:'#0fb981',
intuition:`いつ資金を入れたかでリターンが変わる問題。\n\nTWRR：各期リターンの幾何平均 → 外部CF影響を除去 → 運用能力評価に最適\nMWRR：実際の資金量を反映したIRR → 投資家の実体験`,
formula:`TWRR：TWR = (1+R₁)×(1+R₂)×…×(1+Rn) − 1\n各Rは外部CF直前の時点で計算\n\nMWRR（IRR）：Σ[CFt/(1+r)^t] = 0 → rを解く`,
example:`t1年度リターン高、t2年度リターン低：\n・t1年度末に大きな資金流出\n・t1の運用資金が大きい\n→ MWRR > TWRR（資金多い時期のリターンが高い）`,
warn:`「MWRR>TWRR → 資金多い時期のリターンが高かった」\n年金基金評価 → TWRR（外部CFをコントロールできないため）`,
tip:`個人投資家の実際のリターン体験 → MWRR が適切`},

{unit:'u1_2',id:'tracking',name:'トラッキングエラー・IR・アクティブリスク',tag:'freq',icon:'🎯',color:'#34d399',
intuition:`アクティブ運用の「リスクとリターン」はベンチマークとの差で測る。\n\nTE（トラッキングエラー）= アクティブリターンの標準偏差\nIR（情報比）= アクティブリターン÷TE → 単位リスクあたりの超過リターン`,
formula:`アクティブリターン：Ra = Rp − Rb\n\nTE = σ(Rp−Rb) = √[Σ(Ra,t−R̄a)²/(n−1)]\n年率換算：月次TE × √12\n\nIR = E(Ra) / TE\nIR検定：t = IR × √T（T：年数）`,
example:`月次Ra：+1%, −0.5%, +0.8%, −0.3%, +0.5%\n平均Ra=0.5%, 月次TE≈0.60%\n年率TE = 0.60%×√12 ≈ 2.08%`,
warn:`リターン年率化：×12　TE年率化：×√12（異なるスケール）\nIR=0.5を5年検定：t=0.5×√5=1.12→有意でない`},

{unit:'u1_3',id:'duration',name:'修正デュレーション・コンベクシティ',tag:'freq',icon:'📉',color:'#3b6ef5',
intuition:`デュレーション＝「金利が1%変化したとき価格が何%変化するか」の感応度。\n\n修正D=5年→「金利+1%で価格約−5%」\nコンベクシティ＝デュレーションの誤差補正。大きいほど有利（金利低下時の上昇が大きく、上昇時の下落が小さい）。`,
formula:`D_mod = マコーレーD / (1 + y/m)\n\nΔP/P ≈ −D_mod×Δy + ½×Conv×(Δy)²\n         デュレーション項  コンベクシティ項\n\nDV01 = D_mod × P × 0.0001`,
example:`D_mod=5, Conv=30, Δy=+2%\nΔP/P ≈ −5×0.02 + ½×30×0.02²\n      = −10% + 0.6% = −9.4%\n（D単独では−10%、コンベクシティで補正）`,
warn:`マコーレーD→修正D：÷(1+y/m)\nコンベクシティは常に正（∵価格-利回り関係は上に凸）`},

{unit:'u1_3',id:'yield_curve',name:'イールドカーブ・スポット・フォワードレート',tag:'freq',icon:'〰️',color:'#5585ff',
intuition:`スポット：今から始まるn年間の利回り\nフォワード：将来開始の投資の（今の）期待利回り\n\n重要な関係：(1+s₂)² = (1+s₁) × (1+₁f₂)\n「2年投資」=「1年投資」×「1年後から1年投資」`,
formula:`フォワードレート：\n₁f₂ = (1+s₂)² / (1+s₁) − 1\n\n純粋期待仮説：フォワード = 将来スポットの期待値\n流動性プレミアム仮説：フォワード > 期待スポット`,
example:`s₁=2%, s₂=3%\n₁f₂ = (1.03)²/1.02 − 1 = 1.0609/1.02−1 = 4.01%\n\n解釈：1年後から始まる1年投資の現在期待利回り4.01%`,
warn:`流動性プレミアム：フォワード > 期待スポット（上乗せ分あり）\nブートストラッピング：クーポン債からスポットを逐次計算`},

{unit:'u1_3',id:'spread',name:'スプレッド分析（OAS・CDS）',tag:'std',icon:'📏',color:'#7da4ff',
intuition:`クレジットスプレッド = 信用リスクへの上乗せ利回り。\n\nOAS：コールオプション価値を除いた純粋なクレジットスプレッド\nCDS：デフォルト保険。プレミアム≈PD×LGD`,
formula:`スプレッド ≈ PD × LGD\nPD：デフォルト確率　LGD：デフォルト時損失率\n\nOAS = 名目スプレッド − オプションコスト`,
example:`スプレッド=2%, LGD=60%\nPD ≈ 2%/60% = 3.33%/年`,
warn:`コーラブル債：ネガティブコンベクシティ（金利低下時の価格上昇が限定）\nOASでノンコーラブル債と比較可能`},

{unit:'u1_3',id:'bond_strategy',name:'債券PF戦略（ラダー・バーベル・ブレット）',tag:'std',icon:'🏹',color:'#3b6ef5',
intuition:`3つのスタイルはデュレーションが同じでもコンベクシティが異なる。\n\nバーベル：短期+長期集中 → コンベクシティが最大（有利）\nブレット：中期集中 → コンベクシティが最小\nラダー：均等 → 中間`,
compare:{headers:['型','構成','コンベクシティ','特徴'],rows:[
['ラダー','各年限に均等','中','再投資リスク分散'],
['バーベル','短期+長期集中','高（有利）','パラレルシフトで最も有利'],
['ブレット','中期集中','低','フラット化に相対的に有利'],
]},
warn:`「同じDのバーベル vs ブレット → コンベクシティはバーベルが高い」`},

{unit:'u1_3',id:'immunization',name:'免疫戦略・CFマッチング',tag:'std',icon:'🛡️',color:'#5585ff',
intuition:`「将来の負債を確実に賄う」ための戦略。\n\n免疫：資産D = 負債D にして金利変化の影響を相殺\nCFマッチング：負債のCFに合わせて資産CFを設計（より厳格、再投資リスクなし）`,
formula:`免疫条件3つ：\n① PV(資産) ≥ PV(負債)\n② D_mod(資産) = D_mod(負債)\n③ Conv(資産) > Conv(負債)\n\n2債券での免疫：w₁D₁ + (1−w₁)D₂ = D負債`,
example:`負債：5年後1,000万、D=5年\n2年債(D=2)と8年債(D=8)で免疫：\nw×2 + (1−w)×8 = 5 → w=0.5（50%ずつ）`,
warn:`金利変化後はDがずれる → 定期リバランスが必要\nコンベクシティ条件（③）を忘れやすい`},

{unit:'u1_4',id:'binom',name:'二項モデル（オプション評価）',tag:'freq',icon:'🌲',color:'#f97316',
intuition:`「原資産が上か下かに動く」という単純な仮定でオプションを評価。\n\nリスク中立確率：裁定機会がない価格を計算する「仮想的な確率」（実際の確率ではない）。\n\n多期間は後ろから計算（後退法）。米国型は各ノードで行使価値と継続価値を比較。`,
formula:`リスク中立確率：p = (R−d)/(u−d)　R=1+r\n\nコール価値（1期間）：\nC = [p×Cu + (1−p)×Cd] / R`,
example:`S=100, X=100, u=1.2, d=0.8, r=5%→R=1.05\np = (1.05−0.8)/(1.2−0.8) = 0.625\nSu=120→Cu=20, Sd=80→Cd=0\nC = (0.625×20+0.375×0)/1.05 ≈ 11.9円`,
warn:`pは「実際の上昇確率」ではなくリスク中立確率\n米国型プット：早期行使が有利なノードで行使価値を使う`},

{unit:'u1_4',id:'bs',name:'ブラック＝ショールズ（BS）モデル',tag:'freq',icon:'⚫',color:'#f97316',
intuition:`二項モデルの期間を無限に細かくしたのがBSモデル。\n\nN(d₁)：コールのデルタ（原資産への感応度）\nN(d₂)：満期に行使される確率（リスク中立世界）\n\nIV（インプライドV）：市場価格からBSモデルで逆算したσ。`,
formula:`C = S×N(d₁) − X×e^{−rT}×N(d₂)\nP = X×e^{−rT}×N(−d₂) − S×N(−d₁)\n\nd₁ = [ln(S/X) + (r+σ²/2)T] / (σ√T)\nd₂ = d₁ − σ√T`,
example:`S=100, X=100, r=5%, σ=20%, T=1\nd₁=0.35, d₂=0.15\nN(0.35)=0.637, N(0.15)=0.560\nC = 100×0.637−100×e^{-0.05}×0.560 ≈ 10.4円`,
warn:`前提：対数正規分布、連続取引、無配当、金利一定\n配当修正：S→S×e^{-qT}に置換`},

{unit:'u1_4',id:'greeks',name:'オプションのグリークス',tag:'freq',icon:'🏛️',color:'#f97316',
intuition:`グリークスは各変数に対するオプション価格の感応度。\n\nΔ(デルタ)：原資産変化への感応度 → ヘッジ比率として使用\nΓ(ガンマ)：デルタの変化率。ATMで最大\nΘ(シータ)：時間経過による価値減少（ロングは毎日損）\nV(ベガ)：σ変化への感応度（σ↑→コール・プット両方↑）`,
compare:{headers:['','コール','プット','特徴'],rows:[
['Δ(デルタ)','0〜+1(ATM≈+0.5)','-1〜0(ATM≈-0.5)','原資産感応度・ヘッジ比率'],
['Γ(ガンマ)','正(ATM最大)','正(ATM最大)','Δの変化速度'],
['Θ(シータ)','負(時間価値減少)','負(時間価値減少)','ロングは時間損'],
['V(ベガ)','正(σ↑→C↑)','正(σ↑→P↑)','ボラティリティ感応度'],
['ρ(ロー)','正(r↑→C↑)','負(r↑→P↓)','金利感応度'],
]},
tip:`ATMコールΔ≈0.5、ATMプットΔ≈−0.5は暗記必須`},

{unit:'u1_4',id:'pcp',name:'プット・コール・パリティ（PCP）',tag:'freq',icon:'⚖️',color:'#f97316',
intuition:`コールとプットの価格には必然的な均衡関係がある。これが崩れると裁定取引が発生し即座に修正される。\n\n変形して「合成ポジション」を作れる。`,
formula:`C + PV(X) = P + S（欧州型）\nC − P = S − X×e^{−rT}\n\n合成：\n合成コール = P + S − PV(X)\n合成プット = C − S + PV(X)\n合成先物ロング = C − P`,
example:`S=100, X=100, r=5%, T=1, PV(X)=95.24\nC=10 → P = 10+95.24−100 = 5.24円\n\nP=6（割高）→ P売り+C買い+株空売り+PV(X)投資`,
warn:`PCPは欧州型で厳密成立（米国型は≧による不等式）\n配当がある場合：C+PV(X)=P+S−PV(配当)`},

{unit:'u1_4',id:'futures',name:'先物の理論価格・裁定取引',tag:'freq',icon:'🔄',color:'#fb923c',
intuition:`先物価格 = 現物を「キャリー（保有）するコスト」で決まる。\n\nキャッシュ&キャリー裁定：先物割高 → 現物買い+先物売り → 満期に確定利益\n先物割安 → 逆裁定\nこれにより先物は理論価格に収束する。`,
formula:`F* = S × (1+r)^T − FV(配当)\n株価指数先物：F* = S × (1+r−q)^T\n（q：配当利回り）\nキャリーコスト = 資金調達コスト+保管コスト−配当`,
example:`S=1000, r=3%, T=0.5, F*=1014.9\n実際F=1030（割高）→ 裁定利益=1030−1014.9=15.1円`,
warn:`配当がある → 先物は割安（配当を先物保有者は受け取れない）`},

{unit:'u1_4',id:'swap',name:'スワップ（金利・通貨）',tag:'std',icon:'↔️',color:'#fb923c',
intuition:`スワップ = 異なるCFを交換する約束。\n\n受固払変（固定受取・変動支払）：金利上昇で不利（変動支払が増える）\n受変払固（変動受取・固定支払）：金利上昇で有利\n\n変動金利負債をヘッジしたい借手は「受固払変」を選ぶ。`,
formula:`スワップ価値（固定受取側）：\nV = PV(固定受取) − PV(変動支払)\n\nスワップレート：NPV=0となる固定金利`,
warn:`受固払変：金利上昇でスワップPV低下（不利）\n受固払変のデュレーション：長い（固定受取は長い、変動は短い）`},

{unit:'u1_5',id:'ips',name:'投資政策書（IPS）とTTLLU制約',tag:'freq',icon:'📋',color:'#06c0d4',
intuition:`「どのように投資するか」の基本ルールを文書化したもの。\nTTLLU＝5つの制約の頭文字。`,
compare:{headers:['制約','内容','例'],rows:[
['T（時間軸）','投資ホライゾン','年金=長期、引退間近=短期'],
['T（税務）','税制上の考慮','課税口座 vs 非課税'],
['L（流動性）','換金需要','大学基金=年間支出分'],
['L（法規制）','法的制約','年金規制法・信託法'],
['U（特殊事情）','個別制約','ESG制約・特定銘柄排除'],
]},
tip:`年金基金：長時間軸、大規模、流動性中程度\n保険会社：負債マッチング、流動性・規制あり\n個人：ライフステージで変化、税金重要`},

{unit:'u1_5',id:'mvo',name:'MVO（平均分散最適化）と分離定理',tag:'freq',icon:'🎯',color:'#06c0d4',
intuition:`「同じリスクで最大リターン」または「同じリターンで最小リスク」のPFの集合が効率的フロンティア。\n\n分離定理：「危険資産の最適組み合わせ（接点PF）は誰でも同じ。リスク許容度は安全資産との比率で調整」`,
formula:`PFリターン：E(Rp) = Σwi×E(Ri)\nPF分散（2資産）：\nσ²p = w₁²σ₁² + w₂²σ₂² + 2w₁w₂ρσ₁σ₂\n\n最小分散ウェイト（ρ=0）：\nw₁ = σ₂² / (σ₁² + σ₂²)`,
example:`ρ=0, σ₁=20%, σ₂=30%\nw₁ = 0.09/(0.04+0.09) = 69.2%\nσ_min ≈ 16.6%`,
warn:`最小分散：σ²（分散）を使う（σではない）\nρ=−1：完全分散消去の可能性あり`},

{unit:'u1_5',id:'saa_taa',name:'SAA・TAA（戦略的・戦術的AA）',tag:'std',icon:'🗺️',color:'#06c0d4',
intuition:`SAA：長期目標に基づくベースライン配分（投資政策書に記載）\nTAA：短期的市場見通しによる一時的な配分変更（SAAからの乖離）`,
compare:{headers:['','SAA','TAA'],rows:[
['目的','長期基準','短期超過リターン'],
['根拠','投資家の目標・制約','市場の割高/割安'],
['変更頻度','少ない','頻繁'],
]},
tip:`BHB帰属分析：SAAからの配分効果（TAA効果）と銘柄選択効果を分離して評価`},

{unit:'u1_6',id:'cip2',name:'CIP（カバー付き金利平価）',tag:'freq',icon:'🔗',color:'#3b6ef5',
intuition:`「フォワード契約を使えば2国間の金利差から裁定利益は得られない」\n\nドル金利＞円金利 → フォワードでドルが安くなる（円高）\n「高金利通貨は先物で必ず減価する」`,
formula:`F = S × (1+r_円) / (1+r_$)\n近似：F ≈ S × (1+r_円−r_$)\n\nヘッジコスト = r_$ − r_円（年率）`,
example:`S=150, 円金利0.6%, ドル金利2.0%\nF = 150×(1.006/1.020) ≈ 147.94円（円高）\nヘッジコスト = 2.0%−0.6% = 1.4%`,
warn:`円金利が分子、ドル金利が分母（逆にしやすい）\nCIPは裁定により常に成立。UIPは期待値（必ずしも成立しない）`},

{unit:'u1_6',id:'hedge_detail',name:'フルヘッジ vs ノーヘッジのリターン・リスク',tag:'freq',icon:'🛡️',color:'#5585ff',
intuition:`フルヘッジ：為替変動が除去される。リターンはヘッジコスト分だけ変わる。リスクはドル建てのまま（確定コストだからリスクなし）。\n\nノーヘッジ：リターンに為替変化率が加算。リスクはドル資産リスクと為替リスクの合成。`,
formula:`フルヘッジ：\nリターン = ドル建て + (r_円−r_$)\nリスク   = ドル建てリスク（変化なし）\n\nノーヘッジ（相関ゼロ）：\nリターン = ドル建て + 為替期待値\nリスク   = √(σ_$² + σ_為替²)`,
example:`米国債：ドル建て3%, リスク6%, 為替期待−1%, リスク8%\n\nフルヘッジ：リターン=3+(0.6−2.0)=1.6%、リスク=6.0%\nノーヘッジ：リターン=3+(−1)=2.0%、リスク=√(36+64)=10%`,
warn:`フルヘッジのリスクにヘッジコストの分散を加えてはいけない（確定値）\nノーヘッジリスクは6+8=14%ではなく√(6²+8²)=10%`},

{unit:'u1_6',id:'exposure',name:'エクスポージャーリターンの概念',tag:'freq',icon:'🎯',color:'#7da4ff',
intuition:`外国株投資は「株式エクスポージャー」と「通貨エクスポージャー」に分解できる。\n\nエクスポージャーリターン = 外国株リターン − 外国金利（評価通貨に依存しない）\n→ 円安期待が高まっても株式エクスポージャーの最適量は変わらない。`,
formula:`ヘッジなし外国株 = 株式エクスポージャー + 通貨エクスポージャー\nヘッジあり外国株 = 株式エクスポージャー（通貨なし）\n\nUIP成立時：ドル保有の超過リターン=0\n→ ヘッジなし比率をゼロにする`,
example:`円安期待↑のとき：\n株式エクスポージャー合計は不変（46%のまま）\nヘッジなし比率↑、ヘッジあり比率↓（同額）`,
warn:`「円安→米国株を増やす」は誤り\n正しくは「ヘッジなし比率を増やす」（株式配分は同じ）`},

{unit:'u1_7',id:'alt_features',name:'オルタナティブ投資の特徴と効果',tag:'freq',icon:'💼',color:'#ec4899',
intuition:`伝統的資産（株式・債券）との相関が低い → 分散効果。ポートフォリオのリターン向上またはリスク削減が期待できる。\n\nただし：低流動性・低透明性・高手数料・評価困難という難点あり。`,
compare:{headers:['種類','主な特徴','リスク'],rows:[

['不動産（REIT含む）','安定インカム・インフレヘッジ','流動性・管理コスト'],
['ヘッジファンド','多様な戦略（L/S等）','戦略複雑性・高手数料'],
['インフラ','長期安定CF','規制リスク・長期拘束'],
['商品','インフレヘッジ・低相関','価格変動・インカムなし'],
]},
tip:`2 and 20：運用報酬2%＋成功報酬20%（ヘッジファンドの典型的手数料）`},

{unit:'u1_7',id:'jcurve',name:'Jカーブ効果・PEのライフサイクル',tag:'freq',icon:'📉',color:'#ec4899',
intuition:`PEファンドのリターンはJ字型のカーブを描く。\n\n初期：投資コスト先行、企業改善中 → キャッシュアウト、リターンマイナス\n後期：IPO・M&Aで売却 → 大きなキャッシュイン、リターンプラス`,
formula:`主要指標：\nDPI = 分配金総額 / 出資金（回収済み比率）\nTVPI = (分配金+残存価値) / 出資金（総価値倍率）\n\nJカーブ：DPI/TWPIが低い期間（投資期）→\n回収期に急上昇`,
tip:`試験では「Jカーブ効果の定義」と「PE投資に固有の理由（投資先行構造）」を記述させる`},

{unit:'u1_7',id:'realestate',name:'不動産投資（REITを含む）',tag:'std',icon:'🏢',color:'#f472b6',
intuition:`不動産の価値 = NOI（純収益）の現在価値\n\nキャップレート = NOI÷不動産価値（株式のEarnings Yieldに相当）\n\nREIT：流動性が高い不動産投資手段。配当性向高く（90%以上）、金利と逆相関しやすい。`,
formula:`直接還元法：V = NOI / Cap Rate\nCap Rate = リスクフリー金利 + リスクプレミアム\n\nDCF法：V = Σ[NOIt/(1+r)^t] + 売却価格/(1+r)^n`,
warn:`Cap Rate低い → 価格高い（割高）、Cap Rate高い → 割安\n金利上昇 → Cap Rate上昇 → 不動産価値低下`},

{unit:'u1_8',id:'lifecycle',name:'ライフサイクル投資・ヒューマンキャピタル',tag:'freq',icon:'👤',color:'#a78bfa',
intuition:`若いうち：ヒューマンキャピタル（将来の労働収入のPV）が大 → 株式中心でいい\n老後：HCが小さい → 債券中心で安全性重視\n\nHCの性質も重要：安定職（公務員）=債券的HC → 金融資産は株式多めに`,
formula:`HC = Σ[将来の税引後賃金の現在価値]\n総資産 = 金融資産 + HC`,
compare:{headers:['ステージ','HC','株式比率','理由'],rows:[
['若年（20-30代）','大','高（70%+）','HC=安定→金融は株式補完'],
['壮年（40-50代）','中','中（50%前後）','バランス'],
['退職前後（60代〜）','小','低（30%以下）','金融資産で安全性確保'],
]},
warn:`「リスク許容度高い→株式多く」だけでなくHCの性質（変動性）も考慮する`},

{unit:'u2_1',id:'wacc',name:'WACC・資本コスト',tag:'freq',icon:'⚙️',color:'#0fb981',
intuition:`WACC = 「企業が資本を調達するための平均的なコスト」\n\n株主資本コスト（Ke）と負債コスト（税引後Kd）を市場価値ウェイトで加重平均。\n\nROIC > WACCなら企業価値を創造している。`,
formula:`WACC = Ke×E/(D+E) + Kd×(1−t)×D/(D+E)\n\nKe：株主資本コスト（CAPMで推定）\nKd：負債コスト（実際の支払金利）\nt：実効税率`,
example:`E=600億, D=400億, Ke=10%, Kd=4%, t=30%\nWACC = 10%×0.6 + 4%×0.7×0.4 = 6%+1.12% = 7.12%`,
warn:`負債コストは「税引後」（節税効果：利息×税率）\nWACCは市場価値ウェイト（簿価ではない）`},

{unit:'u2_1',id:'mm',name:'MM定理・資本構成と企業価値',tag:'freq',icon:'🏛️',color:'#34d399',
intuition:`MM定理：「完全市場では資本構成は企業価値に無関係」\n\n現実：\n① 節税効果（利息は損金）→ 負債↑で企業価値↑\n② 財務危機コスト → 過度な負債で価値↓\n③ トレードオフ：中程度の負債が最適`,
compare:{headers:['前提','企業価値への影響','最適資本構成'],rows:[
['完全市場（MM命題）','無関係','なし'],
['法人税あり（MM修正）','節税効果→負債↑で↑','100%負債が理論最適'],
['財務危機コストあり','過度な負債で↓','中程度の負債が最適'],
['ペッキングオーダー','内部→負債→株式の順','情報の非対称性から説明'],
]},
formula:`VL = VU + t×D（節税効果PV）\nβL = βU × [1+(1−t)×D/E]`},

{unit:'u2_1',id:'npv',name:'NPV・IRR・投資判断',tag:'freq',icon:'💹',color:'#0fb981',
intuition:`NPV = 将来FCFの現在価値 − 初期投資\nNPV>0 → 投資すべき（WACCより高いリターン）\n\nIRR = NPVをゼロにする割引率。IRR>WACCなら投資。\nただしIRRには「複数解」「再投資仮定」問題あり。`,
formula:`NPV = −I₀ + Σ[CFt/(1+r)^t]\n\nIRR：NPV=0となるrを解く\n\nMIRR = [FV(正CF)/PV(負CF)]^{1/n} − 1`,
warn:`IRRの問題：①複数IRR ②規模の問題 ③再投資仮定（IIRRで再投資）\nNPVが理論的に常に優れた指標（価値の加法性）`},

{unit:'u2_1',id:'dividend',name:'配当政策・自社株買い・MM命題',tag:'std',icon:'💸',color:'#34d399',
intuition:`MM命題（配当）：「完全市場では配当するかどうかは企業価値に無関係」\n配当額は株価を同額下落させるだけ（配当落ち）。\n\n現実：シグナリング効果・税制・エージェンシーコスト削減`,
formula:`配当性向 = DPS/EPS\nプランバック比率 b = 1−配当性向\ng* = ROE × b\n\n自社株買い後EPS = 純利益/(株数−買戻数)\n総還元性向 = (配当+自社株買い)/純利益`,
warn:`高配当性向 → 低留保率 → 低g → DDMでの株価影響は複雑\n自社株買いは財務レバレッジを上昇させる`},

{unit:'u2_2',id:'ifrs_gaap',name:'IFRS vs 日本基準の主要差異',tag:'std',icon:'📑',color:'#0fb981',
intuition:`IFRS：原則主義（考え方を示す）\n日本基準：規則主義（細かいルールを規定）\n\nIFRS適用による財務数値の変化を問う問題が頻出。のれん・リース・退職給付が重要論点。`,

warn:`IFRS採用→のれん未償却→利益↑（日本基準比）\nリースオンバランス→負債↑、EBITDA↑（費用が減価償却+利息に）`},

{unit:'u2_2',id:'lease',name:'リース会計（IFRS16）',tag:'std',icon:'🏗️',color:'#34d399',
intuition:`IFRS16（2019年〜）：すべてのリースをB/Sに計上。\n\n導入前：オペレーティングリースはオフバランス\n導入後：使用権資産（左）= リース負債（右）\n\n財務比率への影響：資産↑・負債↑・EBITDA↑`,
formula:`当初認識：\n使用権資産 = リース負債 = Σ[リース料/(1+r)^t]\n\n毎期費用：\n減価償却費（=資産/期間）+ 支払利息（=期首残債×r）`,
example:`年間100万×5年, r=5%\nリース負債 = 100×[1−1.05^{-5}]/0.05 ≈ 432.9万円\n年間減価償却 = 432.9/5 ≈ 86.6万円`},

{unit:'u2_3',id:'dupont',name:'ROEデュポン分解',tag:'freq',icon:'🔍',color:'#0fb981',
intuition:`ROEが高い「なぜ」を3つに分解して分析する。\n\n収益性（利益率）：同じ売上でどれだけ利益を残せるか\n効率性（回転率）：同じ資産でどれだけ売上を作れるか\nレバレッジ：どれだけ借金で資産を膨らませているか`,
formula:`ROE = 純利益率 × 総資本回転率 × 財務レバレッジ\n    = (純利益/売上) × (売上/総資産) × (総資産/株主資本)\n\n5分解：税負担率×利子負担率×EBIT率×回転率×レバレッジ`,
example:`純利益100, 売上500, 総資産1000, 株主資本400\n20% × 0.5回 × 2.5倍 = 25%`,
warn:`「ROE高い=良い会社」ではない。レバレッジ過大はリスク増大\n「どの要素がROE変化をもたらしたか」の分析問題が頻出`},

intuition:`財務比率は5グループ：収益性・流動性・安全性・効率性・成長性。\n数字より「なぜその比率か」と「他社・業界比較」が重要。`,

['安全性','IC倍率','EBIT/支払利息','良(>1必須)'],

]},
warn:`業種によって「良い水準」が大きく異なる（製造業 vs 金融 vs 小売）`},

{unit:'u3_1',id:'islm',name:'IS-LMモデル',tag:'freq',icon:'📉',color:'#f5a623',
intuition:`IS曲線：「財市場の均衡」 → 金利↑で投資↓でGDP↓ → 右下がり\nLM曲線：「貨幣市場の均衡」 → GDP↑で貨幣需要↑で金利↑ → 右上がり\n\n財政政策 → ISシフト、金融政策 → LMシフト`,
compare:{headers:['政策','IS','LM','Y','r'],rows:[

['財政緊縮','左シフト','不変','減少','低下'],

]},
warn:`クラウディングアウト：財政拡大→金利上昇→民間投資減少\n流動性の罠：金利=0→LM水平→金融政策無効`},

{unit:'u3_1',id:'taylor',name:'テイラー・ルール・金融政策',tag:'freq',icon:'🏦',color:'#fbbe45',
intuition:`「中央銀行が設定すべき政策金利」の目安を規則化したもの。\n\n2つのギャップを見る：\n① インフレギャップ（実際π>目標π* → 金利↑）\n② GDPギャップ（実際Y>潜在Y* → 金利↑）`,
formula:`i = r* + π + 0.5×(π−π*) + 0.5×(Y−Y*)/Y*\n\nr*：中立実質金利　π：現在インフレ率\nπ*：目標インフレ率　Y*：潜在GDP`,
example:`r*=2%, π=4%, π*=2%, GDPギャップ+1%\ni = 2%+4%+0.5×2%+0.5×1% = 7.5%`,
warn:`係数0.5はテイラーの推定値（実際の中央銀行は柔軟に対応）`},

{unit:'u3_1',id:'money_supply',name:'貨幣乗数・貨幣供給',tag:'std',icon:'💵',color:'#f5a623',
intuition:`中央銀行がMB（現金+準備預金）を増やすと、銀行の信用創造で何倍にも膨らむ。\n\n量的緩和でMBを増やしても乗数が縮小すると効果が限定的になる。`,
formula:`乗数（単純）：1/r\n乗数（現金漏出考慮）：(1+c)/(c+r)\nc：現金・預金比率　r：準備率\n\nM2 = MB × 貨幣乗数`,
example:`r=10%, c=20%\n乗数 = 1.2/0.3 = 4.0倍\nMB=100兆 → M2=400兆円`},

{unit:'u3_2',id:'mundell',name:'マンデル＝フレミングモデル',tag:'freq',icon:'🌐',color:'#f5a623',
intuition:`IS-LMを「開放経済（国際資本移動あり）」に拡張。\n\n変動相場制：財政→無効（通貨高で輸出減が相殺）、金融→有効（通貨安→輸出増）\n固定相場制：財政→有効、金融→無効（為替維持が優先）`,
compare:{headers:['政策','変動相場制','固定相場制'],rows:[

['金融緩和（M↑）','GDP増加（通貨安→輸出増）','GDP不変（介入で吸収）'],
]},
warn:`変動+財政：IS右シフト→金利上昇→資本流入→通貨高→NX減→IS左シフト（元通り）`,
tip:`マーシャル=ラーナー条件：輸出弾力性+輸入弾力性>1で通貨安が経常改善`},

{unit:'u3_2',id:'trilemma',name:'国際収支のトリレンマ',tag:'std',icon:'🔺',color:'#fbbe45',
intuition:`以下の3つを同時に達成することは不可能。\n\n① 自由な国際資本移動\n② 固定為替レート\n③ 独自の金融政策\n\nユーロ圏 = ①②を選択→③放棄\n米国・日本 = ①③を選択→②放棄（変動相場制）`,
formula:`①②→ 通貨同盟（ユーロ）\n①③→ 変動相場制（主要先進国）\n②③→ 資本規制（一部新興国）`},

{unit:'u3_3',id:'game',name:'ゲーム理論・ナッシュ均衡',tag:'std',icon:'♟️',color:'#fbbe45',
intuition:`ナッシュ均衡：「相手の戦略を所与として、誰も変更したくない状態」\n囚人のジレンマ：個別最適≠社会最適の典型例\n\n価格競争、カルテル、軍拡競争などの分析に使う。`,
formula:`支配戦略：相手の選択によらず常に最適\nナッシュ均衡：全員の最適反応が一致する点`,
example:`価格ゲーム：両社に「値下げ」が支配戦略\n→ NE：（値下げ,値下げ）=（0,0）\n→ しかし（高値,高値）=（10,10）がパレート優位`,
tip:`繰り返しゲーム+フォーク定理：協調（カルテル）が均衡になりうる`},

{unit:'u3_3',id:'elasticity',name:'価格弾力性と需給分析',tag:'std',icon:'📏',color:'#f5a623',
intuition:`弾力性：「価格1%変化で需要量が何%変化するか」\n\n弾力的（>1）：価格変化に敏感 → 値上げで売上減\n非弾力的（<1）：価格変化に鈍感 → 値上げで売上増\n\n必需品は非弾力的、贅沢品は弾力的`,
formula:`ε = %ΔQ / %ΔP = (ΔQ/Q) / (ΔP/P)\n\n|ε|>1：弾力的　|ε|<1：非弾力的\n|ε|=1：単位弾力的（PQ最大）\n\n交差弾力性：ε_AB = %ΔQA/%ΔPB\n代替財(正)、補完財(負)`,
warn:`計算は「%変化」→変化幅÷元の値\nマーシャル=ラーナー条件との組み合わせ出題あり`},

{unit:'u1_2',q:"IR=IC×√BR×TCで、ICとTCが一定のまま、予測頻度を年2回から年4回に変更した場合、IRは何倍になるか？",choices:[{t:"2倍", ok:false}, {t:"√2 ≈ 1.41倍", ok:true}, {t:"4倍", ok:false}, {t:"変化しない", ok:false}],exp:"BR（ブレス）が2倍になり、IR = IC×√BR×TCなので√BRが√2倍→IR全体がおよそ1.41倍になります。"},
{unit:'u1_2',q:"BHB帰属分析で「選択効果（Selection Effect）」の計算式はどれか？",choices:[{t:"(wP−wB)×(RBi−RB)", ok:false}, {t:"wB×(RPi−RBi)", ok:true}, {t:"wP×(RBi−RB)", ok:false}, {t:"(wP−wB)×(RPi−RBi)", ok:false}],exp:"選択効果=wBi×(RPi−RBi)。BMのウェイト×（PF資産収益−BM資産収益）。各セクター内での銘柄選択の巧拙を示す。"},
{unit:'u1_2',q:"TWRR（時間加重収益率）がMWRR（金額加重収益率）より高い場合、何が言えるか？",choices:[{t:"資金が多い時期のリターンが高かった", ok:false}, {t:"資金が少ない時期のリターンが高かった", ok:true}, {t:"外部キャッシュフローが多かった", ok:false}, {t:"運用能力が低い", ok:false}],exp:"MWRR<TWRR→資金規模が小さい時期にリターンが高かった（逆もしかり）。MWRR>TWRR→資金が多い時期のリターンが高かった。運用能力評価にはTWRR（外部CF影響を排除）を使う。"},
{unit:'u1_3',q:"5年後スタートの1年物フォワードレートを割引係数から求める計算式として正しいのはどれか。",choices:[{t:"d(6)/d(5)－1", ok:false}, {t:"d(5)/d(6)－1", ok:true}, {t:"d(5)×d(6)－1", ok:false}, {t:"(d(5)－d(6))/d(6)", ok:false}],exp:"フォワードレート f(t)＝d(t)/d(t+1)－1。5年後スタートの場合t＝5なので、f(5)＝d(5)/d(6)－1＝0.8730/0.8339－1≒4.69%"},
{unit:'u1_3',q:"コーラブル債のZスプレッドとOAS（オプション調整後スプレッド）の大小関係はどれか。",choices:[{t:"ZスプレッドとOASは常に等しい", ok:false}, {t:"Zスプレッド＞OAS（コールオプション価値分だけZが大きい）", ok:true}, {t:"Zスプレッド＜OAS", ok:false}, {t:"大小は金利水準による", ok:false}],exp:"コーラブル債のZスプレッドはコールオプションの価値（発行体にとってのコスト＝投資家にとっての利回り上乗せ）を含んでいるため、OASより大きい。Zスプレッド＝OAS＋コールオプション価値相当スプレッド。"},
{unit:'u1_3',q:"バーベル型（短期+長期）とブレット型（中期）のデュレーションが等しい場合、スティープ化（短期安定・長期上昇）ではどちらが価格変化率で有利か？",choices:[{t:"バーベル型が有利", ok:false}, {t:"ブレット型が有利", ok:true}, {t:"デュレーションが等しいので同じ", ok:false}, {t:"コンベクシティが高いバーベル型が常に有利", ok:false}],exp:"スティープ化では長期金利が大幅上昇→長期債に多く投資するバーベル型の価格下落が大。ブレット型が有利です。"},
{unit:'u1_3',q:"変動利付債（5年、1年LIBOR+スプレッド）の金利変化に対する価格変化率の大きさとスプレッド変化に対する価格変化率の大きさの関係はどれか？",choices:[{t:"金利感応度 > スプレッド感応度", ok:false}, {t:"金利感応度 ≒ スプレッド感応度", ok:false}, {t:"金利感応度 ≪ スプレッド感応度", ok:true}, {t:"スプレッド感応度は0", ok:false}],exp:"変動利付債の金利変化に対する価格変化は次回利払い日まで（約1年）の固定債と同等で非常に小さい。一方、スプレッド変化に対しては同年限（5年）の固定債の修正デュレーション程度で大きい。"},
{unit:'u1_3',q:"コンベクシティが大きい債券の特徴として正しいものはどれか？",choices:[{t:"金利上昇時の価格下落が大きい", ok:false}, {t:"金利変化に対して有利（下落小・上昇大）", ok:true}, {t:"デュレーションが必ず小さい", ok:false}, {t:"クーポン率が低い", ok:false}],exp:"コンベクシティ大＝価格−利回り曲線がより凸。金利上昇時の損失が小さく、金利低下時の利益が大きい（対称的に有利）。バーベル型のコンベクシティはブレット型より大きい。"},
{unit:'u1_3',q:"s₁=2%、s₂=3%のとき、1年後スタート1年のフォワードレートはどれか？",choices:[{t:"2.5%", ok:false}, {t:"4.0%", ok:false}, {t:"4.01%", ok:true}, {t:"3.5%", ok:false}],exp:"₁f₂=(1+s₂)²/(1+s₁)−1=(1.03)²/1.02−1=1.0609/1.02−1≈4.01%。「2年投資」と「1年×1年後1年」の収益が等しくなる条件。"},
{unit:'u1_4',q:"満期3ヵ月（T=0.25）、TOPIX=2,000、リスクフリーレート1.2%（年率）、配当ゼロのとき、TOPIX先物価格はいくらか。",choices:[{t:"2,000.0", ok:false}, {t:"2,003.0", ok:false}, {t:"2,006.0", ok:true}, {t:"2,024.0", ok:false}],exp:"F＝S×[1＋(r－q)×T]＝2,000×[1＋0.012×0.25]＝2,000×1.003＝2,006.0"},
{unit:'u1_4',q:"ユーロ円プットオプション（ATM）に関して、ユーロ金利rEurが上昇した場合、プット価格はどうなるか？",choices:[{t:"上昇する（ロー>0）", ok:false}, {t:"下落する（ロー<0）", ok:false}, {t:"上昇する（ユーロ安・行使価値増加）", ok:true}, {t:"変化しない", ok:false}],exp:"ユーロ金利上昇→e^(−rEur×T)が低下→ユーロ建て原資産の現在価値低下→ユーロ安圧力→プットはユーロ売りの権利なのでプット価格上昇（ロー>0）。"},
{unit:'u1_4',q:"プット・コール・パリティでC=10、S=100、PV(X)=95.24のとき、プット価格はいくらか？",choices:[{t:"4.76円", ok:false}, {t:"5.24円", ok:true}, {t:"10.00円", ok:false}, {t:"14.76円", ok:false}],exp:"PCP：C+PV(X)=P+S → P=C+PV(X)−S=10+95.24−100=5.24円。欧州型で成立する恒等式。"},
{unit:'u1_4',q:"先物の理論価格F*の計算式として正しいものはどれか（配当利回りq、期間T）？",choices:[{t:"F*=S×(1+r)^T+FV(配当)", ok:false}, {t:"F*=S×(1+r)^T−FV(配当)", ok:true}, {t:"F*=S÷(1+r)^T", ok:false}, {t:"F*=S×(1+q)^T", ok:false}],exp:"F*=S×(1+r)^T−FV(配当)。キャリーコスト（資金調達コスト）から受取CF（配当）を差し引く。配当があると先物は現物より低くなる（先物保有者は配当を受け取れないため）。"},
{unit:'u1_5',q:"国内債券σ=10%、国内株式σ=30%、相関ゼロのリスクパリティポートフォリオにおける国内債券のウェイトはいくらか。",choices:[{t:"25%", ok:false}, {t:"50%", ok:false}, {t:"75%", ok:true}, {t:"80%", ok:false}],exp:"wB×σB＝wS×σS → wB×10＝(1－wB)×30 → 10wB＝30－30wB → 40wB＝30 → wB＝0.75（75%）"},
{unit:'u1_5',q:"サープラスアプローチで、短期金融資産と長期債のどちらがサープラスリスクが大きいか。",choices:[{t:"長期債の方がサープラスリスクが大きい", ok:false}, {t:"短期金融資産の方がサープラスリスクが大きい", ok:true}, {t:"同程度", ok:false}, {t:"金利水準による", ok:false}],exp:"年金債務は長期の将来キャッシュフローを割り引いた長期の性格を持つ。長期債は年金債務と相関が高いため、長期債を保有するとサープラス（A－L）の変動が小さい。短期金融資産は年金債務との相関が低く、サープラスリスクが大きい。"},
{unit:'u1_5',q:"PD=20%、LGD=60%、EAD=10億円の社債の予想損失（EL）はいくらか？",choices:[{t:"0.6億円", ok:false}, {t:"1.2億円", ok:true}, {t:"2.0億円", ok:false}, {t:"12億円", ok:false}],exp:"EL = PD × LGD × EAD = 0.20 × 0.60 × 10 = 1.2億円。3要素の積です。"},
{unit:'u1_5',q:"Xファンドのαが0.052だが標準誤差が0.216の場合、このαの有意性（t値、臨界値2.0032）の判定はどれか？",choices:[{t:"t=0.241（有意でない）→スキルあるとはいえない", ok:true}, {t:"t=4.15（有意）→スキルあり", ok:false}, {t:"αが正なのでスキルあり（t値不要）", ok:false}, {t:"t=0.052（有意でない）", ok:false}],exp:"t=α/SE=0.052/0.216≒0.241。0.241 < 2.0032（臨界値）なので有意でない。αはゼロと有意に異ならないため、スキルあるとはいえません。"},
{unit:'u1_5',q:"ρ=0、σ₁=20%、σ₂=30%の2資産の最小分散ウェイトw₁はどれか？",choices:[{t:"50.0%", ok:false}, {t:"60.0%", ok:false}, {t:"69.2%", ok:true}, {t:"75.0%", ok:false}],exp:"w₁=σ₂²/(σ₁²+σ₂²)=0.09/(0.04+0.09)≈69.2%。σ²（分散）を使う（σではない）。リスクの大きい資産ほど小さいウェイトになる。"},
{unit:'u1_5',q:"分離定理（Separation Theorem）の内容として正しいものはどれか？",choices:[{t:"すべての投資家が同じ資産配分を持つ", ok:false}, {t:"危険資産の最適組み合わせはリスク許容度と無関係", ok:true}, {t:"株式のみで最適PFを組める", ok:false}, {t:"安全資産は不要", ok:false}],exp:"接点PF（シャープレシオ最大）はリスク許容度に関係なく同じ。リスク許容度の違いは接点PFと安全資産の比率で調整する。2資産の期待リターンが同じなら最小分散PF＝接点PF。"},
{unit:'u1_6',q:"現在のドル金利が円金利より高い場合、ドルの為替先渡レートはスポットレートと比較してどうなるか。",choices:[{t:"円安（ドル高）になる", ok:false}, {t:"円高（ドル安）になる", ok:true}, {t:"同じになる", ok:false}, {t:"金利差の方向は関係ない", ok:false}],exp:"為替先渡は無裁定条件により決まる。ドル金利＞円金利のとき、F＝S×(1+r円)/(1+r$)＜S（円高・ドル安）。高金利通貨は先物で減価する（金利平価）。"},
{unit:'u1_6',q:"米国債（ドル建て期待リターン3%、リスク6%）をフルヘッジした場合の円建てリスクはいくらか（円金利0.6%、ドル金利2.0%）？",choices:[{t:"10.0%", ok:false}, {t:"6.0%（ドル建てと同じ）", ok:true}, {t:"7.4%", ok:false}, {t:"4.6%", ok:false}],exp:"フルヘッジでは為替変動リスクが除去されます。ヘッジコスト(−1.4%)はリターンに影響しますがリスクはドル建てと同じ6.0%です。"},
{unit:'u1_6',q:"ノーヘッジ米国株式（ドル建てリスク16%、為替リスク11%、相関ゼロ）の円建てリスクはどれか？",choices:[{t:"27%（足し算）", ok:false}, {t:"約19.4%", ok:true}, {t:"5%（差し算）", ok:false}, {t:"13.5%（平均）", ok:false}],exp:"σ=√(16²+11²)=√(256+121)=√377≈19.4%。相関ゼロ→交差項なし。単純な足し算ではなく分散の加法性（三平方の定理的）を使う。"},
{unit:'u1_6',q:"CIP成立時、ドル金利>円金利の場合のフォワードレートはどうなるか？",choices:[{t:"スポットより円安（ドル高）", ok:false}, {t:"スポットと同じ", ok:false}, {t:"スポットより円高（ドル安）", ok:true}, {t:"インフレ差で決まる", ok:false}],exp:"F=S×(1+r¥)/(1+r$)。ドル金利>円金利→分母>分子→F<S（円高方向）。高金利通貨の先物は減価する（CIPの核心）。"},
{unit:'u1_6',q:"UIPが成立し静学的予想（E[e₁]=e₀）のとき何が成立するか？",choices:[{t:"自国金利>外国金利", ok:false}, {t:"自国金利=外国金利", ok:true}, {t:"フォワード=スポット", ok:false}, {t:"インフレ率が一致", ok:false}],exp:"UIP：i=i*+(E[e₁]−e₀)/e₀。静学的予想e₁=e₀→右辺第2項=0→i=i*。マンデル=フレミングの重要前提。"},
{unit:'u1_7',q:"方向性リスクを取る戦略（カテゴリーB）に属する組み合わせはどれか？",choices:[{t:"①転換社債アービトラージと④債券アービトラージ", ok:false}, {t:"②マネージド・フューチャーズと③グローバル・マクロ", ok:true}, {t:"⑤株式マーケット・ニュートラルと③グローバル・マクロ", ok:false}, {t:"①転換社債アービトラージと②マネージド・フューチャーズ", ok:false}],exp:"②マネージド・フューチャーズ（先物でトレンドフォロー）と③グローバル・マクロ（マクロ経済予測に基づく売買）が方向性系（B）です。"},
{unit:'u1_7',q:"オルタナティブ投資の特徴として誤っているものはどれか？",choices:[{t:"伝統的資産との相関が低い傾向", ok:false}, {t:"流動性が高く換金しやすい", ok:true}, {t:"透明性が低く情報の非対称性が大きい", ok:false}, {t:"手数料が高い", ok:false}],exp:"オルタナティブ投資（PE・不動産・HF等）の大きな特徴の一つが「低流動性」。換金が困難なため流動性プレミアムが期待リターンに上乗せされる。「流動性が高い」は誤り。"},
{unit:'u1_7',q:"不動産のキャップレート（Cap Rate）の計算式として正しいものはどれか？",choices:[{t:"取得原価÷賃料収入", ok:false}, {t:"純収益（NOI）÷不動産価値", ok:true}, {t:"総収益÷不動産価値", ok:false}, {t:"配当÷株価（EY）と同じ", ok:false}],exp:"Cap Rate=NOI/不動産価値。株式のEarnings Yieldに相当。Cap Rate低い→価格高い（割高）。金利上昇→Cap Rate上昇傾向→不動産価値低下。"},
{unit:'u1_7',q:"PEのJカーブ効果として正しいものはどれか？",choices:[{t:"初期から高いリターンが継続", ok:false}, {t:"初期マイナス、後にプラスへ転じる", ok:true}, {t:"株式市場と逆相関するパターン", ok:false}, {t:"J字型に株価が反発する現象", ok:false}],exp:"PEは初期に投資・経営改善コストが先行→キャッシュアウト→リターンマイナス。後にIPO・M&Aで売却→キャッシュイン→プラスへ転換。グラフがJの字になることからJカーブ効果。"},
{unit:'u1_8',q:"期待リターン6%、標準偏差15%の投資信託の1年間の元本割れ確率はいくらか（P(Z≤0.4)＝0.6554を使用）。",choices:[{t:"約6.0%", ok:false}, {t:"約15.0%", ok:false}, {t:"約34.5%", ok:true}, {t:"約65.5%", ok:false}],exp:"z＝(0－0.06)/0.15＝－0.4。P(Z<－0.4)＝1－P(Z<0.4)＝1－0.6554＝0.3446≒34.5%"},
{unit:'u1_8',q:"プロスペクト理論の「気質効果」とは何を指すか？",choices:[{t:"含み益の株は売り、含み損の株は保有し続ける傾向", ok:true}, {t:"損失を利得より大きく感じる傾向", ok:false}, {t:"低確率を過大評価する傾向", ok:false}, {t:"自国資産を選好する傾向", ok:false}],exp:"気質効果は、参照点（購入価格）より上なら利得（リスク回避的→売却）、下なら損失（リスク愛好的→保有）という非対称な投資行動のことです。"},
{unit:'u1_8',q:"損失回避バイアスが投資行動に与える影響として最も正確なものはどれか？",choices:[{t:"過剰なリスクを取りやすい", ok:false}, {t:"含み損の資産を売るのが遅くなる", ok:true}, {t:"利益を過大評価する", ok:false}, {t:"市場平均に追随しすぎる", ok:false}],exp:"損失回避：損失の痛みは利益の喜びの約2倍（Kahneman-Tversky）。含み損の確定を極端に避けるため負け資産を保有し続ける傾向（プロスペクト理論）。"},
{unit:'u1_8',q:"HC（ヒューマンキャピタル）が「株式的」（変動大）な職業の若年投資家の金融資産株式比率は？",choices:[{t:"高くすべき", ok:false}, {t:"低くすべき（金融は債券中心）", ok:true}, {t:"HCの性質は無関係", ok:false}, {t:"100%株式にすべき", ok:false}],exp:"総資産=金融資産+HC。HCが株式的（変動大、景気敏感）なら既に株式リスクを多く保有→金融資産は債券中心で補完する。HC「債券的」（公務員等）なら金融資産は株式多めが合理的。"},
{unit:'u2_1',q:"P社のアンレバードベータはいくらか。有利子負債2,250億円、株式時価総額4,500億円、株式ベータ1.62、法人税率30%として計算せよ。",choices:[{t:"1.0", ok:false}, {t:"1.2", ok:true}, {t:"1.4", ok:false}, {t:"1.62", ok:false}],exp:"アンレバードβ＝1.62÷[1＋(1－0.3)×(2,250/4,500)]＝1.62÷[1＋0.35]＝1.62÷1.35＝1.2"},
{unit:'u2_1',q:"プロジェクトXのNPV（資本コスト7%）10.73億円、IRR9.60%と、プロジェクトYのNPV9.89億円、IRR10.00%を比較したとき、どちらを選択すべきか。",choices:[{t:"IRRが高いプロジェクトY", ok:false}, {t:"NPVが高いプロジェクトX", ok:true}, {t:"どちらでもよい（NPV・IRRとも大きい方を選ぶべき）", ok:false}, {t:"企業規模次第で変わる", ok:false}],exp:"企業価値最大化の観点からは、NPV（正味現在価値）が高いプロジェクトを選択するのが正しい。IRRが高くてもNPVが低い場合は選択すべきでない。プロジェクトXのNPV10.73億円＞プロジェクトYのNPV9.89億円なので、プロジェクトXを選択する。"},
{unit:'u2_1',q:"永久に維持される100億円の負債（金利2%）の節税効果PVとして正しいものはどれか（税率30%）。",choices:[{t:"2億円", ok:false}, {t:"6億円", ok:false}, {t:"30億円", ok:true}, {t:"60億円", ok:false}],exp:"年間節税額=100×0.02×0.3=0.6億円。PV=0.6/0.02=30億円。または直接：PV=負債×税率=100×0.3=30億円。"},
{unit:'u2_1',q:"アンレバードベータ1.0、D/Eレシオ0.25（株式価値ベース）、法人税率30%のとき、レバードベータはいくらか？",choices:[{t:"1.075", ok:false}, {t:"1.175", ok:true}, {t:"1.250", ok:false}, {t:"1.300", ok:false}],exp:"βE = βU×[1+D/E×(1−t)] = 1.0×[1+0.25×(1−0.3)] = 1.0×[1+0.175] = 1.175。"},
{unit:'u2_1',q:"WACCの計算で負債コストを税引後にする理由はどれか？",choices:[{t:"株式コストより低くするため", ok:false}, {t:"支払利息が損金算入され法人税を節約するため", ok:true}, {t:"負債は返済義務があるため", ok:false}, {t:"市場価値で計算するため", ok:false}],exp:"支払利息は損金算入→税率分だけ税金が減少→節税効果（タックスシールド）。実質コスト=Kd×(1−t)。WACCは市場価値ウェイトを使う点にも注意。"},
{unit:'u2_1',q:"MM定理（法人税あり修正版）：VL＝VU＋t×D の t×D は何を意味するか？",choices:[{t:"財務危機コストのPV", ok:false}, {t:"負債の節税効果（タックスシールド）のPV", ok:true}, {t:"株主資本コストの節約分", ok:false}, {t:"負債の元本総額", ok:false}],exp:"t×D=節税効果PV。支払利息×税率の現在価値（永久に維持される場合）。これが企業価値VLをVUより大きくする。ただし財務危機コストで相殺されるためトレードオフ理論が成立。"},
{unit:'u2_2',q:"A社のROEを計算する際、分母の自己資本に含まれるものとして正しいのはどれか。",choices:[{t:"株主資本のみ（160,000百万円）", ok:false}, {t:"株主資本＋その他の包括利益累計額（161,000百万円）", ok:true}, {t:"純資産合計（163,100百万円）", ok:false}, {t:"株主資本＋その他包括利益累計額＋非支配株主持分（163,100百万円）", ok:false}],exp:"ROE（Return on Equity）の分母は親会社株主に帰属する自己資本。日本基準では株主資本＋その他の包括利益累計額＝160,000＋1,000＝161,000百万円。非支配株主持分（少数株主持分）は含めない。"},
{unit:'u2_2',q:"IFRS16のリース会計の特徴として正しいものはどれか？",choices:[{t:"オペレーティングリースはオフバランスのまま", ok:false}, {t:"すべてのリースを使用権資産・リース負債として計上", ok:true}, {t:"ファイナンスリースのみオンバランス", ok:false}, {t:"リースは費用計上のみ", ok:false}],exp:"IFRS16（旧IAS17改訂）：原則すべてのリースをB/Sに計上。使用権資産（左）＝リース負債（右）。EBITDA↑、負債↑、レバレッジ悪化という財務比率への影響が生じる。"},
{unit:'u2_2',q:"IFRSと日本基準の「のれん」処理の正しい組み合わせはどれか？",choices:[{t:"IFRS：定期償却、日本：非償却", ok:false}, {t:"IFRS：非償却（減損テストのみ）、日本：定期償却（20年以内）", ok:true}, {t:"両方とも非償却", ok:false}, {t:"両方とも定期償却", ok:false}],exp:"IFRS：のれんは非償却（毎年減損テスト）→利益↑（日本基準比）。日本基準：20年以内の定期償却→毎期のれん償却費が発生。IFRS移行で利益が改善して見える。"},
{unit:'u2_3',q:"A社の2017年度のROA計算において、事業利益に含まれる項目として正しいものはどれか。",choices:[{t:"営業利益のみ", ok:false}, {t:"営業利益＋受取利息＋受取配当金", ok:false}, {t:"営業利益＋受取利息＋受取配当金＋持分法による投資損益", ok:true}, {t:"税引前利益", ok:false}],exp:"ROA分析における事業利益は、営業利益に受取利息・受取配当金・持分法による投資損益を加算した数値を用いる。2017年度はそれぞれ1,832+9+21+190=2,052億円。"},
{unit:'u2_3',q:"IFRS第9号の実効金利法において、取得額950百万円・実効利子率4.5%の社債の利息配分額はいくらか？",choices:[{t:"30百万円（1,000×3%）", ok:false}, {t:"28.5百万円（950×3%）", ok:false}, {t:"42.75百万円（950×4.5%）", ok:true}, {t:"45百万円（1,000×4.5%）", ok:false}],exp:"実効金利法では利息配分額=帳簿価額×実効利子率=950×4.5%=42.75百万円。額面や券面利率ではなく帳簿価額と実効利子率を使います。"},
{unit:'u2_3',q:"その他有価証券（取得200百万円、時価220百万円、税率30%）を計上する際、当期純利益への影響と純資産への影響はどれか？",choices:[{t:"当期純利益+20百万円、純資産+14百万円", ok:false}, {t:"当期純利益0、純資産+14百万円", ok:true}, {t:"当期純利益+14百万円（税引後）、純資産変化なし", ok:false}, {t:"当期純利益0、純資産+20百万円", ok:false}],exp:"その他有価証券の評価差額は損益計算書を通さず、純資産の評価換算差額等（その他有価証券評価差額金）へ直入します。評価差額金=(220−200)×(1−0.3)=14百万円。"},
{unit:'u2_3',q:"ROEのデュポン3分解の3要素として正しいものはどれか？",choices:[{t:"収益性×効率性×流動性", ok:false}, {t:"純利益率×総資本回転率×財務レバレッジ", ok:true}, {t:"EBIT率×回転率×税率", ok:false}, {t:"売上総利益率×販管費率×回転率", ok:false}],exp:"ROE＝（純利益/売上）×（売上/総資産）×（総資産/株主資本）。収益性・効率性・レバレッジの3軸でROEが高い理由を分解して分析する。"},
{unit:'u2_3',q:"インタレストカバレッジレシオ（IC倍率）が1を下回ることは何を示すか？",choices:[{t:"利益が安定している", ok:false}, {t:"営業利益が支払利息を下回り財務危機リスクが高い", ok:true}, {t:"資産効率が低い", ok:false}, {t:"流動性が高い", ok:false}],exp:"IC=EBIT/支払利息。IC<1→営業利益だけでは利息も払えない状態→財務危機のサイン。通常IC>2〜3が安全圏。格付け機関が重視する指標。"},
{unit:'u3_1',q:"ケインズ型消費関数Ct＝c(Yt－Tt)＋C̄において、基礎消費C̄が増加したときIS曲線はどのように変化するか。",choices:[{t:"IS曲線は左下にシフトする", ok:false}, {t:"IS曲線は右上にシフトする", ok:true}, {t:"IS曲線の傾きが変化する", ok:false}, {t:"IS曲線は変化しない", ok:false}],exp:"C̄（基礎消費・自律的消費）の増加は、所得・利子率に無関係な消費支出の増加であり、財市場の需要を押し上げてIS曲線を右上にシフトさせる。"},
{unit:'u3_1',q:"UIP（カバーなし金利平価）において、米国の金利が日本の金利より高くなった場合（Seを所与）、円/ドル直物レートSはどう変化するか。",choices:[{t:"円高（ドル安）になる（Sが低下する）", ok:false}, {t:"円安（ドル高）になる（Sが上昇する）", ok:true}, {t:"変化しない", ok:false}, {t:"金利差とは無関係", ok:false}],exp:"UIP：r－r*＝(Se－S)/S。r*上昇でr<r*になると、左辺が負→右辺も負→SeくS→Sが大きくなる（円安・ドル高）。ドル資産の高金利は将来の円高（ドル安）で相殺されることで均衡する。"},
{unit:'u3_1',q:"コブ=ダグラス型Y=A·K^0.3·L^0.7で、AとKとLが共に10%増加したとき、Yの変化率はいくらか？",choices:[{t:"10%（1次同次のため）", ok:false}, {t:"10%（ΔA/A=10%分も加算）", ok:false}, {t:"20%（TFP10%+規模10%）", ok:true}, {t:"30%", ok:false}],exp:"ΔY/Y = ΔA/A + α×ΔK/K + (1−α)×ΔL/L = 10% + 0.3×10% + 0.7×10% = 10% + 10% = 20%。K・Lの規模10%増+TFP10%増=合計20%増。"},
{unit:'u3_1',q:"IS-LMモデルで拡張的金融政策（M↑）の効果として正しいものはどれか？",choices:[{t:"IS右シフト・金利上昇", ok:false}, {t:"LM右シフト・金利低下・GDP増加", ok:true}, {t:"LM左シフト・金利上昇", ok:false}, {t:"IS左シフト・GDP減少", ok:false}],exp:"金融緩和（M↑）→LM右シフト→金利低下→投資促進→GDP増加。IS曲線は不変。財政拡大はIS右シフト（LM不変）→クラウディングアウトあり。金融政策にはクラウディングアウトが起きない。"},
{unit:'u3_2',q:"変動為替相場制・完全資本移動のマンデル=フレミングモデルにおいて、拡張的財政政策が総生産Yに与える影響はどれか？",choices:[{t:"Yは増加する", ok:false}, {t:"Yは変化しない（通貨高による純輸出減少で相殺）", ok:true}, {t:"Yは減少する", ok:false}, {t:"固定相場制と同じ効果", ok:false}],exp:"変動相場制+完全資本移動：財政支出増→金利上昇圧力→資本流入→通貨高→純輸出減少でYへの効果が完全相殺されます（財政政策の無効性）。"},
{unit:'u3_2',q:"相対的PPPが現実に成立しにくい理由として最も適切なものはどれか？",choices:[{t:"金利差がないため", ok:false}, {t:"非貿易財・輸送コスト等により財市場の国際裁定が困難なため", ok:true}, {t:"資本移動が完全でないため", ok:false}, {t:"インフレ率が常に同じであるため", ok:false}],exp:"PPPは財・サービス価格の国際裁定が前提。しかし非貿易財・輸送コスト・関税・情報の非対称性等により裁定が困難→短期では成立しにくい。長期ではある程度成立する傾向がある。"},
{unit:'u3_2',q:"トリレンマで「変動相場制・完全資本移動」を選択した場合に放棄されるものはどれか？",choices:[{t:"独自の金融政策", ok:false}, {t:"自由な資本移動", ok:false}, {t:"固定為替レート", ok:true}, {t:"財政政策の有効性", ok:false}],exp:"トリレンマ：①自由資本移動②固定為替③独自金融政策のうち2つしか選べない。変動相場+完全資本移動（米国・日本）→固定為替を放棄。"},
{unit:'u3_2',q:"マンデル=フレミング（変動相場・完全資本移動）で財政拡大の総生産（Y）への効果はどれか？",choices:[{t:"Yが増加する", ok:false}, {t:"Yは変化しない（完全無効）", ok:true}, {t:"Yが減少する", ok:false}, {t:"短期増加・長期不変", ok:false}],exp:"財政拡大→IS右シフト→金利上昇→資本流入→通貨高→NX低下→IS左シフト（元に戻る）→Y変化なし。為替経路によるクラウディングアウトで完全相殺される。"},
{unit:'u3_3',q:"MC＝2X＋20、外部費用＝20/単位のとき、社会的に最適な生産量X*はいくらか（需要：P＝100－2X）。",choices:[{t:"X*＝10", ok:false}, {t:"X*＝15", ok:true}, {t:"X*＝20", ok:false}, {t:"X*＝25", ok:false}],exp:"SMC＝2X＋40。社会的最適P＝SMC：100－2X＝2X＋40 → 4X＝60 → X*＝15"},
{unit:'u3_3',q:"総費用C=(1/2)X²の完全競争企業に従量課税t=20円。税込み価格P'=60円のときの最適生産量はいくらか？",choices:[{t:"20", ok:false}, {t:"40", ok:true}, {t:"60", ok:false}, {t:"80", ok:false}],exp:"MC'=X+20。P'=MC'→60=X+20→X=40。"},
{unit:'u3_3',q:"小国開放経済で同じ保護水準を達成する場合、関税と生産補助金の死荷重（総余剰損失）の大きさはどちらが大きいか？",choices:[{t:"関税の方が小さい（消費者にも恩恵）", ok:false}, {t:"同じ（保護水準が同じなので）", ok:false}, {t:"関税の方が大きい（消費者にも歪みをもたらすため）", ok:true}, {t:"場合による", ok:false}],exp:"関税は消費者と生産者の両方に価格歪みをもたらし死荷重が2つ（L+N）。生産補助金は消費者の直面する価格を変えないため死荷重は1つ（L）のみです。"},
{unit:'u3_3',q:"完全競争市場の長期均衡で各企業の超過利潤はどうなるか？",choices:[{t:"プラス（継続的な超過利潤）", ok:false}, {t:"ゼロ（正常利潤のみ）", ok:true}, {t:"マイナス", ok:false}, {t:"市場シェアに依存", ok:false}],exp:"完全競争長期均衡：P=MC=AC。超過利潤あり→参入→価格低下→利潤消滅。損失あり→退出→価格上昇→損失消滅。結果として超過利潤=0（正常利潤のみ）に収束する。"},
{unit:'u3_3',q:"無限反復ゲーム（繰り返し囚人のジレンマ）でフォーク定理が示すことはどれか？",choices:[{t:"常に裏切りが最適", ok:false}, {t:"協調（高値維持）が均衡になりうる", ok:true}, {t:"両者必ず協調する", ok:false}, {t:"1回限りゲームと結果が同じ", ok:false}],exp:"フォーク定理：将来の協調利益が裏切り利益を上回れば協調（カルテル維持）が均衡になりうる。1回限りゲームでは裏切りが支配戦略だが、無限反復では協調が持続しやすい。"},
{unit:'u4_1',q:"職業行為基準において、将来の投資成果を保証するような表現を禁止しているのはどの条項か。",choices:[{t:"3⑴（綿密な調査・分析に基づく合理的根拠）", ok:false}, {t:"3⑵（事実と意見の区別）", ok:false}, {t:"3⑷（投資成果を保証する表現の禁止）", ok:true}, {t:"4⑵（投資推奨の適合性と妥当性）", ok:false}],exp:"基準3⑷は「投資成果を保証するような表現を用いないこと」と規定している。渡辺さんの「間違いなく10％超の高い利回りが得られますよ」という発言はこれに違反する。"},
{unit:'u4_1',q:"投資管理業務に従事する会員が、自己の保有株式と運用ファンドの保有株式の両方を売却する場合、職業行為基準上、正しい売却順序はどれか。",choices:[{t:"市場への影響が少ない自己保有分を先に売却する", ok:false}, {t:"運用ファンドの保有株式を先に売却する", ok:true}, {t:"同時に売却する", ok:false}, {t:"どちらを先に売却してもよい", ok:false}],exp:"基準7⑷により、投資管理業務に従事する会員は、運用財産のための取引を自己の取引に優先させなければならない。したがって、ファンドの保有株式を先に売却するのが正しい。"},
{unit:'u4_1',q:"坂本さんのC社買い推奨レポート作成が違反しない条項はどれか？",choices:[{t:"3(1)：綿密な調査・分析に基づく合理的かつ十分な根拠", ok:false}, {t:"6(1)：顧客の最善の利益に専念する忠実義務", ok:false}, {t:"8(2)：未公開重要情報を利用・伝達してはならない", ok:true}, {t:"9(3)：証券の発行者との関係で独立性と客観性を保持", ok:false}],exp:"8(2)はインサイダー情報利用の禁止規定で、本ケースとは無関係です。"},
{unit:'u4_1',q:"中村さんの「確実に高い運用成果が見込めます、私が保証します」という発言が違反する条項はどれか？",choices:[{t:"3(1)：綿密な調査・分析に基づく合理的な根拠", ok:false}, {t:"3(4)：投資成果を保証するような表現を用いないこと", ok:true}, {t:"6(2)：専門家としての注意・技能・勤勉さ", ok:false}, {t:"9(1)：すべての顧客を公平に取り扱うこと", ok:false}],exp:"「確実に高い運用成果が見込めます」「保証します」は3(4)「投資成果を保証するような表現を用いないこと」に違反します。"},
{unit:'u4_1',q:"渡辺さんがG社年金基金に担当者交替・運用方針変更を報告しなかった行為が最も直接的に違反する条項はどれか？",choices:[{t:"3(1)：綿密な調査・分析に基づく合理的かつ十分な根拠", ok:false}, {t:"4(3)イ：ポートフォリオ構築の基本的原則と手法およびその重大な変更の開示", ok:true}, {t:"6(1)：顧客の最善の利益に専念", ok:false}, {t:"9(3)：証券の発行者等との関係で独立性と客観性を保持", ok:false}],exp:"運用担当者の変更とポートフォリオ構築方針の大幅変更を顧客に開示しなかった行為は4(3)イ違反です。"},
{unit:'u4_1',q:"鈴木さんがXYZファンドの劣後債への投資について信用リスクを説明しなかった行為が違反する条項はどれか？",choices:[{t:"3(4)：投資成果を保証するような表現を用いないこと", ok:false}, {t:"4(3)ロ：個々の投資対象の基本的特徴を顧客に開示すること", ok:true}, {t:"6(1)：顧客の最善の利益に資することのみに専念すること", ok:false}, {t:"8(1)：未公開の重要な情報を利用しないこと", ok:false}],exp:"劣後債の信用リスクは投資対象の基本的特徴であり、4(3)ロ「個々の投資対象の基本的特徴を顧客に開示すること」に違反します。"},
