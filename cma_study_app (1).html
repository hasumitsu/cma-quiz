{year:'2025',session:'AM',qnum:'02',unit:'u4_1',pts:8,topic:"証券会社営業担当が手数料優先・不適合推奨・不実表示を行った違反（中村さん）",subj:"職業倫理",tags:['職業行為基準','適合性原則','忠実義務','投資成果保証禁止','不実表示','CMA称号'],ans:"【5つのうち2つ解答。④と⑤の組み合わせは1点のみ】\n\n①該当条項：4(2)\n違反する行為と理由：中村さんは、顧客の属性にかかわらずすべての顧客に特定のファンドだけを推奨しており、推奨した商品が、顧客の財務状況、投資目的、投資経験等に適合する投資かに配慮しておらず、基準4(2)に違反する。\n\n②該当条項：6(1)\n違反する行為と理由：中村さんは、自己の営業成績のため、販売手数料が最も高く営業成績に貢献する「AI株式投信Ｅ」を、顧客の属性にかかわらず推奨しており、自己と雇用主の利益を優先して、顧客の最善の利益に資することのみに専念しておらず、基準6(1)に違反する。\n\n③該当条項：3(4)\n違反する行為と理由：中村さんは「確実に高い運用成果が見込めます」と投資成果を保証するような表現を用いており、基準3(4)に違反する。\n\n④該当条項：5(1)ロ\n違反する行為と理由：中村さんはCMA資格につ",summary:"手数料優先の一律推奨は4(2)・6(1)違反。「確実に保証」は3(4)違反。「国が認定」は5(1)ロ違反。④と⑤は同一事実なので両方選んでも1点のみ。",kps:['4(2)：顧客の財務状況・投資目的・経験への適合性配慮義務','6(1)：顧客の最善の利益優先（自己・雇用主利益優先の禁止）','3(4)：投資成果を保証するような表現の禁止','5(1)ロ：会員が有する資格についての不実表示禁止','④5(1)ロと⑤9(5)は同一事実→両方選んでも1点のみ'],cms:['④と⑤を両方選んで2点もらえると思う誤り','3(4)の違反行為を「投資成果の保証表現」と明示せず曖昧に書く']},
{year:'2025',session:'AM',qnum:'02',unit:'u4_1',pts:8,topic:"ファンドマネジャーが運用方針変更を未開示・外圧で業績不振銘柄を買増し命令（渡辺さん）",subj:"職業倫理",tags:['職業行為基準','ファンドマネジャー','情報開示義務','忠実義務','利益相反','独立性'],ans:"【6つのうち2つ。①と②、④と⑤の組み合わせはそれぞれ1点のみ】\n\n①該当条項：4(3)イ\n違反する行為と理由：渡辺さんは、Ｇ社年金基金の運用担当者が変更となり、ポートフォリオ構築の基本的原則と手法の変更を指示したにもかかわらず、顧客であるＧ社年金基金にその事実を開示していない。基準4(3)イに違反する。\n\n②該当条項：4(2)\n違反する行為と理由：渡辺さんは、顧客であるＧ社年金基金の状況やニーズを確認せず勝手に運用方針の変更を指示しており、投資の適合性に配慮していない。基準4(2)に違反する。\n\n③該当条項：6(1)\n違反する行為と理由：渡辺さんは、Ｇ社の業績が不振で株価の低迷が続くと予想しながら、Ｇ社財務担当役員からＦ投資顧問への委託金額増額を言われてＧ社株式の買い増しを命じた。これは顧客（年金基金）の利益よりも雇用主（自社）とＧ社（第三者）の利益を優先した行為であり、基準6(1)に違",summary:"運用方針変更の未開示(4(3)イ)と業績不振銘柄の外圧による買増し(6(1)/9(3)等)の2系統の違反。①②は実質同一事実なので両方選ぶと1点のみ。",kps:['4(3)イ：ポートフォリオ構築の基本的原則・手法およびその重大な変更の開示義務','4(2)：顧客の状況・ニーズを確認した上で適合性を検討する義務','6(1)：顧客利益を自社・第三者利益より優先する義務','①と②は同一事実（未開示）、④と⑤は同一事実（根拠なし買増し）','推奨解答：①または②と、③または⑥の組み合わせ'],cms:['①と②を両方選ぶ（同一事実のため1点のみ）','④と⑤を両方選ぶ（同一事実のため1点のみ）','6(1)と9(3)の違いを理解せずに書く']},
{year:'2025',session:'AM',qnum:'03',unit:'u4_1',pts:8,topic:"運用成果の不完全開示・劣後債の信用リスク未説明（鈴木さん）",subj:"職業倫理",tags:['職業行為基準','投資管理成果の提示','重要事実の開示','投資適合性','信用リスク'],ans:"【3つのうち2つ。①と②の組み合わせは1点のみ】\n\n①該当条項：5(2)\n違反する行為と理由：鈴木さんは、代表的な運用ファンドのパフォーマンスを示す際に、流動性が低い資産は簿価評価とし、クーポンや配当収入のみを収益として計上していることを説明しておらず、公正、正確かつ十分な提示を行うような合理的な努力をしていないので、基準5(2)に違反する。\n\n②該当条項：3(3)\n違反する行為と理由：鈴木さんは、代表的な運用ファンドのパフォーマンスを示す際に、流動性が低い資産の評価方法を簿価評価とし、クーポンや配当収入のみを収益として計上していることをＰ医大に説明していない。重要な事実について全て正確に説明していないため、基準3(3)に違反する。\n\n③該当条項：4(3)ロ\n違反する行為と理由：鈴木さんは、XYZファンドが投資する高クーポンを得られる劣後債の信用リスクについて、Ｐ医大に説明しておらず、投資",summary:"パフォーマンス提示での評価方法未説明は5(2)または3(3)（同一事実）。劣後債の信用リスク未説明は4(3)ロ。①②の組み合わせは1点のみ。",kps:['5(2)：投資管理の成果の公正・正確・十分な提示の合理的努力義務','3(3)：重要な事実についてすべて正確に表示すること','4(3)ロ：個々の投資対象の基本的特徴の開示義務（信用リスクを含む）','①5(2)と②3(3)は同一事実に基づくため両方選んでも1点のみ'],cms:['①と②を両方選ぶ（同一事実で1点のみ）','4(3)ロの「基本的特徴」に信用リスクが含まれることを見落とす']},
{year:'2025',session:'AM',qnum:'03',unit:'u4_1',pts:8,topic:"調査なしの非上場株式組入れ・未公開情報利用の株式売却（加藤さん）",subj:"職業倫理",tags:['職業行為基準','調査不十分','インサイダー取引','注意義務','未公開情報'],ans:"【3つのうち2つ。①と②の組み合わせは1点のみ】\n\n①該当条項：3(1)\n違反する行為と理由：加藤さんは、Ｐ医大から投資要請のあったＲ電子を調査せずに、その株式に投資しており。綿密な調査分析に基づく、合理的かつ十分な根拠がないため、基準3(1)に違反する。\n\n②該当条項：6(2)\n違反する行為と理由：加藤さんは、Ｐ医大から投資要請のあったＲ電子を調査せずに、投資を決めた。専門家として尽くすべき注意、技能、配慮および勤勉さに欠けており、基準6(2)に違反する。\n\n③該当条項：8(2)\n違反する行為と理由：加藤さんは、Ｒ電子の成長の源泉と市場で評価されている小林教授との共同研究契約について、小林教授から内々に「共同研究契約を近々破棄するつもりである」との重要な未公開情報を証券分析業務に利用し、Ｒ電子の株式を売却したため、基準8(2)に違反する。",summary:"調査なし銘柄組入れは3(1)または6(2)（同一事実）。小林教授からの未公開情報（共同研究破棄）を利用した売却は8(2)インサイダー取引禁止違反。③8(2)を必ず含めることが重要。",kps:['8(2)：未公開重要情報が義務・法令違反で伝えられたことを知り得る場合の利用禁止','3(1)と6(2)は同一事実（調査なし）→両方選ぶと1点のみ','推奨解答：①または②と③の組み合わせ','8(1)は信任関係に基づく場合、8(2)は違法伝達を知り得る場合'],cms:['①と②を両方選ぶ（同一事実で1点のみ）','8(1)と8(2)を混同する','③を選ばずに①②だけ選ぶ（8(2)の重要性を見落とす）']},
{year:'2025',session:'AM',qnum:'04',unit:'u2_1',pts:15,topic:"MM理論（法人税あり/なし）・PER・EV/EBITDA・節税効果PV・自社株買い後株式数・自社株買いシグナリング",subj:"コーポレートファイナンス",tags:['PER','MM理論','資本構成','株主資本コスト','節税効果','EV/EBITDA'],ans:"問１(1) PER = 8.33倍\n　現在の株価：1,100億円÷1億株＝1,100円\n　1株当たり純利益：132億円÷1億株＝132円\n　PER＝1,100÷132＝8.333...≒8.33倍\n\n問１(2) 企業価値は変化しない\n　理由：MM（モディリアーニ＝ミラー）の無関連命題より、法人税のない完全市場の下では資本構成の変更は企業価値に影響しない。FCFおよびWACCは変化しないため、企業価値は変化しない。\n\n問１(3) 資本構成変更後の株主資本コスト：13%\n　資本構成変更後の株式価値＝1,100－100＝1,000億円\n　資本構成変更前の株主資本コスト＝132÷1,100＝12%（資産全体コスト）\n　re×(1,000/1,100)+0.02×(100/1,100)＝0.12\n　→ re＝0.13（13%）\n　別解：re＝0.12＋(0.12－0.02)×(100/1,000)＝",summary:"MM理論の基本（法人税あり/なし）と各財務指標の計算。節税効果PV=負債×税率=30億円（永久負債）。自社株買い前の株価に節税効果を加算する点に注意。",kps:['MM無関連命題（法人税なし）：完全市場では資本構成は企業価値に影響しない','re(変更後)=ra+(ra-rd)×D/E（D/Eは株式価値ベース）','節税効果PV（永久負債）=負債額×税率=100×0.3=30億円','自社株買い前株価=(企業価値+節税PV)/株数=800円（節税効果を加算）','収益持続性仮説：増配は長期コミットメントと解釈→将来減配は強い負のシグナル'],cms:['D/Eレシオを100/1,100（企業価値ベース）で計算する誤り（正しくは100/1,000＝株式価値ベース）','自社株買い前株価を770億円/1億株=770円で計算する（節税効果30億円加算漏れ）','節税効果PVを年間節税額0.6億円と答える（PV=30億円）']},
{year:'2025',session:'AM',qnum:'05',unit:'u2_3',pts:26,topic:"ROEデュポン分解・セグメント分析・PER/PBR・サステイナブル成長率（マイナス）・IFRS第9号実効金利法",subj:"財務分析",tags:['ROE','デュポン分解','セグメント分析','PER','PBR','サステイナブル成長率'],ans:"問１(1)\n(a) 売上高純利益率 = 3,720÷31,038 = 12.0%\n(b) 総資本回転率 = 31,038÷35,876 = 0.9回\n(c) 財務レバレッジ = 35,876÷20,165 = 1.8倍\n\n問１(2)\n売上高純利益率が10.7%から12.0%（1.3ポイント改善）に、総資本回転率が0.8回から0.9回（0.1回改善）となったため、ROEは16.3%から18.4%に2.1%改善した。\n\n問２(1)\n(d) 国内事業売上高成長率 = 9,322÷8,904－1 ≒ 4.7%\n(e) 海外事業売上高成長率 = 17,118÷14,371－1 ≒ 19.1%\n(f) 国内事業売上高営業利益率 = 1,558÷9,322 ≒ 16.7%\n(g) 海外事業売上高営業利益率 = 2,834÷17,118 ≒ 16.6%\n\n問２(2)\nＡ社の海外事業の売上高構成比は20X6",summary:"財務分析の総合問題。実効金利法の計算（利息配分額=帳簿価額×実効利子率）、サステイナブル成長率がマイナスになる異常状態、PER計算でのEPS単位換算に注意。",kps:['IFRS：自己資本=親会社の所有者に帰属する持分（非支配持分除く）','実効金利法：利息配分額=帳簿価額×実効利子率（券面利率ではない）','帳簿価額=前期帳簿価額+(利息配分額-実際受取利息)','サステイナブル成長率=ROE×(1-配当性向)：配当性向>1でマイナス','PER計算：EPS=予想純利益(億円)÷発行済株式数(百万株)×100万→円に変換'],cms:['実効金利法で利息配分額を「額面×券面利率=30百万円」と計算する誤り','PER計算でEPS単位換算を誤る（億円÷百万株=100円/株）','サステイナブル成長率の配当性向を当期1,587/1,308で計算することを忘れる']},
{year:'2025',session:'AM',qnum:'06',unit:'u1_1',pts:15,topic:"FCFE/FCFF計算・エクイティDCF/エンタープライズDCF/配当割引モデルによる理論株価計算",subj:"証券分析",tags:['FCFE','FCFF','エクイティDCF','エンタープライズDCF','DDM','配当割引モデル'],ans:"問１(1) FCFE = 168億円\nFCFE = 純利益 + 減価償却費 − 設備投資 − NWC増加 + 有利子負債増加\n     = 420 + 372 − 684 − 24 + 84 = 168億円\n\n問１(2) 理論株価 = 8,400円\n株式価値 = 168÷(0.08−0.06) = 8,400億円\n発行済株式数1億株 → 理論株価 = 8,400円\n\n問２(1) FCFF = 117.6億円\nFCFF = 営業利益×(1−税率) + 減価償却費 − 設備投資 − NWC増加\n     = 756×0.6 + 372 − 684 − 24 = 453.6 + 372 − 684 − 24 = 117.6億円\n\n問２(2) 理論株価 = 8,400円\n企業価値 = 117.6÷(0.072−0.06) = 9,800億円\n株式価値 = 9,800−1,400 = 8,400億円",summary:"DCF系の総合問題。FCFE/FCFF計算式の違いが核心。エクイティとエンタープライズ両手法で理論株価が一致(8,400円)することを確認できる。DDMは2段階成長モデル。",kps:['FCFE = 純利益 + 減価償却費 − 設備投資 − ΔNWC + 有利子負債増加（財務調達含む）','FCFF = 営業利益×(1−税率) + 減価償却費 − 設備投資 − ΔNWC（財務調達除く）','エンタープライズDCF：企業価値=FCFF/(WACC-g)→株式価値=企業価値−有利子負債','g(サステイナブル)=ROE×(1−配当性向)=0.105×0.6=6.3%','DDM 2段階：X1配当を1期割引+X2以降を定率成長モデルで計算'],cms:['FCFEとFCFFを混同する（FCFEには有利子負債増加が含まれる）','FCFFの税引後営業利益を「純利益×(1−税率)」と誤計算（正しくは営業利益×(1−税率)）','DDMのX2以降の現在価値計算でX2年度の分割引が1回余分、または不足する']},
{year:'2025',session:'AM',qnum:'07',unit:'u1_6',pts:15,topic:"為替フォワードレート計算・為替オーバーレイ・フルヘッジ/ノーヘッジの期待リターン・リスク・ポートフォリオ効率性",subj:"証券分析",tags:['カバー付き金利パリティ','為替フォワード','為替オーバーレイ','フルヘッジ','ノーヘッジ','シャープレシオ'],ans:"問１ 為替フォワードレート：147.90円/ドル\nF₁ = S₀×(1 + i¥ − i$) = 150×(1 + 0.006 − 0.02) = 150×0.986 = 147.90円/ドル\n\n問２\n名称：為替オーバーレイ\nメリット：通貨に関する運用能力と株式・債券等の資産に関する運用能力は異なる場合が多く、為替専門の為替オーバーレイ・マネージャーが為替リスクを一元管理することで、株式や債券等の運用会社は自らが得意とする運用に専念でき、より高い運用成績が期待できること。\nデメリット（以下のいずれか）：\n・為替と資産を別々に最適化（2段階法）するため、ポートフォリオ全体が最適にならないことがある。\n・複数の運用会社に委託するため委託手数料が余分にかかる。\n\n問３\nフルヘッジ期待リターン：1.6%\nフルヘッジリスク：6.0%\n期待リターン = 3% + (0.6% − 2.0%) = 1.6",summary:"カバー付き金利パリティからF=147.90円。フルヘッジではリターンだけヘッジコスト分下がりリスクは6%不変。ノーヘッジでは為替リスク加算で√(6²+8²)=10%。シャープレシオ比較でP(0.17)>国内債(0.13)。",kps:['カバー付き金利パリティ：F = S×(1+i¥−i$) = 150×0.986 = 147.90円','フルヘッジ：リターン=ドル建て+ヘッジコスト=3−1.4=1.6%、リスク=6.0%（不変）','ノーヘッジ：リターン=3−1=2.0%、リスク=√(6²+8²)=10%（米国債と為替の相関=0）','シャープレシオ=（期待リターン−無リスク金利）÷リスク','無リスク金利=円金利=0.6%（短期金融資産のリターン）'],cms:['フルヘッジのリスクを「6%+ヘッジコストの分散」と計算する（ヘッジコストは確定的なので分散なし）','ノーヘッジリスクを単純に6+8=14%と加算する（分散の加法性を使うべき）','シャープレシオの無リスク金利を0%にする（正しくは円金利0.6%）']},
{year:'2025',session:'AM',qnum:'08',unit:'u1_3',pts:20,topic:"債券ポートフォリオの型・コンベクシティ計算・金利シナリオ別価格変化比較・1年間リターン計算",subj:"証券分析",tags:['ラダー型','ブレット型','バーベル型','コンベクシティ','修正デュレーション','スティープ化'],ans:"問１(1)\nポートフォリオP：ラダー型ポートフォリオ\nポートフォリオR：ブレット型ポートフォリオ\n\n問１(2) 11.1\nCv = T(T+1)/(1+r)² = 3×4/(1+0.041)² = 12/1.083... ≒ 11.1\n\n問１(3) 49.8%\nQのデュレーションD_B=2/1.033≒1.94、D_J=10/1.06≒9.43\n5.70 = w×1.94 + (1−w)×9.43\nw = (9.43−5.70)/(9.43−1.94) = 3.73/7.49 ≒ 49.8%\n\n問２(1)\n最も高い：P（修正デュレーション最小のためパラレル上昇で価格変化最小）\n最も低い：R（Q・Rはデュレーション同じ→コンベクシティ大きいQの方が高く、Rが最低）\nしたがってP>Q>R\n\n問２(2)\n最も高くなるシナリオ：(d)（全年限の利回り上昇幅が最小→価格変化率最も高い）\n最も低くなる",summary:"ラダー/ブレット/バーベルの3型。コンベクシティ公式 T(T+1)/(1+r)² の暗記必須。バーベル型はスティープ化で不利・フラット化で有利という原則が核心。",kps:['ラダー型=各年限均等（P）、ブレット型=特定年限集中（R）、バーベル型=短・長期集中（Q）','割引債コンベクシティ = T(T+1)/(1+r)²','バーベル型はスティープ化で不利・ポジティブバタフライで不利','ブレット型はスティープ化で有利・ポジティブバタフライで有利','純粋期待仮説：1年後の全利回り→1年スポットレートに収束'],cms:['コンベクシティ式をT²/(1+r)²と誤記（正しくはT(T+1)/(1+r)²）','スティープ化でバーベルが有利と誤答（不利が正しい）','デュレーション一致でもコンベクシティ差による価格変化の違いを無視する']},
{year:'2025',session:'AM',qnum:'09',unit:'u1_2',pts:15,topic:"最適化法の空欄補充・ファンドA〜Cの投資スタイル評価・95%信頼区間計算・ESGファンドの問題点",subj:"証券分析",tags:['トラッキングエラー','カーハートモデル','ESG投資','信頼区間','t検定','マルチファクターモデル'],ans:"問１\n①：トラッキング・エラー\n②：ウェイト（または構成比）\n③：分散共分散（または相関係数）\n④：分散（または標準偏差）\n\n問２\nファンドA：\n・サイズ→大型（βSMB=−0.20、t=−8.67で有意）\n・バリュー→バリュー（βHML=0.09、t=7.14で有意）\n\nファンドB：\n・サイズ→大型（βSMB=−0.10、t=−2.70で有意）\n・バリュー→有意に評価できない（βHMLのt値=−0.74で絶対値が低く有意でない）\n\nファンドC：\n・サイズ→大型（βSMB=−0.11、t=−2.59で有意）\n・バリュー→グロース（βHML=−0.13、t=−4.32で有意）\n\n問３\n標準誤差 = |β| / |t| = 0.10/2.70 ≒ 0.037\n上限：−0.10 + 1.96×0.037 = −0.10 + 0.0725 ≒ −0.03\n下限：−0.10 − 1.96×0.037",summary:"カーハートモデルのスタイル分析。βSMBマイナス→大型、βHMLプラス→バリュー、マイナス→グロース。t値の絶対値で有意性判断（目安2以上）。信頼区間は推定値±1.96×標準誤差（標準誤差=β推定値/t値で逆算）。",kps:['βSMB < 0で有意 → 大型株スタイル（SMB=Small Minus Big）','βHML > 0で有意 → バリュー株スタイル（HML=High Minus Low）','βHML < 0で有意 → グロース株スタイル','t値絶対値が約2未満 → 有意に評価できない','標準誤差 = |β推定値| / |t値| で逆算'],cms:['βSMBがマイナス→「小型株バイアス」と誤読する（マイナスは大型株バイアス）','t値絶対値2未満でも「スタイル特性あり」と判定する誤り','信頼区間の計算でt値と標準誤差を混同する']},
{year:'2025',session:'AM',qnum:'10',unit:'u1_5',pts:15,topic:"効用関数の欠点・リスク指標(MCTR/RC/PRC)の計算と意義・クレジット損益分布・EL計算・社債ポートフォリオリスク管理",subj:"証券分析",tags:['アクティブ運用','情報レシオ','MCTR','RC','PRC','クレジットリスク'],ans:"問１\n(1)式の効用関数では、アクティブ・ファンド間の相関が考慮されていないため、国内株式アクティブ投資全体のリスクを適切に評価できない可能性がある。例えば、選択された3つのファンドがすべてグロース株を投資対象とするファンドである場合、全体としてグロース株ファクターにエクスポージャーが集中して分散投資効果が弱まり、国内株式アクティブ投資全体のアクティブ・リスクが高くなることが懸念される。\n\n問２\n① MCTR1 = Cov(r1,rp)/σ(rp) = 0.1/0.5 = 0.2\n② RC2 = MCTR2×x2 = (0.3/0.5)×30% = 0.6×0.30 = 0.18\n③ PRC3 = RC3/σ(rp) = 0.24/0.5 = 0.48\n\n利点：MCTRi・RCi・PRCiは、ファンドのリターンの相関関係を考慮したうえで、ポートフォリオ全体のトータルリスクへの影響を管理する",summary:"MCTR/RC/PRCの計算。EL=PD×LGD×EADの基本計算。クレジットリスク損益分布は「右高ピーク+左厚テール」の非対称形状。社債ポートフォリオではデフォルト相関（予想外損失UL）の考慮が重要。",kps:['MCTR = Cov(ri,rp)/σ(rp)','RC = MCTR × xi','PRC = RC / σ(rp)（合計=1）','EL = PD × LGD × EAD','クレジット損益分布：右高ピーク（薄益が多い）+左厚テール（大損失低確率）'],cms:['PRCをRCの単純な比率と思い計算を誤る','ELの計算でLGDを忘れる（PD×EADだけにする）','クレジット損益分布を正規分布に近い対称形で図示する誤り']},
{year:'2025',session:'AM',qnum:'11',unit:'u3_1',pts:15,topic:"労働L増加のAS曲線シフト・生産関数でLが2倍でYが2倍にならない理由・成長会計の式と計算",subj:"経済",tags:['AD-ASモデル','コブダグラス型生産関数','限界生産性逓減','成長会計','全要素生産性','移民労働'],ans:"問１\n労働Ｌの増加により総供給が増加するので、AS曲線がAS₀からAS₁へと右方向にシフトする。その結果、AD曲線との交点はE₀点からE₁点へと右下に移動する。このとき総生産(Y)は増加（Y₀→Y₁）し、物価水準（P）は低下（P₀→P₁）する。\n\n【図：縦軸P、横軸Y。AS右シフト（AS₀→AS₁）。ADとの交点がE₀→E₁へ右下移動。Y₁>Y₀、P₁<P₀。】\n\n問２(1)\nグラフ：原点を通る上に凸の曲線（接線の傾きが右に行くほど小さくなる）。\n\nLが2倍になっても Yは2倍にならないことの説明：\n本問の生産関数はコブ＝ダグラス型で、労働の限界生産性逓減という性質を持っている。\n\n式での証明：Y₀=√K·√L₀、L₁=2L₀とすると、\nY₁=√K·√(2L₀)=√K·√2·√L₀=√2·Y₀≒1.414Y₀ < 2Y₀\n\n問２(2)\nY/Lは減少する。\nLは2倍になる一方、Yは√2倍にし",summary:"マクロ経済学の基本。AS右シフト→Y増加・P低下。限界生産性逓減でLが2倍→Y=√2倍。成長会計はK・L共に同率成長の場合、1次同次でY同率増。",kps:['労働増加→AS右シフト→Y増加・P低下（総供給増→デフレ的効果）','Y=√K·√L：L→2L では Y→√2·Y（≈1.41倍）< 2Y（限界生産性逓減）','Y/L：L増加でY/L減少（1人当たり産出量低下）','成長会計：ΔY/Y = ΔA/A + α·ΔK/K + (1−α)·ΔL/L','コブ=ダグラス型が1次同次 → K・L共に10%増なら Y も10%増'],cms:['AS曲線シフトの方向を左と誤答する（労働増加は総供給増→右シフト）','問2(1)でYが2倍にならない理由の説明が不十分（式での証明を示すとベター）','成長会計の式で α と (1−α) の対応を間違える']},
{year:'2025',session:'PM',qnum:'01',unit:'u3_3',pts:10,topic:"完全競争企業の課税前後MC・供給関数・利潤計算と規制上の裁定の具体例",subj:"経済",tags:['限界費用','完全競争','従量課税','供給関数','利潤計算','規制上の裁定'],ans:"問１(1)\n①MC = X\n②供給関数：X = P\n③課税後MC' = X + t\n\n問１(2)\n課税前：MC = X（原点を通る45度線）\n課税後：MC' = X + t（縦軸の切片がt、課税前MCをt だけ垂直方向に移動した線）\n\n問１(3)\n最適生産量 = 40、利潤 = 800（円）、課税総額 = 800（円）\n\n計算：\n利潤最大化条件：P' = MC' = X + t → X = P' − t = 60 − 20 = 40\n課税総額 = t×X = 20 × 40 = 800（円）\n総費用 = (1/2)×40² + 20×40 = 800 + 800 = 1,600（円）\n企業の利潤 = 収入 − 総費用 = 40×60 − 1,600 = 2,400 − 1,600 = 800（円）\n\n問２（以下のいずれか）\n【税率の違い】\n・資本金を基準とした外形標準課税で中小企業が優遇さ",summary:"完全競争企業の利潤最大化（P=MC）の基本問題。従量課税でMC上方シフト。規制裁定の具体例を1つ挙げれば良い。",kps:['完全競争：P=MCが利潤最大化条件 → 供給関数X=P',"従量課税t：MC' = X + t（平行上方シフト）","課税後最適生産量：X = P' − t = 60 − 20 = 40",'利潤=収入−課税込み総費用'],cms:['課税後の供給関数をX=Pのままで計算する誤り','利潤計算でtXを費用に加算し忘れる']},
{year:'2025',session:'PM',qnum:'02',unit:'u3_3',pts:10,topic:"小国開放経済での関税vs生産補助金の総余剰変化比較と政策的含意",subj:"経済",tags:['関税','生産補助金','総余剰','死荷重','消費者余剰','生産者余剰'],ans:"問１ 総余剰の変化 = −10,000（10,000減少）\n\n①生産者余剰の変化（K）：+(300+200)×100÷2 = +25,000\n②消費者余剰の変化（K+L+M+N）：−(600+700)×100÷2 = −65,000\n③関税収入（M）：+300×100 = +30,000\n合計：25,000 − 65,000 + 30,000 = −10,000\n\n別解：死荷重L+N=(300−200)×100÷2+(700−600)×100÷2=5,000+5,000=10,000減少\n\n問２ 総余剰の変化 = −5,000（5,000減少）\n\n①生産者余剰の変化（K）：+(300+200)×100÷2 = +25,000\n②消費者余剰の変化：消費者が直面する価格は変化しないため = 0\n③生産補助金の支出（K+L）：−300×100 = −30,000\n合計：25,000 + 0 − ",summary:"関税の死荷重(10,000)は生産補助金の死荷重(5,000)の2倍。関税は消費者にも価格歪みをもたらすが、生産補助金は生産者のみに作用するため効率損失が少ない。",kps:['関税：生産者+25,000・消費者−65,000・関税収入+30,000 → 純損失−10,000','生産補助金：生産者+25,000・消費者0・補助金−30,000 → 純損失−5,000','関税の死荷重=L+N（2つの三角形）、補助金の死荷重=L（1つ）','政策的含意：同じ保護水準なら生産補助金の方が総余剰損失が小さい'],cms:['問2で消費者余剰変化を−65,000として計算する（消費者価格は不変なので0）','問1で関税収入を含めずに計算する']},
{year:'2025',session:'PM',qnum:'03',unit:'u3_2',pts:10,topic:"UIPによる金利一致・マーシャル=ラーナー条件・マンデル=フレミングモデルの金融・財政政策効果",subj:"経済",tags:['マンデルフレミング','UIP','カバーなし金利平価','マーシャルラーナー条件','変動為替制','金融政策'],ans:"問１\nUIPの式：i = i* + (e'−e)/e\n1+i = (e'/e)(1+i*)\n\ne'=eが成立するため、i = i*となり、自国の金利は外国の金利と等しくなる。\n\n問２\nマーシャル＝ラーナー条件の式：輸出の為替レート弾力性＋輸入の為替レート弾力性＞1\n\nマーシャル＝ラーナー条件が成立するとき、自国通貨が減価した場合、貿易収支は黒字化する。\n\n問３\n拡張的金融政策が行われ、名目貨幣供給量が増大するとLM曲線が右方向にシフトし、均衡点はE₀からE₁となる。eは減価し（自国通貨安・外国通貨高）、YはLM曲線のシフト幅分増加する。\n\n【解説】名目貨幣供給量の増大が国内金利に低下圧力を生み、資本が海外へ流出する結果、自国の通貨が減価し、純輸出が増大するため、総生産が増大する。\n\n問４\n拡張的財政政策が行われるとIS曲線が右方向にシフトし、均衡点はE₀からE₁となる。eは増価（自国通貨高",summary:"マンデル=フレミングモデルの核心：変動為替制では金融政策は有効（Y増加）、財政政策は無効（Yは変化なし）。金融政策→LM右シフト→通貨安→輸出増。財政政策→IS右シフト→通貨高→輸出減で完全相殺。",kps:["UIP：i = i* + (e'−e)/e。静学的予想(e'=e)では i = i*",'マーシャル=ラーナー条件：輸出弾力性+輸入弾力性>1で通貨安→貿易黒字','変動相場制+完全資本移動：金融政策→有効（Yは増加）','変動相場制+完全資本移動：財政政策→無効（Yは変化なし、通貨高で相殺）'],cms:['問4で「財政政策が有効」と誤答する（変動相場制では無効）','為替レートeの増価/減価と高い/低いを混同する','IS/LM曲線のシフト方向を誤る']},
{year:'2025',session:'PM',qnum:'04',unit:'u1_2',pts:15,topic:"アクティブ運用基本法則(IR=IC×√BR×TC)・指値注文のメリデメ・最良気配デプスと執行コスト",subj:"証券分析",tags:['インフォメーションレシオ','基本法則','ブレス','伝達係数IC','指値注文','マーケットインパクト'],ans:"問１ 1.41倍\n頻度を6ヵ月毎から3ヵ月毎に変更するとBRが2倍に増加する。IR = IC × √BR × TCなのでIRは√2 ≈ 1.41倍となる。\n\n問２（以下のいずれか1つ）\n・βや業種ウェイトをベンチマークに一致させるなどのリスク管理上の制約がある。\n・売買する銘柄の流動性や売買回転率の制約があり、必要な量の売買が困難である。\n・空売り制約がある場合は、予測アクティブリターンが低い銘柄の保有比率をゼロまでしか下げられない。\n\n問３(1)\nメリット：予測アクティブリターンの前提となる現在の市場株価で売買を確実に執行するためには、取引価格を指定する指値注文が適している。\nデメリット：市場の流動性が十分でない場合や、株価が継続して上昇または下落するような場合には、指値注文では売買を執行できない可能性がある。\n\n問３(2)\n現在の運用資産総額は100億円なので、1銘柄当たりの投資金額は",summary:"IR=IC×√BR×TC。頻度2倍→BR2倍→IR√2=1.41倍。1銘柄当たり投資額と最良気配デプスの比較でマーケットインパクトを判断（3.3億>2億→影響大、1.7億<2億→影響軽減）。",kps:['IR = IC × √BR × TC','BR（ブレス）は独立した意思決定回数→頻度2倍でBR2倍→IR√2=1.41倍','1銘柄当たり投資額 > 最良気配デプス → マーケットインパクト発生','30銘柄：100÷30≈3.3億 > 2億（デプス超過）','60銘柄：100÷60≈1.7億 < 2億（デプス以内で改善）'],cms:['頻度2倍でIRも2倍になると誤答する（正しくは√2=1.41倍）','最良気配デプスとの比較を定性的にのみ述べる（数値で比較する）']},
{year:'2025',session:'PM',qnum:'05',unit:'u1_7',pts:10,topic:"ヘッジファンド戦略分類・FOHF・コモディティ投資（インフレヘッジ・コンビニエンスイールド・金先物価格計算）",subj:"証券分析",tags:['ヘッジファンド','アービトラージ','グローバルマクロ','FOHF','コモディティ','インフレヘッジ'],ans:"問１(1)\nカテゴリーA（相対価値/アービトラージ）：①転換社債アービトラージ、④債券アービトラージ、⑤株式マーケット・ニュートラル\nカテゴリーB（方向性）：②マネージド・フューチャーズ、③グローバル・マクロ\n\n問１(2) ファンド・オブ・ヘッジファンズ（FOHF）\n\n問１(3)\n【メリット2つ（以下から2つ選ぶ）】\n・優良ヘッジファンドへのアクセス提供\n・デュー・ディリジェンス（個別ファンドの精査・評価）に基づく投資決定\n・個別ファンドに対する投資後のモニタリング\n・適切なアロケーションによるリスク分散\n・解約制限の緩和\n\n【デメリット1つ（以下から1つ選ぶ）】\n・投資先ファンドの運用報酬に加え、FOHFのフィーが上乗せされる二重コスト\n・多くのFOHFが互いに類似したポートフォリオになる傾向がある\n・サブファンドの損益要因が必ずしも投資家に明確に説明されない\n・過度のテールリスクが許容",summary:"ヘッジファンド戦略のA/B分類とFOHFの特徴。コモディティの3キーワード（インフレヘッジ・コンビニエンスイールド・バックワーデーション）。金先物はF=S×(1+r−リースレート)で計算。",kps:['カテゴリーA（相対価値）：①転換社債アービトラージ、④債券アービトラージ、⑤株式MN','カテゴリーB（方向性）：②マネージド・フューチャーズ、③グローバル・マクロ','FOHF最大デメリット：二重コスト（ファンド手数料+FOHF手数料）','コンビニエンスイールド大→バックワーデーション（先物<現物）','金先物：F = S×(1+r−リースレート) = 2,600×1.037 ≈ 2,696ドル'],cms:['マネージド・フューチャーズをカテゴリーAに分類する（先物で方向性投資→B）','金先物でリースレートを加算する（正しくは減算）']},
{year:'2025',session:'PM',qnum:'06',unit:'u1_4',pts:30,topic:"通貨スワップのCF計算・時価評価・為替先渡価格・BS公式によるオプション価格・感応度・インプライドボラティリティスキューの解釈",subj:"証券分析",tags:['通貨スワップ','為替先渡','プットオプション','ブラックショールズ','デルタ','ベガ'],ans:"問１\n円固定金利（支払い） = −150億円×2% = −3億円（毎年）\n米ドル固定金利（受取り） = 100百万ドル×5% = 5百万ドル（毎年）\n\nＸ社から見たキャッシュフロー：\n1〜4年目：円−3億円、ドル+5百万ドル\n5年目：円−153億円（元本150億円+金利3億円）、ドル+105百万ドル（元本100百万ドル+金利5百万ドル）\n\n問２ Ｘ社から見た円建て時価評価額：−17.48億円\n\n円建て利付債の価値 B_yen：円1年金利2%なので150億円（元本100%）\nドル建て利付債の価値 B_USD：ドル1年金利3%\nB_USD = (100+5)/1.03 = 101.941...≒101.94百万ドル\n\n時価評価額 Vc = −B_yen + e×B_USD\n= −15,000百万円 + 130×101.94百万ドル\n= −15,000 + 13,252.2 = −1,747.8",summary:"通貨スワップのCF計算・時価評価。BS公式によるプット価格計算（5.30円）。感応度（デルタ・ベガ・ロー）の方向性を理解。インプライドボラティリティスキュー=左テールが厚い=円高リスクを市場が懸念。",kps:['通貨スワップCF：円支払い(−3億/年)・ドル受取(+5百万ドル/年)、満期は元本交換あり','通貨スワップ時価：Vc = −B_yen + e × B_USD（円安→Vcがプラス方向）','為替先渡：F = S × (1+rYen×T)/(1+rEur×T) = 158.42円/ユーロ','プット感応度：デルタ<0（S上昇→価格下落）、ベガ>0（σ上昇→価格上昇）、ロー<0（rYen上昇→価格下落）','ボラティリティスキュー：低行使価格ほど高IVの形状=円高方向の左テールリスク'],cms:['通貨スワップで元本交換を最終年のみに加算し忘れる','時価評価でドル利付債の価値をB_USD=100百万ドルとする（正しくは105/1.03≒101.94）','プットのロー符号を正（プラス）と誤答する（ロー<0でrYen上昇→価格下落）']},
{year:'2025',session:'PM',qnum:'07',unit:'u1_5',pts:20,topic:"Black-Littermanモデルによる均衡リターン計算・リサンプリング法・リスクバジェッティング・3ファクターモデルによる運用能力評価",subj:"証券分析",tags:['BlckLittermanモデル','均衡リターン','リサンプリング法','リスクバジェッティング','ファーマフレンチ','t検定'],ans:"問１\nw^T μ：ポートフォリオの期待リターン\nw^T Σw：ポートフォリオの分散\n\n問２ 国内株式の均衡リターン μ*_de = 5.51%\nμ*_de = (1/0.2) × (−0.0010×0.25 + 0.0010×0.25 + 0.0256×0.25 + 0.0185×0.25)\n= 5 × 0.25 × (−0.0010 + 0.0010 + 0.0256 + 0.0185)\n= 5 × 0.25 × 0.0441\n= 5 × 0.011025\n= 0.055125 ≒ 5.51%\n\n問３\nまず、過去データ等を用いて期待リターン・リスク・相関係数（オリジナル・パラメータ）を推定する。それらを前提にモンテカルロ・シミュレーションによってT個のサンプル・パスを生成する。生成したT個のサンプル・パスのデータを用いてパスごとに最適化計算を行い、T通りの効率的フロンティアを生成する。T",summary:"Black-Littermanモデルの均衡リターン計算（μ*=(1/τ)Σw_mkt）。ファーマ=フレンチ3ファクターモデルによる運用能力評価：αが有意でない→スキルなし、スタイルバイアス補正が重要。",kps:['均衡リターン：μ* = (1/τ) Σ w_mkt（μ*_de = 5×0.25×0.0441 = 5.51%）','αX = 0.052、SE=0.216 → t=0.241 < 2.0032 → αは有意でない（スキルなし）','βSMB有意かつ正、βHML有意かつ正 → 小型・バリュー株スタイル','TOPIXベースIR高いのはスタイルバイアスのためでスキルではない','リスクバジェッティング：xi×ωi = τ_p×IR_i（リスク量を予算として配分）'],cms:['均衡リターン計算でΣの行を間違える（国内株式=3行目の係数を使う）','αXのt値を確認せずに「アルファが正なのでスキルあり」と誤答する','βSMBが正→大型株スタイルと誤読する（正→小型株スタイル）']},
{year:'2025',session:'PM',qnum:'08',unit:'u1_3',pts:20,topic:"バシチェックモデル・コーラブル債キーレートデュレーション・変動利付債の感応度・CDS価格計算",subj:"証券分析",tags:['バシチェックモデル','イールドカーブ','コーラブル債','変動利付債','キーレートデュレーション','CDS'],ans:"問１(1) 0.90%\n低下した場合：Δz=−1として\nr1 = 0.01 + 0.3×(0.04−0.01) + 0.01×(−1) = 0.01 + 0.009 − 0.01 = 0.009 = 0.90%\n\n問１(2)\nrtの上昇：2年金利の変化 > 10年金利の変化\nθの上昇：2年金利の変化 < 10年金利の変化\nσの上昇：2年金利の変化 > 10年金利の変化（コンベクシティ効果を通じた金利低下は年限が長いほど大きい）\n\n問１(3)\n市場参加者がリスク回避的であれば、価格変動が大きい長期債のリターンにはリスクプレミアムが求められるため、その分だけ期待リターンは高い。しかし、このモデルが想定するリスク中立確率のもとでは、すべての資産の期待リターンは無リスクの短期金利になるように、将来の短期金利が上昇するとして長期債の期待リターンを抑える調整をする。モデルにおける短期金利の回帰水準は、",summary:"バシチェックモデルの短期金利変動計算（Δz=−1で0.90%）。コーラブル債の内蔵オプション理解。変動利付債の金利感応度は小さく（X≒1年債MD）、スプレッド感応度は大きい（Y≒5年債MD）。CDS計算：(0×0.98+65×0.02)/1.01≒1.29円。",kps:['バシチェック：低下の場合Δz=−1→r=1%+0.3×3%−1%=0.90%','コーラブル債：2年後に発行体がコール（または償還しない）権利→発行体保有のプット','変動利付債：金利感応度X≒1年債の修正デュレーション（非常に小）','変動利付債：スプレッド感応度Y≒同年限固定債の修正デュレーション（大）','CDS：デフォルト時保証金=(100−回収額)=65円、PV=(0×0.98+65×0.02)/1.01≒1.29円'],cms:['バシチェックモデルの低下計算でΔz=+1を使う（低下の場合はΔz=−1）','コーラブル債の内蔵オプションを「買い手のコール」と誤答する','変動利付債の金利感応度を「5年債と同程度」と誤答する（ほぼ1年債と同程度が正しい）']},
{year:'2025',session:'PM',qnum:'09',unit:'u1_8',pts:15,topic:"プロスペクト理論の空欄補充・損失回避と価値関数・確率非感応性による株価過大評価・ベイズの定理による条件付き確率計算",subj:"証券分析",tags:['プロスペクト理論','損失回避','気質効果','確率への非感応性','ベイズの定理','代表性ヒューリスティック'],ans:"問１(1)\n①参照点\n②愛好（株価が下落してリスク愛好的になる→損失領域でリスクを取る）\n③継続保有（含み損の株を売れずに持ち続ける）\n④気質効果\n⑤全資産\n⑥より高く\n\n問１(2)\n損失回避は、価値関数の曲線の傾きが参照点よりも資産価値が高い利得領域においては緩やかで、参照点よりも低い損失領域において急である点に示されている。（損失領域の傾きが利得領域の傾きよりも急なため、同額の損失は同額の利得より大きな痛みをもたらす）\n\n問１(3)\n過大評価されやすいのは株式Ｙ（正の歪度）。\n\n理由：投資家に確率への非感応性がある場合、客観的に発生する確率が小さいアウトカムについて過大評価する。正の歪度の確率分布を持つ株式Ｙは小さい確率でしか起きないが非常に大きなリターンが発生することがある。投資家はこの小さい確率を過大評価し、あたかも本当の発生確率よりも高い確率で大きなリターンが発生すると感じてしま",summary:"プロスペクト理論の空欄補充問題。損失回避=損失領域の傾きが急。正の歪度の株式が確率非感応性で過大評価される。ベイズの定理で17.4%（代表性ヒューリスティックで80%と思い込む誤りとの対比）。",kps:['参照点依存：購入価格を基準に評価（①参照点）','含み損→損失領域→リスク愛好的→継続保有（気質効果）','損失回避：損失領域の傾き > 利得領域の傾き','確率非感応性：低確率を過大評価→正の歪度（大きなリターンの低確率）が過大評価','ベイズの定理：P(倍|推奨)=0.04/0.23≒17.4%（直感の80%とは大きく乖離）'],cms:['②の空欄を「回避」とする誤り（損失領域でリスク愛好的になるため「愛好」が正しい）','③の空欄を「売却」とする誤り（含み損株は売れないから「継続保有」が正しい）','ベイズの定理の分母を0.80×0.05のみで計算する（分母はP(Y)全体）']},
{year:'2025',session:'PM',qnum:'10',unit:'u2_3',pts:20,topic:"売上債権回転期間・CF計算書作成・税効果会計（永久差異）・その他有価証券評価差額金・持分法適用",subj:"財務分析",tags:['売上債権回転期間','キャッシュフロー計算書','正常営業循環基準','税効果会計','永久差異','その他有価証券'],ans:"問１(1) 売上債権回転期間 = 14.4ヵ月\n計算式：売上債権回転期間 = 売上債権÷売上高×12ヵ月 = 12,000÷10,000×12 = 14.4ヵ月\n\n問１(2)\n資産の流動区分と固定区分にあたって用いられるのは、まずは正常営業循環基準である。このため、割賦債権の回収期間が1年を超える場合でも、正常営業循環に含まれる割賦債権は、回収期間の長短を問わず、一律に流動資産に分類される。\n\n問２(1) 投資活動及び財務活動によるCF：140百万円\n投資活動CF：受取配当金=+200百万円（建物・土地は減価償却・減損のみで取得・売却なし）\n財務活動CF：支払配当金=−60百万円\n合計：200−60 = 140百万円\n\n問２(2) 営業活動によるCF：1,160百万円\n営業活動CF = 税引前純利益2,000 + 減価償却費100 + 減損損失300\n　　　　　　− 売上債権増加0 − 棚",summary:"財務諸表分析の総合問題。CF計算書（間接法）の構造理解が重要。受取配当金は投資活動CF（永久差異=税効果会計の対象外）。その他有価証券は損益に計上せず純資産へ（評価差額金）。持分法は営業外収益。",kps:['売上債権回転期間=売上債権÷売上高×12=12,000/10,000×12=14.4ヵ月','正常営業循環基準：割賦債権は回収期間>1年でも流動資産','受取配当金（投資活動CF）は営業活動CFから控除（−200百万円）','受取配当金は永久差異→税効果なし→実際税負担率27%<法定30%の原因','その他有価証券：評価差額は損益計算書を通さず純資産（評価換算差額等）へ'],cms:['CF計算書で受取配当金を営業活動CFに加算する誤り（投資活動CFが正しい）','その他有価証券の評価益を当期純利益に計上する誤り（純資産直入が正しい）','持分法による投資利益を営業利益に含める誤り（営業外収益が正しい）']},
{year:'2025',session:'PM',qnum:'11',unit:'u2_1',pts:20,topic:"PBRの重回帰分析解釈・スチュワードシップ・トレードオフ理論・レバードベータ・WACC計算・合計の部評価（サムオブパーツ）・DCF法・MBO",subj:"コーポレートファイナンス",tags:['PBR','重回帰分析','ROIC','WACC','スチュワードシップ責任','エンゲージメント'],ans:"問１(1)\n①ROICの上昇はPBRを上昇させる（β̂1=12.87>0）\n②WACCの上昇はPBRを低下させる（β̂2=−2.43<0）\n\n問１(2)\nPER=配当性向÷(株主資本コスト−配当成長率)より、\n③配当成長率の増加関数（分母が小さくなる→PER上昇）\n④株主資本コストの減少関数（分母が大きくなる→PER低下）\n\n問２(1)\nスチュワードシップ責任とは、機関投資家が投資先企業の企業価値の向上や持続的成長を促すことにより、「顧客・受益者」の中長期的な投資リターンの拡大を図る責任である。\n\n問２(2)\n機関投資家と投資先企業が、企業経営の課題や懸念について共通認識を深め、問題を改善するために行う目的を持った対話をエンゲージメントという。協働エンゲージメントは、複数の機関投資家が協働してエンゲージメント活動を行うことである。\n\n問３(1)\n資本構成のトレードオフ理論とは、負債利用の長",summary:"PBR重回帰の係数解釈。レバードベータ・WACC計算。サムオブパーツ評価（Ｘ+Ｙ+Ｚの事業価値合計=1,860億円>市場1,580億円）。DCF法でＸ社企業価値=328.6億円。MBOの説明。",kps:['PBR：β1（ROIC係数）>0→ROIC上昇でPBR上昇、β2（WACC係数）<0→WACC上昇でPBR低下'],cms:['D/Eレシオの分母を企業価値ベースで計算する誤り（正しくは株式価値ベース）','WACC計算でD/(D+E)=0.25を使う誤り（正しくは0.20=0.25/1.25）','DCF法のターミナルバリューを1年目から計算する誤り（3年後以降→TV₂=26/0.08、2年末時点）']},
{year:'2024',session:'AM',qnum:'01',unit:'u4_1',pts:24,topic:"証券アナリスト職業行為基準（銀行営業・ファンドマネジャー・証券アナリストの3ケース）",subj:"職業倫理",tags:['職業行為基準','適合性確認','忠実義務','未公開情報'],ans:"【問１ 田中さん】以下4つのうち2つ（①と②はどちらか1つ）：\n①条項4⑴：顧客の資産状況・投資経験・投資目的を確認しておらず違反。\n②条項4⑵：推奨商品が顧客の投資目的等に適合しているか配慮していないため違反。\n③条項6⑴：販売手数料目的で自己利益を顧客の利益に優先させているため違反。\n④条項3⑷：「絶対に儲かりますよ」と投資成果を保証する表現を用いており違反。\n\n【問２ 大山さん】以下6つのうち2つ（①②③はいずれか1つ、④⑤はどちらか1つ）：\n①条項3⑴：X社株式組入れは綿密な調査・分析に基づく合理的根拠がなく違反。\n②条項6⑴：母体企業財務部長の要請でX社株式を1％以上組み入れは顧客最善利益でなく違反。\n③条項9⑶：発行者との独立性・客観性を保持した公正な判断をしていないため違反。\n④条項3⑴：環境対策評価を更新せず低PBR銘柄を選別・入替えたのは合理的根拠がなく違反。\n⑤条項6⑵",summary:"3つのケーススタディで職業行為基準の適合性確認・忠実義務・未公開情報利用禁止の違反を判定。条項番号（末端記号まで）と理由の記述が必須。",kps:['4⑴：顧客の財務状況・投資経験・投資目的の十分な確認義務','3⑷：投資成果を保証するような表現の禁止','6⑴：顧客の最善の利益のみに専念し自己・第三者利益を優先させない忠実義務','4⑶イ：投資対象選定の基本的原則・手法の重大な変更の開示義務','8⑵：情報受領者による未公開重要情報の利用・伝達禁止'],cms:['条項番号の末端まで（4⑴、6⑴など）記載しないと不正解','問１では①②はどちらか1つ（4⑴か4⑵）という制約を見落とす','問２では①②③のうち1つ、④⑤のうち1つという制約がある']},
{year:'2024',session:'AM',qnum:'02',unit:'u4_1',pts:20,topic:"証券アナリスト職業行為基準（鈴木さん事例：講師料不開示・会食・未公開情報伝達・裏付け調査なし）",subj:"職業倫理",tags:['職業行為基準','利益相反開示','未公開情報','裏付け調査'],ans:"【問１ 7月以降・山本さん関係】\n条項7⑴：鈴木さんは特別なリサーチ情報をC社の山本さんに提供し実質的にC社から講師料として個人的に報酬を受領しているにもかかわらず、作成するレポートにおいてその事実を開示していないことは条項7⑴に違反する。\n\n【問２ 4月以降・佐々木さん関係】以下3つのうち2つ：\n①条項6⑴：B社に会食費用を頻繁に負担してもらっていることは顧客の利益に専念していないため忠実義務に違反する。\n②条項7⑴：公正かつ客観的な証券分析業務の遂行を阻害すると合理的に判断される事項を開示していないため違反。\n③条項9⑶：B社に会食費用を繰り返し負担してもらうことは発行者との独立性・客観性の保持に注意しているとはいえず違反。\n\n【問３ 11月27日・30日】\n条項8⑵：鈴木さんは佐々木さんからB社に関する未公開の重要情報を伝えられたにもかかわらず、当該情報をC社の山本さんに伝えたため条",summary:"時系列ごとに異なる違反を問う問題。問２の「条項を2つ示す」という特殊形式に注意。12月1日は正式発表後なので8⑵（未公開情報）でなく3⑴（裏付け調査）が正解。",kps:['7⑴：公正客観な業務遂行を阻害する事項の顧客への開示義務（報酬受領の開示）','8⑵：情報受領者による未公開重要情報の利用・伝達禁止','3⑴：綿密な調査・分析に基づく合理的かつ十分な根拠（裏付け調査義務）','6⑴：忠実義務','問２は1つの行為に対して条項を2つ示す'],cms:['問２で条項を1つしか示さない（2つ必須）','12月1日の行為（正式発表後）を未公開情報問題（8⑵）と混同','11月27日（情報受領）と11月30日（伝達）は8⑵違反とまとめて認識']},
{year:'2024',session:'AM',qnum:'03',unit:'u2_1',pts:15,topic:"新事業投資のWACC・アンレバードβ・NPV・APV計算",subj:"コーポレート・ファイナンス",tags:['IRR','WACC','CAPM','アンレバードβ','NPV','APV'],ans:"【問１】\nIRRとは、投資によってもたらされる将来のキャッシュフローの割引現在価値合計が投資額と等しくなるような（NPVが0となるような）割引率のこと。IRR法の投資決定ルールは、IRRが事業の資本コスト（ハードルレート）を上回るときに投資を実施すべき。\n\n【問２】\n税引後WACC = (600/800)×(1-0.25)×4% + (200/800)×11% = 2.25% + 2.75% = 5%\n\n【問３】\nY社のアンレバードβ = 1.2 / [1+(1-0.25)×(400/600)] = 1.2 / 1.5 = 0.8\n新事業の資本コスト = 1% + 0.8×(7%-1%) = 5.8%\n\n【問４】\nNPV = 21/0.056 - 300 = 375 - 300 = 75億円\n\n【問５】\n⑴ 節税効果の現在価値 = 300×4%×25% / 4% = 300×0.25 = ",summary:"MM理論の節税効果とAPV計算が中心。アンレバードβの計算式と企業価値計算の順序が重要ポイント。",kps:['WACC = Σ(資本のウェイト×コスト)、負債コストは(1-t)をかけた税引後コスト'],cms:['WACCで負債コストを税引前のまま使用する（4%→4%×(1-0.25)=3%が正）','アンレバードβの計算式で(1-t)を忘れる','新事業後の企業価値に初期投資300億円を加えるのを忘れる']},
{year:'2024',session:'AM',qnum:'04',unit:'u2_3',pts:26,topic:"医薬品3社（X・Y・Z社）のROEデュポン分析・ロイヤリティ・金融資産回転期間・PBR要因分析",subj:"財務分析",tags:['ROE','デュポン分解','売上高総利益率','ロイヤリティ','金融資産回転期間','PBR'],ans:"【問１⑴】\n(a) X社売上高純利益率 = 3,744/12,599 = 29.7%\n(b) X社総資本回転率 = 12,599/18,702 = 0.67回\n(c) X社財務レバレッジ = 18,702/14,249 = 1.31倍\n(d) Y社売上高純利益率 = 1,180/4,267 = 27.7%\n(e) Y社総資本回転率 = 4,267/13,118 = 0.33回\n(f) Y社財務レバレッジ = 13,118/11,219 = 1.17倍\n\n【問１⑵】\n売上高純利益率においては差がほとんどないが、Z社の総資本回転率がX社・Y社より高く、財務レバレッジもX社・Y社より高いことが要因。ROEはZ社66.7%と非常に高い。\n\n【問２⑴】\n(g) X社：(7,836-1,088)/(12,599-1,088) = 6,748/11,511 = 58.6%\n(h) Y社：(3,645-1",summary:"ROEデュポン分解の計算と、ロイヤリティ収入・金融資産・ペイアウト政策が財務指標に与える影響を多角的に分析する問題。",kps:['ROE = 売上高純利益率 × 総資本回転率 × 財務レバレッジ','ロイヤリティ控除後の売上高総利益率 = (売上総利益-ロイヤリティ) / (売上高-ロイヤリティ)','金融資産回転期間(日) = 365 / (売上高/金融資産)','Z社の高ROE要因：高い総資本回転率（金融資産最小化政策）＋高い財務レバレッジ（積極ペイアウト）'],cms:['ロイヤリティ収入控除で分子だけ引いて分母を引かない','金融資産回転期間の公式で365を忘れる','財務レバレッジは総資産/株主資本（負債/株主資本ではない）']},
{year:'2024',session:'AM',qnum:'05',unit:'u1_2',pts:20,topic:"ファンド評価・IR・FF3ファクターモデル・統計的検定・パッシブコア・執行コスト",subj:"証券分析",tags:['インフォメーション・レシオ','FF3ファクターモデル','仮説検定','パッシブコア戦略','執行コスト','マーケットインパクト'],ans:"【問１】\nファンドAのTOPIX対超過リターン = 0.35-0.36 = -0.01%は運用報酬率0.01%と等しい（報酬控除前リターンはTOPIXと等しい）。TE=0.02%と十分に小さいことから、パッシブファンドとして優れていると判断できる。\n\n【問２】\nIR（年率）= 対TOPIX超過リターン / TE\n= (0.35-0.36)×12 / (2.05×√12)\n= -0.12 / 7.1014...\n= -0.0169... ≈ -0.02\n\n【問３】\n・サイズ・ファクター：βSMB = 0.84と正の値→小型寄り。t値=9.59と十分に大きく係数は有意。\n・バリュー・ファクター：βHML = -0.17と負の値→グロース寄り。|t値|=3.20と十分に大きく係数は有意。\n\n【問４】\nファンドBの超過リターン平均 = 0.40-0.36 = 0.04%、TE = 1.58%\nZ ",summary:"ファンド評価の多角的問題。IR計算の月率→年率換算（√12使用）、仮説検定の手順、執行コストの定義を理解することが重要。",kps:['IR（年率）= 超過リターン（月率）×12 / TE（月率）×√12','t検定：Z = 超過リターン平均 / (TE/√n)、n=60カ月','マーケットインパクト = 平均約定価格 - 最良売気配（ASK）','タイミングコスト = 最良買気配（BID）- 参照価格（前日終値）'],cms:['IR年率化で分子を×12だけして分母の√12を忘れる','執行コストの定義混同：マーケットインパクトとタイミングコスト','仮説検定で両側検定の棄却域1.96を使う（片側なので1.645）']},
{year:'2024',session:'AM',qnum:'06',unit:'u1_3',pts:25,topic:"スポットレート・カーブ分析：割引債価格・バシチェックモデル・ファクターモデル・コンベクシティ・ロールダウン",subj:"証券分析",tags:['スポットレート','バシチェック','コンベクシティ','ロールダウン','ファクターモデル'],ans:"【問１⑴】3年割引債価格＝100/(1.030)³＝100/1.09273≈91.51円\n\n【問１⑵】\n3年割引債の1年後価格＝2年割引債の現在価格＝100/(1.025)²＝95.181円\n1年間リターン＝95.181/91.51-1≈(1+R3)³/(1+R2)²-1\n＝(1.030)³/(1.025)²-1＝1.092727/1.050625-1≈4.01%\n\n【問１⑶】①長期回帰水準 ②上昇 ③平均回帰の調整速度 ④コンベクシティ ⑤低下\n\n【問２⑴】最も大きい：5年、最も小さい：1年\n（β1,i²+β2,i²+β3,i²が最大の期間：5年で0.068）\n\n【問２⑵】最大：10年\n理由：修正デュレーションは期間の長いものほど大きく、10年割引債の修正D×スポットレート標準偏差の積が最大。\n\n【問２⑶】①F2が1上昇：2年割引債のリターンが大きい（Δ R2＝-0.11%、Δ R5＝-",summary:"スポットレート・カーブ分析の総合問題。バシチェックモデル、3ファクターモデル、コンベクシティによるPFリターン差分析、ロールダウン効果まで幅広い知識が必要。",kps:['割引債価格＝100/(1+Ri)^i（スポットレートで割引）','1年後リターン＝(1+R3)³/(1+R2)²-1（スポットレートカーブ不変の場合）','バシチェック：θ（長期回帰水準）・κ（平均回帰速度）・コンベクシティ効果','バーベル型（P）vsブレット型（Q）：コンベクシティ差がパラレルシフトでPに有利','ロールダウン効果：右上がりカーブで時間経過により利回り低下→価格上昇'],cms:['問１⑵で1年後価格を現在の2年割引債価格ではなく3年のスポットレートで計算','問３⑴でコンベクシティ差の計算にΔyの2乗を忘れる','問３⑵でシナリオの形状（フラット化・ネガティブバタフライ）の特定を誤る']},
{year:'2024',session:'AM',qnum:'07',unit:'u1_8',pts:10,topic:"ライフサイクル投資方針・積立投資の資産価値計算・LPM（下方部分積率）・ヘッジファンドデータバイアス",subj:"証券分析",tags:['ライフサイクル投資','積立投資','LPM','モンテカルロ','ヘッジファンドバイアス'],ans:"【問１】①貯蓄（銀行預金・安全資産等） ②積立 ③確定拠出年金制度（DC）または企業型DC・iDeCo ④少額投資非課税制度（NISA）（③と④は順不同）\n\n【問２①】簿価（元本）＝60+60+60＝180万円\n\n【問２②】資産価値の期待値\n＝60×1.05³+60×1.05²+60×1.05\n＝69,457.5+66,150+63,000\n＝198,607.5≈1,986,075円（≈198.6万円）\n（計算）60×1.157625+60×1.1025+60×1.05\n\n【問３①】元本割れ確率（LPM0）＝2,091/10,000＝0.2091≈20.9%\n\n【問③②】元本割れ金額の期待値（LPM1）\n各階級の損失額＝(100-階級平均値)×頻度\n(100-79)×1+(100-84)×117+(100-88)×966+(100-92)×852+(100-98)×155\n＝21+1,87",summary:"ライフサイクル投資から積立投資の数値計算、LPM、ヘッジファンドデータバイアスまで多岐にわたる問題。LPM1の計算は手順を丁寧に。",kps:['積立投資の期待値：各期の投資額を複利計算で終期まで繰り上げ','LPM0（下方部分積率0次）＝元本割れ確率','LPM1（下方部分積率1次）＝元本割れ時の期待損失額','残存者バイアス：成績不振で廃業したファンドが除外→平均リターン過大評価','iDeCo・NISAは非課税運用口座（頻出用語）'],cms:['問２②でX3年末なのにX3年初の投資を1年分のみ複利で計算（×1.05³ではなく×1.05）','LPM1の計算で分母を総試行数10,000ではなく元本割れ件数2,091にしない','積立順序を逆にする（X1年初の60万は3年間運用で×1.05³）']},
{year:'2024',session:'AM',qnum:'08',unit:'u1_4',pts:15,topic:"B-Sプット理論価格・バリア・オプション・スワップレート計算・デュレーションマッチング",subj:"証券分析",tags:['B-Sモデル','プットオプション','バリアオプション','スワップレート','デュレーションマッチング'],ans:"【問１】プット理論価格\nP＝-S×N(-d1)+K×e^-rT×N(-d2)\n＝-2,400×0.4578+2,400×0.9950×0.5141\n＝-1,098.72+2,388×0.5141\n＝-1,098.72+1,227.67≈128.95≈129.0\n\n【問２⑴】ダウン・アンド・アウト型は、満期前に原資産（TOPIX）がバリア水準（2,200）以下に1度でもなった場合に権利が消滅するプットオプション（ノックアウト・オプション）。通常のプットはそのような条件がない。\n\n【問２⑵】理論価格は「低い」。理由：ダウン・アンド・アウト型（権利消滅）＋ダウン・アンド・イン型（権利発生）＝通常のプット。両者は正の価値を持つため、ダウン・アンド・アウト型単独の価格は通常のプット価格より低い。\n\n【問３】スワップレート\nr＝(1-d(5))/(割引係数の累積)＝(1-0.8839)/4.6785＝",summary:"B-SモデルでのATMプット価格計算→バリアオプションの比較→スワップレート→デュレーションマッチングと段階的な問題構成。スワップレート公式とデュレーションギャップの理解が核心。",kps:['B-Sプット：P＝-S×N(-d1)+K×e^-rT×N(-d2)（N(-)を使う点に注意）','バリアオプションの価値関係：ノックイン+ノックアウト＝通常オプション','スワップレート＝(1-最終期割引係数)/(割引係数の累積値)','デュレーションギャップ＝D資産-(L/A)×D負債','DGapを解消：固定受けスワップで資産の修正D引き上げ'],cms:['B-SプットでN(-d1)とN(-d2)の使い方を混同（P：N(-d1)×(-S)+N(-d2)×K×e^-rT）','スワップレート計算でd(5)を足すべきところを引く方向を誤る','デュレーションマッチングで固定「払い」と「受け」を逆にする']},
{year:'2024',session:'AM',qnum:'09',unit:'u1_5',pts:10,topic:"Black-Littermanモデル：均衡リターンの逆算・viewの反映・最適ウェイトへの影響",subj:"証券分析",tags:['Black-Litterman','均衡リターン','相場見通し','平均分散アプローチ'],ans:"【問１】①均衡リターン ②投資家の独自の相場見通し（view）\n\n【問２】Π＝(1/τ)Σwmkt\n＝(1/0.5)×（対角Σ）×wmkt\n国内株式：(1/0.5)×0.04×0.2＝0.016（1.6%）\n外国株式：(1/0.5)×0.0625×0.5＝0.0625（6.25%）\n外国債券：(1/0.5)×0.0025×0.3＝0.0015（0.15%）\n∴Π＝(0.0160, 0.0625, 0.0015)T＝(1.60%, 6.25%, 0.15%)\n\n【問③①期待リターン】viewを反映させることで均衡リターンと比べてμBLでは外国株式が6.25%→5.22%に低下、外国債券が0.15%→0.19%に上昇し、外国株式と外国債券の超過リターン差が縮小。ただしviewの4%差がそのまま反映されるのではなく均衡リターン差に近づく形で修正される。\n\n【問③②分散・共分散】均衡モデルとvie",summary:"BLモデルの直感的理解（均衡リターン逆算+view）と数値計算（均衡リターンの逆算）。viewの反映により最適ウェイトが現実的になるメカニズムを理解することが重要。",kps:['BL均衡リターン逆算：Π＝(1/τ)Σwmkt（市場PFから逆算）','viewなし投資家→市場ポートフォリオを選択（BLの特性）','viewあり投資家→均衡リターンとviewを組み合わせた期待リターンを使用','viewにより相関が変化（元の独立仮定から共分散が発生）','外国債券wBL＝0.124（平均分散アプローチの4.00から大幅改善）'],cms:['問２でΠの計算にτ/1ではなく1/τを使う（Σwmkt=τΣΣ^-1Π=τΠより）','問③③で「最適ウェイトが市場PFに近くなった」という本質を説明せず数値の変化だけ述べる']},
{year:'2024',session:'AM',qnum:'10',unit:'u3_3',pts:15,topic:"独占市場の均衡・消費者余剰・死荷重・完全競争との比較・季節調整法",subj:"市場と経済の分析",tags:['独占','死荷重','限界費用','消費者余剰','季節調整法'],ans:"【問１】\n①MC＝20（dC/dX＝20）\n②限界収入（MR）\n③MR＝MC：60-X＝20→X1＝40\n④P1＝60-40/2＝40\n⑤独占の消費者余剰＝(1/2)×(60-40)×40＝400\n\n【問２⑴】完全競争の消費者余剰\n＝(1/2)×80×(60-20)＝(1/2)×80×40＝1,600\n完全競争の消費者余剰（1,600）>独占の消費者余剰（400）→完全競争の方が大幅に大きい。\n\n【問２⑵】名称：独占の死荷重（デッドウェイト・ロス）\n大きさ：(1/2)×(40-20)×(80-40)＝(1/2)×20×40＝400\n（P1からP0の価格差×X1からX0の数量差の三角形）\n\n【問③】名称：季節調整法\n方法の例：\n・原系列の移動平均をとる（前後数ヵ月の平均をとって季節性を除去）\n・季節調整済み系列（米国商務省センサス局法X-12-ARIMA等）を利用する\n・変化率を対前年同月比",summary:"独占企業の利潤最大化（MR＝MC）から消費者余剰・死荷重の計算まで。完全競争との比較が必須。季節調整法は時系列分析の基礎。",kps:['逆需要関数：P＝60-X/2→MR＝60-X（傾きが2倍急勾配）','独占均衡：MR＝MC→X1＝40、P1＝40','消費者余剰＝三角形ABE面積＝(1/2)×（最高支払価格-均衡価格）×均衡数量','死荷重（デッドウェイト・ロス）＝独占と完全競争の総余剰の差','季節調整法：季節性（特定月に繰り返し現れるパターン）を除去'],cms:['MRが需要曲線より2倍急勾配（切片同じで傾きが2倍）という関係を忘れる','死荷重の面積計算で独占価格-独占数量間の長方形を含めてしまう','季節調整法の説明で「理由」でなく「方法」を説明する必要がある']},
{year:'2024',session:'PM',qnum:'01',unit:'u3_3',pts:15,topic:"関税賦課の余剰分析・幼稚産業保護論（A国・財Z・20%関税）",subj:"市場と経済の分析",tags:['関税','余剰分析','幼稚産業保護','死荷重','小国モデル'],ans:"【問１⑴】\n①生産者余剰の増加：(20+30)÷2×10＝250増加\n②関税収入の増加：(60-30)×10＝300増加\n③消費者余剰の減少：(60+70)×10÷2＝650減少\n\n【問１⑵】総余剰の変化＝250+300-650＝-100（100減少）\n\n【問２】関税賦課の問題点：生産者余剰と関税収入の増加合計（250+300=550）を消費者余剰の減少（650）が上回り、総余剰が減少する（死荷重が発生する）。\n\n【問３⑴】規模の経済が働くことで、生産量が拡大するほど平均費用が低下する収穫逓増になる。\n\n【問３⑵】留意点の例：\n①保護対象産業に規模の経済が働くか事前に見極めが困難\n②規模の経済が働く産業でも保護貿易が最善とは限らない\n③貿易相手国から報復関税を課せられる可能性がある",summary:"小国モデルの関税賦課分析。消費者余剰の減少が生産者余剰＋関税収入を上回り死荷重が発生。幼稚産業保護の論理と限界も問われる。",kps:['小国モデル：関税賦課は総余剰を必ず減少させる（死荷重L+N）','生産者余剰増加＋関税収入＜消費者余剰減少','死荷重＝(P1-P0)×(X0-X1)/2＋(P1-P0)×(X2-X3)/2（非効率な生産＋消費の損失）','幼稚産業保護：規模の経済で将来競争力獲得が期待できる産業','平均費用逓減（収穫逓増）が幼稚産業保護の経済学的根拠'],cms:['関税収入の計算を輸入量×関税率（金額）と混同','消費者余剰の変化を台形ではなく三角形で計算','大国モデルとの混同（大国では総余剰が増加する可能性あり）']},
{year:'2024',session:'PM',qnum:'02',unit:'u3_1',pts:15,topic:"投資関数・IS-LM・GDP ギャップ・テイラールール・TFP成長率計算",subj:"市場と経済の分析",tags:['IS-LMモデル','GDPギャップ','テイラールール','成長会計','フィリップス曲線'],ans:"【問１】金利上昇→資本コスト増加→借入意欲減退→投資減少。自己資金投資の場合も金利上昇は機会費用の上昇を意味するため投資減少。\n\n【問２】BのIRR増加→IS曲線が右方シフト（IS0→IS1）→LM曲線との交点がE0→E1（右上移動）→総生産Y0*→Y1*増加、金利r0*→r1*上昇。\n\n【問３⑴】GDPギャップ＝実際の総生産－長期均衡総生産（完全雇用GDP）\n\n【問３⑵】フィリップス曲線（GDP版）よりGDPギャップ増加→インフレ率上昇。テイラールールでは名目金利＝γ×（インフレ率）＋定数（γ>0）となるため、インフレ率上昇時に中央銀行は利上げを実施する。\n\n【問４】TFP成長率＝2.0－0.4×3.0－(1－0.4)×(－0.5)＝2.0－1.2＋0.3＝1.1%",summary:"IS-LM分析から中長期のGDPギャップ・テイラールールへ、さらに成長会計のTFP計算まで幅広いマクロ経済の問題。TFP計算は頻出。",kps:['IS曲線の右シフト条件：投資増加・政府支出増加・消費増加など','GDPギャップ＝実際GDP－潜在GDP（正の値＝インフレギャップ）','テイラールール：インフレ率上昇→名目金利引き上げ（γ>1なら実質金利も上昇）','成長会計（コブ＝ダグラス）：ΔY/Y＝ΔTFP/TFP＋α×ΔK/K＋(1-α)×ΔL/L','TFP成長率＝1.1%＝残差（技術進歩・経営効率等の寄与）'],cms:['TFP計算で労働分配率＝1-資本分配率を忘れる','労働成長率がマイナスの場合の符号処理ミス','GDPギャップの定義を（潜在GDP-実際GDP）と逆にする']},
{year:'2024',session:'PM',qnum:'03',unit:'u1_1',pts:15,topic:"A社株式評価：残余利益モデル・インプライド期待リターン・配当性向変更の影響",subj:"証券分析",tags:['残余利益モデル','インプライド期待リターン','DDM','定率成長モデル','ROE'],ans:"【問１】\n期首BPS＝1,000円、ROE＝9%→EPS＝90円\n残余利益＝EPS-BPS×要求収益率＝90-1,000×0.08＝10円\ng＝ROE×(1-配当性向)＝9%×0.8＝7.2%\n理論株価＝1,000+10÷(0.08-0.072)＝1,000+1,250＝2,250円\n→市場株価1,500円<理論株価2,250円∴割安\n\n【問２】インプライド期待リターンとは、現在の市場株価と将来の予想配当からDDMを使って逆算した株主要求収益率のこと。\nインプライド期待リターン＞株主の要求収益率なら割安、逆なら割高と判断する。\n（参考：A社のインプライド期待リターン＝(1,000×0.09×0.2)/1,500+0.072＝0.084＝8.4%>8%→割安）\n\n【問３】配当性向30%、ROE9%\ng＝0.09×0.7＝6.3%、DPS＝1,000×0.09×0.3＝27円\n理論株価＝27÷",summary:"残余利益モデル・DDM・インプライド期待リターンを組み合わせた株式評価の総合問題。配当性向変更・ROE変化の複合シナリオも必須。",kps:['残余利益＝EPS-BPS×r（r＝株主要求収益率）','残余利益モデル：理論株価＝BPS+残余利益/(r-g)','サステイナブル成長率g＝ROE×留保率＝ROE×(1-配当性向)','インプライド期待リターン＝D1/P0+g（DDMの逆算）','定率成長DDM：P＝D1/(r-g)（r>gが必要条件）'],cms:['残余利益モデルで期首BPSを使うべきところを期末BPSで計算','成長率gを求める際にROE×(1-配当性向)でなくROE×配当性向とする','問４で期首BPSの更新を忘れる（1,063円に更新）']},
{year:'2024',session:'PM',qnum:'04',unit:'u1_6',pts:15,topic:"最小分散PF・カバー付き金利パリティ・購買力平価・オルタナティブ投資",subj:"証券分析",tags:['最小分散ポートフォリオ','カバー付き金利パリティ','購買力平価','オルタナティブ','Jカーブ'],ans:"【問１⑴】\nw（国内株式）＝0.3²/(0.2²+0.3²)＝0.09/0.13＝0.6923≈69.2%\nポートフォリオリスク＝√(0.6923²×0.04+0.3077²×0.09)＝√0.02769≈16.6%\n\n【問１⑵】\n2つのリスク資産の期待リターンは同じ10%なので、最小分散PFが接点PFとなる。\nリスクの半分（8.3%）のPFは、接点PF（国内・米国株式）50%＋安全資産50%\n期待リターン＝0.5×10%+0.5×2%＝6.0%\n\n【問２⑴】カバー付き金利パリティ：\nF＝150×(1+0.02)/(1+0.06)＝150×1.02/1.06＝144.34円/ドル\n\n【問２⑵】相対的購買力平価：\n為替変化率＝日本インフレ率-米国インフレ率＝1.0-4.0＝-3.0%（円高）\n\n【問２⑶】取引費用など国際間の財・サービス市場で裁定取引が困難なため。\n\n【問３⑴】効果：リターン",summary:"最小分散PF計算・分離定理・カバー付き金利パリティ・購買力平価・オルタナティブ投資と幅広い内容。計算問題の正確性と理論説明の両方が必要。",kps:['相関ゼロの最小分散：w1＝σ2²/(σ1²+σ2²)','2資産の期待リターンが等しい場合：最小分散PF＝接点PF（分離定理）','カバー付き金利パリティ：F＝S×(1+r国内)/(1+r海外)','相対的購買力平価：期待為替変化率≈π国内-π海外','Jカーブ：初期は費用先行でマイナス、後半にプラスに転じる'],cms:['最小分散公式でσを使わずσ²（分散）を使うことを忘れる','カバー付き金利パリティの分子・分母を逆にする','購買力平価の変化率の符号（日本-米国）を逆にする']},
{year:'2024',session:'PM',qnum:'05',unit:'u1_3',pts:15,topic:"二項ツリーによる割引債評価・コーラブル債評価・RMBS期限前償還",subj:"証券分析",tags:['二項ツリー','コーラブル債','OAS','RMBS','ネガティブコンベクシティ'],ans:"【問１⑴】現在の2年割引債価格\n＝（0.5×96.154+0.5×98.039）/（1+0.03）＝97.0965/1.03＝94.268円\n\n【問１⑵】大きい。投資家がリスク回避的であれば、2年割引債投資にリスクプレミアムを求めるため、価格は予測金利に基づく水準よりリスクプレミアム分だけ低くなる。これに対応してリスク中立確率下の将来短期金利の期待値は現実の期待値よりも高くなる。よって0.51%は現実の金利変化幅の期待値より大きい。\n\n【問２⑴】\nノード⑥：利払い含まない価格103.843-2.80=101.043>100円→コールされるため価格が小さくなる\nノード③・①：⑥を使って割引計算するため価格が小さくなる\nノード②・④・⑤：変わらない\n\n【問２⑵】OAS（オプション調整後スプレッド）\n\n【問２⑶】利回り低下時：ノンコーラブル債（コール確率増加でコーラブル債の価格上昇が抑制される）",summary:"二項ツリーによる割引債評価とリスク中立確率の解釈、コーラブル債のノード別評価、OASの概念、RMBSのネガティブコンベクシティの説明が必要。",kps:['二項ツリー評価：現在価値＝(p×Cu+(1-p)×Cd)/(1+r)','リスク中立確率下の期待値>現実の期待値（リスクプレミアム分）','コーラブル債：発行体がコール有利なノードで額面償還→価格が小さくなる','OAS（Option-Adjusted Spread）：コーラブル債と理論価格の差を調整するスプレッド','RMBS：金利上昇→繰上返済減少→デュレーション延長→価格下落拡大'],cms:['コーラブル債でコールされるノードの判定（利払い含む価格>100円かどうか）','利回り低下時の価格上昇の優劣（コール確率が鍵）','RMBSのネガティブコンベクシティの説明でデュレーション変化に言及しない']},
{year:'2024',session:'PM',qnum:'06',unit:'u1_2',pts:10,topic:"バリュー・グロースファンドのパフォーマンス評価・スタイル戦略",subj:"証券分析",tags:['スタイル投資','バリューファンド','グロースファンド','IR','スタイルミックス','スタイルローテーション'],ans:"【問１】\nファンドA：TEが8.7%と十分なアクティブリスクを取っている。IRが0.16と正の超過リターンを効率的に獲得できている。\nファンドB：TEが9.3%と十分なアクティブリスクを取っている。IRが0.14と正の超過リターンを効率的に獲得できているが、最大DDが-63.2%と大きく積み上げた投資成果を大きく毀損することがあった点に留意が必要。\n\n【問２】ファーマ＝フレンチの3ファクター・モデルなど、バリュー・ファクターを含むモデルで回帰分析を行い、定数項（α）が有意に正であるかどうかを検証する。\n\n【問３】（案1を選択した場合）\n⑴ 両ファンドの超過リターン相関係数は0.02と低く、分散効果によりTEを低減して効率的な超過リターンの獲得が期待できる。\n⑵ 最適な投資比率が変動する可能性があり、固定した投資比率が最適でなくなる懸念がある。またスタイルの特性が打ち消し合い超過リターンの源",summary:"スタイル特化型ファンドのパフォーマンス評価問題。IRで効率性を測り、FF3Fモデルで真の銘柄選択能力を確認する手法が核心。",kps:['IR（情報比）＝超過リターン/TE（高いほど効率的）','最大ドローダウン：資産価値の過去ピークからの最大下落率（グロースは大きい）','FF3ファクター：市場・サイズ・バリュー（HML）のファクターで調整','スタイルミックス：相関低い2ファンド組合せでTE削減効果','スタイルローテーション：タイミング予測精度が成否を左右'],cms:['銘柄選択能力の確認にSharpe比やIRだけで十分と考える（マルチファクター調整が必要）','スタイルミックスの利点を超過リターン向上と誤解（リスク分散が主効果）']},
{year:'2024',session:'PM',qnum:'07',unit:'u1_5',pts:25,topic:"最適マネジャー配分比率の導出・ポータブルアルファ戦略・t検定によるαの有意性",subj:"証券分析",tags:['マネジャーストラクチャー','最適配分比率','ポータブルアルファ','IR','FF3Fモデル','t検定'],ans:"【問１⑴】U/(∂xi)＝αi-(1/τ)×xi×ωi²＝0より xi*＝τ×αi/ωi²\n\n【問１⑵】IRi＝αi/ωiなのでαi＝IRi×ωi。これを代入：\nxi*＝τ×(IRi×ωi)/ωi²＝τ×IRi/ωi\n\n【問２】ポータブル・アルファ戦略（オーバーレイ戦略）。TOPIX先物の売りポジションを取りつつ、他資産クラスへの配分を維持することで政策アセットミックスを保ちながらアクティブ配分を110%に引き上げる。\n\n【問３】x1*＝τ×IR1/ω1＝0.06×0.3/ω1＝0.20→ω1＝0.06×0.3/0.20＝0.09（9%）\nx2*＝τ×IR2/ω2＝0.06×0.25/ω2＝0.20→ω2＝0.06×0.25/0.20＝0.075（7.5%）\nマネジャー2はIRがマネジャー1より低いが推定TEがω2＝7.5%と低く（マネジャー1のω1＝9%より低い）、その分最適配分比率が押",summary:"マネジャーストラクチャー最適化の数学的導出（xi*＝τ×IR/ω）とその実務応用が中心。ポータブルアルファ、FF3Fモデルのt検定も含む高度な総合問題。",kps:['最適配分比率：xi*＝τ×IRi/ωi（IRが高い・TEが低いほど多く配分）','ポータブルアルファ：TOPIX先物売り+アクティブ超過配分で政策AAM維持','FF3F自由度：n-k-1＝60-3-1＝56（k＝3ファクター）','t検定：t＝α̂/SE(α̂)、両側5%棄却域はt0.025(56)＝2.003','IRが同じでもωが低いと最適配分比率が高くなる'],cms:['問１⑵でIRの定義αi/ωiを代入するステップを省略する','問６で自由度を60（サンプル数）と誤る','問６でt値1.6875<2.003を見て棄却（有意）と誤判断する']},
{year:'2024',session:'PM',qnum:'08',unit:'u1_4',pts:15,topic:"プット・コール・パリティ・ベア・コール・スプレッドのVaR・デルタガンマヘッジ",subj:"証券分析",tags:['プットコールパリティ','ベアコールスプレッド','VaR','デルタガンマヘッジ','B-Sモデル'],ans:"【問１】プット・コール・パリティ：P＝C+K×e^-rT-S\nP＝1,044+30,250×0.99402-30,000＝1,044+30,069.1-30,000≈1,113円\n\n【問２】\n(B)コールのデルタ＝プットのデルタ+1＝-0.456+1＝0.544\n(C)同一行使価格のコールとプットのガンマは等しい＝0.000147\n\n【問３⑴】ベア・コール・スプレッド（下落予想戦略）\n・日経225が29,500円以下：ペイオフ0（受取プレミアムが利益）\n・29,500～30,500円：損益が変化する区間\n・30,500円以上：ペイオフ-10百万円（損失上限）\n前任者予想：日経225は下落する可能性が高いと予想。上昇リスクを限定しつつ下落時の利益を狙う。\n\n【問３⑵】バリュエーション＝(931-1,437)×1,000×100＝-50,600,000円≈-50.6百万円\n\n【問３⑶】日経22",summary:"プット・コール・パリティによる価格導出からデルタ・ガンマヘッジの連立方程式まで、オプション理論の実践問題。VaRとの連動も重要。",kps:['プット・コール・パリティ：C-P＝S-K×e^-rT','デルタ関係：Δコール＝Δプット+1（同一行使価格）','ガンマ関係：同一行使価格のコールとプットのガンマは等しい','ベア・コール・スプレッド：高い行使価格のコール買い＋低い行使価格のコール売り','VaR：正味損益分布の(1-信頼水準)%点'],cms:['プット・コール・パリティの向きを誤る（P+S vs P+K×e^-rT）','VaR計算でペイオフの最悪ケースを確認せず正規分布計算に進む','デルタ・ガンマヘッジの連立方程式で1枚あたり倍率（×1000）を忘れる']},
{year:'2024',session:'PM',qnum:'09',unit:'u1_8',pts:15,topic:"プロスペクト理論と期待効用理論の比較・価値関数・損失回避",subj:"証券分析",tags:['プロスペクト理論','価値関数','損失回避','ナローフレーミング','行動ファイナンス'],ans:"【問１】\nくじAとCは最終的な富が同じ（50%で20,000円・50%で10,000円）\nくじBとDも最終的な富が同じ（100%で15,000円）\n期待効用理論（ブロード・フレーミング）では、最終的な富で判断するため、A⇔C、B⇔Dの選択は一致するはず。リスク回避的効用関数を持つ場合、質問1でも質問2でもBまたはDを選ぶのが整合的。\n質問1でBかつ質問2でCを選ぶのは、最終的な富は同じなのに異なる選択をしており矛盾する。\n\n【問２】\n期待効用理論は保有する富全体を視野に入れるブロード・フレーミングな理論であり、富全体に対する効用関数を使って効用の期待値を最大化する。一方、プロスペクト理論は参照点からの増減だけに焦点を当てるナロー・フレーミングな理論であり、参照点からの変化に対して価値関数を適用する。価値関数は利得領域ではリスク回避的、損失領域ではリスク愛好的な形状をしている。\n\n【問３】損",summary:"行動ファイナンスの核心理論。期待効用理論との対比、価値関数の形状、損失回避、フレーミング効果の理解が必要。論述問題のため概念の正確な説明が鍵。",kps:['期待効用理論：ブロード・フレーミング（最終的な富全体で判断）','プロスペクト理論：ナロー・フレーミング（参照点からの変化で判断）','価値関数：利得領域→リスク回避（凹型）、損失領域→リスク愛好（凸型）','損失回避：|損失の限界価値|>|利得の限界価値|（損失の傾きが急）','宝くじ：確率小×利得＝③リスク愛好（プロスペクト理論で説明可能）'],cms:['問１で「期待値が同じ」という理由を使う（富の期待値でなく効用の期待値で比較）','問２で5語句を全て使わない（特にブロード/ナロー・フレーミングを忘れやすい）','問４で宝くじは損失（④）と誤解する（アウトカムは正なので③）']},
{year:'2024',session:'PM',qnum:'10',unit:'u2_3',pts:20,topic:"損益分岐点分析・減損処理・退職給付・繰延税金資産・インタレスト・カバレッジ",subj:"財務分析",tags:['損益分岐点分析','減損','退職給付','繰延税金資産','インタレストカバレッジ'],ans:"【問１⑴】固定費\n限界利益＝15,000×(1-0.60)＝6,000百万円\n6,000-固定費＝680 → 固定費＝5,320百万円\n\n【問１⑵】翌期予想営業利益\n＝16,500×(1-0.60)-5,320＝6,600-5,320＝1,280百万円\n\n【問２⑴】総資本回転率\n減損前：15,000/10,000＝1.50回\n減損後：15,000/(10,000-300)＝15,000/9,700≈1.55回\n\n【問２⑵】自己資本純利益率（ROE）\n減損前：480/6,000＝0.08\n減損後：(480-300)/(6,000-300)＝180/5,700≈0.03\n\n【問３】\n①退職給付：負債+200、純資産-200（その他包括利益累計額がマイナス）\n②繰延税金資産取崩：資産-100、純資産-100（税金費用増→利益減少）\n総資産負債比率＝(4,000+200)/(10,000-100)",summary:"4社の財務問題を一括処理。損益分岐点・減損・退職給付・繰延税金資産・ICRの基礎。会計処理の正確な理解と財務比率への影響把握が重要。",kps:['限界利益＝売上高×(1-変動費率)、営業利益＝限界利益-固定費','減損損失：固定資産・純資産ともに減少（税効果無視の場合）','退職給付：OCIを通じて負債増加・純資産減少','繰延税金資産取崩：法人税等調整額増加→純利益減少→純資産減少','ICR＝事業利益/金融費用（リース利息は金融費用に含まれる）'],cms:['問２⑵で減損損失を当期純利益から差し引くことを忘れる','問３でC社の負債変化（+200）と資産変化（-100）を正確に把握できない','問４⑵でリース終了後に支払利息相当額（50百万円）が消えることを見落とす']},
{year:'2024',session:'PM',qnum:'11',unit:'u2_1',pts:20,topic:"規模の経済・水平的M&A・DCFによるシナジー計算・ROE重回帰分析",subj:"コーポレート・ファイナンス",tags:['規模の経済','M&A','DCF','シナジー','ROE重回帰分析','企業価値'],ans:"【問１】定義：企業規模の拡大や生産量増加に伴い、製品単位当たりの費用（固定費）が低下し平均費用が減少すること。\n数値：生産単位当たり総費用：生産量600で2,400/600＝4億円、生産量680で2,560/680≈3.76億円。生産量増加に伴い単位当たり総費用が低下しており規模の経済が機能。\n\n【問２⑴】水平的M&A：同じ業界で競い合う企業同士の合併・買収。\n垂直的M&A：バリューチェーン上の異なる段階（川上・川下）で活動する企業間のM&A。\n\n【問２⑵】長所：技術共有によるスピーディーな製品開発、円滑な生産管理・サプライチェーン構築など。\n短所：内製化で安価な部品の外部調達が困難になること、販売商品が系列に限られること等。\n\n【問３⑴】\nDPS＝420億円÷10億株＝42円/株（配当性向100%・再投資ゼロなのでg＝0%）\n理論株価＝42/0.12＝350円\nBPS＝5,250/10＝",summary:"規模の経済・M&A分類・DDM＋PBR分析・DCFシナジー計算・重回帰分析の実務応用まで、コーポレートファイナンスの総合問題。計算問題と論述問題のバランスが重要。",kps:['規模の経済：生産量増加→固定費の単位当たり負担減→平均費用低下','水平的M&A：同業種間、垂直的M&A：川上・川下統合','成長率ゼロのDDM：P＝D/r（再投資なし・g＝0%）','PBR<1.0⇔ROE<r（株主資本コスト）→価値破壊','DCFターミナルバリュー：TV＝FCF×(1+g)/(r-g)（割引は1年後時点での現在価値に注意）'],cms:['問４でTV2の割引を1.12²でなく1.12³で割る（TV2は2年後の価値であることに注意）','問３で配当性向100%・再投資ゼロのため成長率g＝0%であることを確認し忘れる','問⑸でβの符号を確認せず、正負の意味を誤解する']},
{year:'2023',session:'AM',qnum:'01',unit:'u4_1',pts:24,topic:"CMAの職業行為基準違反の特定（渡辺さんのケース・小林さんのケース）",subj:"職業倫理",tags:['職業行為基準','投資情報の提供','投資の適合性','信任義務','不実表示'],ans:"【Ⅰ　渡辺さんのケース】（以下9つのうち3つを解答すればよい）\n\n①該当条項：3⑴\n違反する行為と理由：顧客に推奨する投資商品について、その商品の販売用資料を十分に読んでおらず、商品のリスク特性をよく理解しないまま顧客に推奨しており、綿密な調査・分析に基づく投資推奨ではなく、基準3⑴に違反する。\n\n②該当条項：3⑶\n違反する行為と理由：新興国ハイイールド債券ファンドのリターンの説明に、先進国である米国のハイイールド債券の直近1年間の利回りのグラフを用いて説明しており、重要な事実について正確に表示しておらず、基準3⑶に違反する。\n\n③該当条項：3⑷\n違反する行為と理由：「間違いなく10％超の高い利回りが得られますよ」との説明は、将来の投資成果を保証するような表現であり、基準3⑷に違反する。\n\n④該当条項：4⑴\n違反する行為と理由：顧客情報を2年間更新していないにもかかわらず、最新の財務状況や",summary:"職業行為基準の各条項と事例を結びつける問題。調査不足(3⑴)、不正確な表示(3⑶)、成果保証(3⑷)、顧客情報更新(4⑴)、適合性(4⑵)、不実表示(5⑴ロ)、忠実義務(6⑴)、注意義務(6⑵)、称号使用(9⑸)が渡辺ケースの選択肢。小林ケースは未公開情報利用(8⑵)と顧客の公平取扱(9⑴)が重要。",kps:['3⑴：綿密な調査・分析に基づく合理的かつ十分な根拠が必要','3⑷：投資成果を保証するような表現を用いてはならない','4⑴：顧客情報は最低でも年1回以上更新が必要','6⑴：顧客の最善の利益のみに専念し、自己の利益を優先してはならない','8⑵：守秘義務違反で伝えられた未公開の重要情報は利用・伝達禁止'],cms:['「総則」2⑴〜2⑸は除外されるため、これらを解答しないこと','1つの行為に複数条項が該当する場合は1つだけ示せばよい','条項番号を末端の記号まで正確に示すこと（例：5⑴ロ）']},
{year:'2023',session:'AM',qnum:'02',unit:'u4_1',pts:20,topic:"CMAの職業行為基準違反の特定（斉藤さんのケース・P投資顧問のケース）",subj:"職業倫理",tags:['職業行為基準','インサイダー取引','利益相反','忠実義務','不実表示','ESG投資'],ans:"問1（以下6つのうち4つを解答すればよい）\n\n①該当条項：3⑴\n違反する行為と理由：ファンド運用における投資銘柄の選定に当たり、独自に評価することを標榜しているにもかかわらず、個々の会社を自分で調査することをせず、ESG評価会社の評価基準についてもその内容を確認することもなく、もっぱらESG評価会社の評価の高い銘柄に投資しており、綿密な調査・分析を行っていない。\n\n②該当条項：3⑷\n違反する行為と理由：顧客に自分の担当するESG運用を説明するに当たり、「ESG運用が、TOPIXを上回る投資成果を確保できるのは間違いありません」と投資成果を保証するような表現で説明している。\n\n③該当条項：6⑴\n違反する行為と理由：Q製鉄の株価下落が懸念される状況にある中、自身が運用しているファンドでの保有株式を売却する前に、自身の保有株式を売却し、その後、ファンドでの保有株式を売却しており、顧客よりも自己の",summary:"利益相反・未公開重要情報・不実表示が絡む複合ケース。自己保有株式を顧客ファンドより先に売却する行為は忠実義務(6⑴)と投資管理業務の優先規定(7⑷)の両方に違反する。インサイダー情報の利用は8⑵。",kps:['基準7⑴：公正かつ客観的な業務遂行を阻害する事項を顧客に開示する義務','基準7⑷：投資管理業務では運用財産のための取引を自己取引に優先させなければならない','基準8⑵：守秘義務違反で伝えられた未公開重要情報の利用禁止','法人会員の不実表示は5⑴イ（証券分析業務の種類・内容に係る重要な事実）'],cms:['6⑴（忠実義務）と7⑷（優先売却義務）は別の違反として区別できる','P投資顧問（法人会員）の違反は5⑴イであり、個人会員とは別途問われる']},
{year:'2023',session:'AM',qnum:'03',unit:'u2_1',pts:20,topic:"資本コストの計算・企業価値評価・資本政策の分析",subj:"コーポレートファイナンス",tags:['WACC','CAPM','アンレバードベータ','ROICスプレッド','DCF','EVA'],ans:"問1\n⑴　P社の株主資本コスト＝1.0%＋1.62×5%＝9.10%\nP社の税引後WACC＝2%×(1－0.3)×2,250/6,750＋9.10%×4,500/6,750＝6.53%\n\n⑵　アンレバードベータ＝βE÷[1＋(1－τ)×VD/VE]\n＝1.62÷[1＋(1－0.3)×2,250/4,500]＝1.2\n\n⑶　競争優位にある企業：P社\nROICスプレッドはP社が1.8%（8.60%－6.80%）、Q社が0.55%（7.35%－6.80%）と、P社の方が大きい。したがって、P社が競争優位にあると考えられる。競争優位にある企業は高い価値創造を実現しており、ROICスプレッドが適切な指標となる。\n\n問2\n⑴　FCF＝税引後営業利益－純投資＝240×(1－0.3)－0＝168億円\n企業価値＝168÷0.07＝2,400億円\n\n⑵　EVA＝投下資本×(投下資本利益率－資本コスト)\n投下資",summary:"WACC計算、アンレバードベータ、ROIC・EVA・MVAによる価値評価、財務レバレッジの効果、EPSへの影響を幅広く問う総合問題。WACCの計算式と各構成要素の数値の対応を正確に把握することが重要。",kps:['CAPM：株主資本コスト＝Rf＋β×市場リスクプレミアム'],cms:['WACCの計算で有利子負債と株式時価の比率を間違えやすい（企業価値=2,250+4,500=6,750）','EVAの計算で投下資本利益率を税引後営業利益÷投下資本として計算する','MVAはEVA÷割引率であり、投下資本を加えると企業価値になる']},
{year:'2023',session:'AM',qnum:'04',unit:'u2_3',pts:26,topic:"A社（食品・飲料メーカー）の財務諸表分析とM&Aの影響分析",subj:"財務分析",tags:['ROA','セグメント分析','M&A','のれん','IFRS','格付'],ans:"問1\n⑴\n2017年度：\n(a) ROA＝事業利益÷総資本＝(1,832+9+21+190)÷33,468＝6.13%\n(b) 売上高事業利益率＝(1,832+9+21+190)÷20,849＝9.84%\n(c) 総資本回転率＝20,849÷33,468＝0.62回\n\n※事業利益＝営業利益＋受取利息＋受取配当金＋持分法による投資損益\n\n⑵　ROAは7.34%から6.13%に1.21ポイント低下した。売上高事業利益率が9.01%から9.84%に上昇した一方、総資本回転率が0.82回から0.62回に大きく低下したことによる。M&Aにより資産・負債が増加したが、それに見合う売上高が得られず、総資本回転率が低下したと考えられる。\n\n問2\n⑴\n(d) 国内酒類売上構成比＝6,969÷22,361＝31.17%\n(e) 国際売上構成比＝10,174÷22,361＝45.50%\n(f) 国内酒類営業利益",summary:"IFRSにおけるM&A会計（のれん非償却・減損テスト）と日本基準（規則償却）の違いが中心。ROAの2分解は売上高事業利益率×総資本回転率。事業利益の計算に持分法投資損益を含める点に注意。",kps:['事業利益＝営業利益＋受取利息＋受取配当金＋持分法による投資損益','ROA＝売上高事業利益率×総資本回転率','IFRSではのれんは非償却・年1回以上減損テスト。日本基準では20年以内規則償却','のれん及び無形資産の純資産比率160%は高水準で減損リスクが大きい','格付維持の根拠：営業CFの大幅増加とM&A一段落後のFCF黒字化見通し'],cms:['ROA計算の分子は売上高利益率ではなく「事業利益」（受取配当・持分法損益を含む）','セグメント構成比の計算は連結合計で割ること（調整額控除前）']},
{year:'2023',session:'AM',qnum:'05',unit:'u1_1',pts:15,topic:"残余利益モデルと配当割引モデルを用いた株式の理論株価計算",subj:"証券分析",tags:['残余利益モデル','配当割引モデル','理論株価','サステイナブル成長率','内部留保率'],ans:"問1\n当期の予想1株当たり残余利益＝1,600×0.1－1,600×0.09＝160－144＝16円\nサステイナブル成長率＝ROE×(1－配当性向)＝0.1×0.7＝7%\n理論株価＝1,600＋16÷(0.09－0.07)＝1,600＋800＝2,400円\n理論株価2,400円が市場株価2,000円を上回るので、A社株式は割安である。\n\n問2\n⑴　当期の予想1株当たり配当＝1,600×0.1×0.3＝48円\n翌期の予想1株当たり配当＝48×(1＋0.07)＝51.36円\n1年後の理論株価＝51.36÷(0.09－0.07)＝2,568円\n\n⑵　1年間の所有期間リターン＝[(2,568－2,000)＋48]÷2,000＝616÷2,000＝0.308（30.8%）\n\n問3\n配当性向をdとすると、\n理論株価＝1,600×0.1×d÷[0.09－0.1×(1－d)]＝3,000\n160d÷[0.",summary:"残余利益モデル・配当割引モデル・所有期間リターンの計算を連続して問う問題。サステイナブル成長率g＝ROE×(1－配当性向)が基本。理論株価の計算には成長率が株主要求収益率を下回ることが前提。",kps:['残余利益＝予想EPS－期首BPS×要求収益率','残余利益モデル：理論株価＝BPS＋残余利益÷(r－g)','サステイナブル成長率g＝ROE×(1－配当性向)＝ROE×内部留保率','配当割引モデル（定率成長）：P＝D÷(r－g)'],cms:['残余利益の計算では期首BPSを使うこと（期末ではない）','サステイナブル成長率は内部留保率（1－配当性向）を乗じること','翌期以降に成長率が変わる場合の理論株価計算では2段階DDMを使う']},
{year:'2023',session:'AM',qnum:'06',unit:'u1_8',pts:10,topic:"人的資本の概念・元本割れ確率の計算・プロスペクト理論と気質効果",subj:"証券分析",tags:['人的資本','ライフサイクル投資','正規分布','元本割れ確率','プロスペクト理論','気質効果'],ans:"問1\n人的資本とは、現在から将来にわたり、1人の個人が得る勤労所得の割引現在価値の合計である。若年期と老年期では人的資本の金額が変化し、個人の保有する資産構成も変化するため、それに対応して金融資産におけるリスク資産の組み入れ比率を変更するなどの調整を行う必要がある。\n\n問2\nリターンをRとすると、期待リターンE[R]＝0.06、標準偏差σ[R]＝0.15\nP(R<0)＝P(Z<(0－0.06)/0.15)＝P(Z<－0.4)\n＝1－P(Z<0.4)＝1－0.6554＝0.3446≒34.5%\n\n問3\nプロスペクト理論によると、現状を基準にして、そこからの変化だけを評価するような参照点依存、および損失と利益の影響度合いの非対称性がみられるという損失回避の傾向が指摘されている。元本を参照点とすると、それよりも価値額が上昇するとリスク回避的になり、下落するとリスク愛好的になる。この場合、購入後に",summary:"人的資本の定義（将来勤労所得の現在価値）、正規分布を用いた元本割れ確率計算（z＝(0－μ)/σ）、プロスペクト理論の参照点依存と損失回避が気質効果につながることを理解する。",kps:['人的資本＝将来の勤労所得の割引現在価値の合計','若年期：人的資本大→金融資産のリスク資産比率を高めてよい','老年期：人的資本小→金融資産の安全資産比率を高めるべき','元本割れ確率：z＝(0－μ)/σ＝(0－0.06)/0.15＝－0.4 → 1－N(0.4)＝1－0.6554＝34.5%','気質効果：利益が出たら早く売り（リスク回避）、損失が出たら持ち続ける（リスク愛好）行動'],cms:['z値の計算でμ/σではなく(0－μ)/σを使うこと','P(Z<－0.4)＝1－P(Z<0.4)と変換する手順を忘れない']},
{year:'2023',session:'AM',qnum:'07',unit:'u1_3',pts:25,topic:"債券ポートフォリオのリスク分析：フォワードレート・主成分分析・ファクターモデル・トータルリターン",subj:"証券分析",tags:['フォワードレート','キーレートデュレーション','主成分分析','バーベル型','ラダー型','トラッキングエラー'],ans:"問1\n⑴　最大となるのは5年後スタートの1年物フォワードレート\nf(t)＝d(t)/d(t+1)－1\nf(5)＝0.8730/0.8339－1＝0.04688≒4.69%\nf(6)＝0.8339/0.7973－1＝0.04590≒4.59%\nf(7)＝0.7973/0.7622－1＝0.04605≒4.61%\n最大：5年後スタートの4.69%\n\n⑵\n①マコーレー・デュレーション：残存期間10年の割引債のマコーレー・デュレーションは残存期間に等しく、D＝10.00\n②修正デュレーション：DM＝D/(1+r)＝10/(1+0.0361)＝9.65\n③10年キャッシュフロー（額面+クーポン103.50円）の現在価値：103.50×0.7015＝72.61円\n④キーレート・デュレーション：9.65×72.61/100＝7.01\n\n⑶\n①分散共分散、②固有ベクトル、③固有値、④傾き、⑤曲率\n\n問2\n",summary:"フォワードレート計算（割引係数の比）、キーレートデュレーション（割引債の修正デュレーション×比率）、主成分分析の語句（分散共分散行列・固有ベクトル・固有値・傾き・曲率）、バーベル/ラダー型、トータルリターン計算を網羅する債券総合問題。",kps:['フォワードレート：f(t)＝d(t)/d(t+1)－1（割引係数の比から計算）','修正デュレーション：DM＝マコーレーD/(1+r)','キーレートDuration＝割引債修正D×（その年限のCFの現在価値/債券価格）','主成分分析：分散共分散行列の固有ベクトルと固有値を用いる','第1主成分：水準（ほぼ一定のベクトル）、第2主成分：傾き、第3主成分：曲率'],cms:['フォワードレートはd(t)/d(t+1)－1（分子がt期、分母がt+1期）','キーレートDの計算：10年割引債のCFは103.50円（クーポン3.50+元本100）','1年後のロールダウンリターン：1年後に残存年限が1年短くなることを考慮']},
{year:'2023',session:'AM',qnum:'08',unit:'u1_6',pts:25,topic:"国際投資における為替ヘッジと最適ポートフォリオの分析",subj:"証券分析",tags:['為替ヘッジ','金利平価','エクスポージャー','最適ポートフォリオ','カバーなし金利平価','時間加重収益率'],ans:"問1\n⑴　為替ヘッジ付き米国株式リターン（円建て）\n＝米国株式リターン（ドル建て）－ヘッジコスト\n＝米国株式リターン（ドル建て）－ドル金利＋円金利\n\n⑵　ドルの為替先渡レートは、現在のドルと円の金利差だけドルが減価され、スポットレートより円高（ドル安）になる。（日本円金利よりも米ドル金利が高いため、フォワードレートは円高方向に調整される）\n\n⑶　米国株式と為替変化率の相関はゼロなので、\n為替ヘッジなし米国株式のリスク＝√(0.16²＋0.11²)＝√(0.0256＋0.0121)＝√0.0377≒19.4%\n\n問2\n②　米国株先物ロング＋なし（為替先渡なし）＋ドル預金\n③　米国株先物ロング＋なし（為替先渡なし）＋円預金\n④　なし（米国株先物なし）＋ドル為替先渡ショート＋為替ヘッジなし米国株式（円建て）\n\n問3\n⑴　正しいのはあなたである。資産の最適なエクスポージャーは、各資産の現地通貨金利",summary:"為替ヘッジコスト（ドル金利－円金利）、エクスポージャーの概念（株式と為替は独立）、カバーなし金利平価成立時のポートフォリオ変化、時間加重vs金額加重収益率を横断的に問う問題。",kps:['為替ヘッジコスト≒ドル金利－円金利（金利平価）','為替先渡：ドルの先物売り→スポットより円高（ドル高金利国通貨は先物で減価）','為替ヘッジなし米国株リスク＝√(σ株²+σ為替²)（相関ゼロの場合）','エクスポージャーリターンは評価通貨に依存しない→ドル期待値変化は株式配分に影響しない','カバーなし金利平価成立→ドル保有の期待超過リターンはゼロ→為替ヘッジなしをゼロに'],cms:['為替ヘッジコストは「ドル金利－円金利」（符号に注意、円金利が低いとコストが高くなる）','金利平価成立時：為替先渡＝スポット×(1+円金利)/(1+ドル金利)→ドル先物は円高']},
{year:'2023',session:'AM',qnum:'09',unit:'u3_1',pts:15,topic:"ケインズ型消費関数と異時点間消費モデルによるマクロ経済分析",subj:"経済",tags:['IS-LMモデル','ケインズ型消費関数','限界消費性向','恒常所得仮説','リカードの中立命題'],ans:"問1\n⑴　cの名称：限界消費性向\n理由：cが0より大きいのは、家計は可処分所得が増加すると消費を増加させるため。1より小さいのは、可処分所得のすべてを消費に回すことはせず、一部は貯蓄に回すため。\n\n⑵　均衡点をE0に戻すためには、IS曲線を当初のIS0の位置に戻す必要がある。そのためには総需要を縮小させる必要があるから、政府支出を減少させる（または定額増税を実施する）。具体的には、基礎消費C̄の増加幅と同額の政府支出を減少させる。\n\n問2\n⑴　第3期の可処分所得の現在価値＝(Y3－T3)/(1+r)²\n\n⑵　C1：変わらない\n政策を実施しないときのV：\nV＝(Y1－T1)＋(Y2－T2)/(1+r)＋(Y3－T3)/(1+r)²\n政策実施後：T1*＝T1－1（減税）、T2*＝T2＋(1+r)（元利償還）\n実施後のV*：\nV*＝(Y1－T1＋1)＋(Y2－T2－(1+r))/(1+r)＋(Y",summary:"ケインズ型消費関数（現期可処分所得のみ依存）と異時点間消費モデル（ライフサイクル・恒常所得仮説的）の比較。リカードの中立命題（国債発行による減税→将来増税→消費不変）が問2の核心。",kps:['限界消費性向c：可処分所得が1単位増えたときの消費の増加量（0＜c＜1）','C̄増加→IS曲線右上シフト→均衡Y増・r増→IS0に戻すには政府支出削減か増税','リカードの中立命題：国債発行による減税は将来増税を伴うため消費不変','異時点間モデルの特徴：①将来所得依存、②金利の影響あり（金利上昇→消費減）'],cms:['IS曲線の右シフト：IS0→IS1は右上への平行移動','IS0への回帰：LM曲線は動かさず、ISを左にシフトさせる（政府支出削減or増税）','問2⑵の計算：第2期の増税額は(1+r)であることに注意（国債の元利合計）']},
{year:'2023',session:'PM',qnum:'01',unit:'u3_1',pts:12,topic:"資源価格高騰と金融政策のAD-AS分析・UIP・不胎化介入",subj:"経済",tags:['AD-AS分析','金融引締政策','金利平価','UIP','為替介入','不胎化介入'],ans:"問1\n資源価格高騰は生産コストの上昇を通じてAS曲線をAS0からAS1（左上方）にシフトさせる結果、物価水準がP0からP'に上昇するとともに、GDP（Y）はY0からY'に減少する。これに対し、貨幣供給量を減少させる金融引締政策を行うと、AD0曲線が左方（AD1）にシフトし、物価水準が変化しなかったという仮定より、均衡点はE1（P1＝P0、Y1）となる。したがって、GDPはY'からさらに大きく減少する（Y1＜Y'＜Y0、P1＝P0）。\n\n問2\n⑴　UIPの式：r－r*＝(Se－S)/S　または　1+r＝(Se/S)×(1+r*)\n\n⑵　UIPが成立するためには、円建て資産の期待収益率が上昇（米ドル建て資産の円建て期待収益率が下落）する必要がある。米国のr*が上昇しr＊>rとなると、円建て期待収益率に対する超過収益が生じる。UIPを満たすためには、Seを所与とすると、Sが上昇（円安・ドル高）す",summary:"AD-AS分析での資源高騰（AS左シフト）と金融引締（AD左シフト）の組み合わせ。物価不変の条件からGDP低下幅が決まる。UIPは内外金利差＝期待為替変化率という裁定条件。",kps:['AS左シフト（資源高騰）：スタグフレーション（物価↑・GDP↓）','AD左シフト（金融引締）：物価↓・GDP↓','物価変化なし条件：AD左シフト量はAS左シフトの物価効果を相殺する量','UIP：r－r*＝(Se－S)/S（内外金利差＝期待為替変化率）','r*上昇→ドル高→Sが大→UIPが均衡（SeをGIVENでSを調整）'],cms:['AS曲線のシフト：資源価格高騰は供給側の問題→AS左上シフト（物価↑GDP↓）','UIPのSは「円/ドル」表示なので、S上昇＝円安・ドル高']},
{year:'2023',session:'PM',qnum:'02',unit:'u3_3',pts:18,topic:"負の外部性と政策介入・自己回帰分析による排出量予測",subj:"経済",tags:['外部性','ピグー税','厚生の損失','自己回帰分析','最小二乗法','温室効果ガス'],ans:"問1　P1＝60、X1＝20\n需要曲線P＝100－2X（需要曲線を逆需要に変換）\nP＝MC：100－2X＝2X＋20 → 4X＝80 → X1＝20、P1＝60\n\n問2　SMC＝2X＋40、X*＝15\nSMC＝MC＋外部費用＝(2X＋20)＋20＝2X＋40\n社会的最適：P＝SMC → 100－2X＝2X＋40 → 4X＝60 → X*＝15\n\n問3\n厚生の損失とは、社会的最適点の社会的余剰と市場均衡点の社会的余剰の差額のこと。\nX*＝15（SMC＝80）、X1＝20（SMC＝80、MC＝60、P＝60）\n厚生の損失は三角形DEFの面積（SMCとMC＝Pの乖離×過剰生産量/2）\n＝(80－60)×(20－15)×1/2＝20×5×0.5＝50\n\n問4\n企業の生産1単位当たりに従量税を課す（ピグー税）。生産量1単位あたり20の外部費用に等しい20の従量税を生産者に課せば、企業の私的限界費用が",summary:"負の外部性（温室効果ガス）の市場分析。SMC＝MC＋外部費用、社会的最適＝需要＝SMCの交点。厚生損失は三角形面積。ピグー税で内部化。自己回帰分析はOLS（β̂＝ρ×S被/S説、α̂は平均点が直線上）。",kps:['SMC＝私的MC＋外部費用（負の外部性がある場合）','社会的最適：P＝SMCの交点（市場均衡P＝MCより生産量が少ない）','厚生損失＝(SMC－P)×(X1－X*)÷2（三角形面積）','ピグー税：外部費用に等しい従量税で社会的最適を実現','OLS回帰係数：β̂＝ρ×S被/S説'],cms:['逆需要曲線への変換：X＝50－0.5P → P＝100－2X','厚生損失の頂点：市場均衡点E(X1,SMC1)と社会的最適点D(X*,SMC*)を正確に','自己回帰係数：β̂はρではなくρ×(S被/S説)（標準偏差の比を掛ける）']},
{year:'2023',session:'PM',qnum:'03',unit:'u1_2',pts:30,topic:"日本株ファンドのパフォーマンス分析・スタイル分析・リスク特性評価",subj:"証券分析",tags:['スマートベータ','ファーマ=フレンチ3ファクター','アルファ','仮説検定','スタイルドリフト','インフォメーションレシオ'],ans:"問1\nサイズ・ファクターの観点：βSMB＝－0.13＜0より大型寄り。\nバリュー・ファクターの観点：βHML＝0.52＞0よりバリュー寄り。\n（ファンドAは大型バリュー寄りのスタイル特性）\n\n問2\nファンドBのβの標準誤差(se)＝β/t(β)＝0.78/21.06≒0.037\n帰無仮説β＝1の検定統計量：(0.78－1)/0.037＝－5.95\n標準正規分布の有意水準5%両側検定の棄却域：|z|>1.96\n|－5.95|＝5.95＞1.96なので、帰無仮説β＝1は有意水準5%で棄却される。\n\n問3\nスマートベータ戦略に基づくファンドは、特定の指数に連動するパッシブ運用の形式を取ることが多いため、運用コストの低いETFによる運用に適しているから。\n\n問4（以下のいずれかを解答）\n・ESG投資の人気が高まったことによる、一時的な需給要因（ESG銘柄への資金流入）\n・ファクター・リスクプレミア",summary:"スマートベータ・アクティブ・マーケットニュートラル各戦略のパフォーマンス評価。FF3ファクターのβSMB（サイズ）・βHML（バリュー）解釈、仮説検定（t値→標準誤差→z統計量）、アクティブ法則（αP＝IC×√BR×TE）が重要。",kps:['βSMB>0：小型株寄り、<0：大型株寄り','βHML>0：バリュー寄り、<0：グロース寄り','仮説検定：β=1のt統計量＝(β̂－1)/se、se＝β̂/t(β)','アクティブ法則：αP＝IC×√BR×TE、IR≈IC×√BR','VWAP：出来高加重平均価格、ギャランティ注文でタイミングリスク回避'],cms:['β=1の検定：t値（0に対する）をそのまま使わず、(β̂－1)/seを計算する','スタイルドリフト：グロース株は成長で大型化しバリュー化する（意図しない変化）']},
{year:'2023',session:'PM',qnum:'04',unit:'u1_3',pts:15,topic:"金利期間構造モデル（バシチェック）・二項ツリー・コーラブル債評価・信用リスクモデル",subj:"証券分析",tags:['バシチェックモデル','二項ツリー','コーラブル債','OAS','Zスプレッド','信用リスクモデル'],ans:"問1\n⑴　①バシチェック、②トレンド（またはドリフト）、③ランダム（またはボラティリティ）\n⑵　④高く、⑤上げる、⑥下げる（上げるも可）、⑦カリブレーション\n\n※σ上昇→イールドカーブ全体を押し上げる（凸性の効果：長期ほど影響大）\n\n問2\nE[r₁]＝r₀＋κ(θ－r₀)Δt\n＝3.0%＋0.2×(5.0%－3.0%)×1\n＝3.0%＋0.2×2.0%\n＝3.0%＋0.4%＝3.4%\n\n問3\n⑴\n①　t=2上ノード（r=3.57%）：割引債価格\n＝100×exp(－3.57%)≒96.49円（連続複利）\nまたは100/(1+3.57%)≒96.55円（年1回複利）\n\n②　t=1下ノード（r=1.80%）：割引債価格\n＝(97.52×67.1%＋98.56×32.9%)×exp(－1.80%)\n※t=2の割引債価格を計算後に割り引く\n＝(65.43＋32.43)×0.9820≒96.12円\n",summary:"バシチェックモデル（平均回帰型確率過程）、二項ツリーによる割引債・コーラブル債の後向き評価、OAS（オプション調整後スプレッド）とZスプレッドの関係、信用リスクモデルの分類（誘導型・ハザード確率）を網羅。",kps:['バシチェックモデル：dr＝κ(θ－r)dt＋σdz（平均回帰・トレンド+ランダム）','カリブレーション：市場観察金利とモデル金利の乖離を最小化するパラメータ推定','二項ツリー割引債：後ろから前向きに、リスク中立確率で加重して割り引く','コーラブル債：各ノードで「非コール価値」と「コール価値」を比較し低い方を採用','Zスプレッド＝OAS＋コールオプション価値相当スプレッド（コーラブル債の場合）'],cms:['コーラブル債の評価：発行体がコールを行使するのは非コール価値>コール価値のとき','Zスプレッド>OAS（コーラブル債）：コールオプション価値分だけZが大きい']},
{year:'2023',session:'PM',qnum:'05',unit:'u1_5',pts:20,topic:"最適ポートフォリオ構築・リスクパリティ・オルタナティブ投資の検討",subj:"証券分析",tags:['接点ポートフォリオ','シャープレシオ','リスクパリティ','期待リターン推計','オルタナティブ投資','インフラ投資'],ans:"問1\n⑴（以下のいずれかを解答）\n・リターンの平均水準が平均する期間のとり方によって異なる。\n・フォワードルッキングな視点が入っていない。\n・データベースに残存者バイアスが存在することがある。\n\n⑵　経済成長や企業の利益成長がリターンの源泉になると考え、1株当たり利益やPERの変化率の予測値などによって期待リターンを予測する方法である。\n\n問2\n⑴　接点ポートフォリオ：wB×μB＋(1－wB)×μS＝μT\n0.6×0.05＋0.4×μS＝0.11\n0.03＋0.4μS＝0.11\n0.4μS＝0.08\nμS＝0.20（20.0%）\n\n⑵　分離定理より、シャープレシオ最大のポートフォリオ＝接点ポートフォリオ＋安全資産\n接点ポートフォリオのウェイトをwT、安全資産のウェイトをwFとすると、\nwT×0.11＋wF×0.02＝0.05\n(1－wF)×0.11＋wF×0.02＝0.05\n0.11－0.",summary:"接点ポートフォリオ（シャープレシオ最大）の期待リターンから逆算する株式期待リターン、分離定理を使った安全資産ウェイト計算、リスクパリティ（リスク等分配分）の計算、オルタナティブ投資の特徴。",kps:['接点ポートフォリオ期待リターン：wB×μB＋(1－wB)×μS＝μT','分離定理：シャープレシオ最大→接点ポートフォリオ＋安全資産の組み合わせのみ','リスクパリティ：各資産のリスク寄与が等しい→wB×σB＝wS×σS（無相関の場合）','リスクパリティのメリット：期待リターン推計が不要','不動産戦略：コア（安定インカム）、バリューアッド（中間）、オポチュニスティック（高リスク・高リターン）'],cms:['分離定理：安全資産ウェイト計算はwT×μT＋wF×rf＝目標リターン','リスクパリティ：相関ゼロの場合wB/wS＝σS/σB（リスクの逆数比例）']},

const UNIT_MAP = {};
UNITS.forEach(u => UNIT_MAP[u.id] = u);
const CH_MAP = {};
CHAPTERS.forEach(c => CH_MAP[c.id] = c);
const C_BY_UNIT = {};
CONCEPTS.forEach(c => { if(!C_BY_UNIT[c.unit])C_BY_UNIT[c.unit]=[]; C_BY_UNIT[c.unit].push(c); });

let ST = {
  tab: 'theory',
  theoryView: 'overview',
  drill: { idx:0, results:[], answered:null, active:false, unitResults:{} },
  pqFilter: 'all',
  pqUnit: 'all',
  search: '',
};

function saveDrill() {
  try { localStorage.setItem('cma_drill', JSON.stringify({unitResults:ST.drill.unitResults})); } catch(e){}
}
function loadDrill() {
  try {
    const d = JSON.parse(localStorage.getItem('cma_drill')||'{}');
    if(d.unitResults) ST.drill.unitResults = d.unitResults;
  } catch(e){}
}
loadDrill();

// NAVIGATION
// ════════════════════════════════════════════════════════════
function showPage(tabId) {
  // hide search
  if(tabId !== 'search') {
    document.getElementById('search-input').value = '';
    ST.search = '';
  }
  ST.tab = tabId;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-item').forEach(b => b.classList.remove('on'));
  const tabEl = document.getElementById('tab-'+tabId);
  if(tabEl) tabEl.classList.add('active');
  const btnEl = document.getElementById('tab-btn-'+tabId);
  if(btnEl) btnEl.classList.add('on');
  document.getElementById('content').scrollTop = 0;

  if(tabId === 'theory') {
    renderTheoryNav();
    if(ST.theoryView === 'overview') renderOverview();
    else renderUnit(ST.theoryView);
  }
  if(tabId === 'drill') renderDrill();
  if(tabId === 'pastquiz') renderPastQuiz();
}

function showOverview() {
  ST.theoryView = 'overview';
  renderOverview();
  setSbActive(null);
  document.getElementById('sb-home-btn').classList.add('on');
  document.getElementById('drawer-home-btn').classList.add('on');
  document.getElementById('content').scrollTop = 0;
}

function showUnit(unitId) {
  if(ST.tab !== 'theory') showPage('theory');
  ST.theoryView = unitId;
  renderUnit(unitId);
  setSbActive(unitId);
  document.getElementById('sb-home-btn').classList.remove('on');
  document.getElementById('drawer-home-btn').classList.remove('on');
  document.getElementById('content').scrollTop = 0;
  closeDrawer();
}

function setSbActive(unitId) {
  document.querySelectorAll('.unit-btn').forEach(b => b.classList.remove('on'));
  if(unitId) {
    document.querySelectorAll(`.unit-btn[data-unit="${unitId}"]`).forEach(b => {
      b.classList.add('on');
      const ch = UNIT_MAP[unitId].ch;
      // open chapter
      ['sidebar','drawer'].forEach(prefix => {
        const chEl = document.getElementById(prefix+'-ch-'+ch);
        if(chEl) { chEl.classList.add('open'); document.getElementById(prefix+'-ul-'+ch)?.classList.add('open'); }
      });
    });
  }
}

// ════════════════════════════════════════════════════════════
// SIDEBAR + DRAWER BUILD
// ════════════════════════════════════════════════════════════
function buildNav(containerId, prefix) {
  const wrap = document.getElementById(containerId);
  if(!wrap) return;
  let html = '';
  CHAPTERS.forEach(ch => {
    const units = UNITS.filter(u => u.ch === ch.id);
    html += `<div class="ch-block">
      <div class="ch-hd" id="${prefix}-ch-${ch.id}" onclick="toggleChNav('${prefix}','${ch.id}')">
        <div class="ch-bar" style="background:${ch.color}"></div>
        <span class="ch-hd-name">${ch.name}</span>
        <span class="ch-hd-cnt">${units.reduce((s,u)=>s+(C_BY_UNIT[u.id]||[]).length,0)}</span>
        <span class="ch-hd-arr">▶</span>
      </div>
      <div class="ch-units" id="${prefix}-ul-${ch.id}">`;
    units.forEach(u => {
      const cnt = (C_BY_UNIT[u.id]||[]).length;
      html += `<div class="unit-btn" data-unit="${u.id}" onclick="showUnit('${u.id}')">
        <div class="unit-dot" style="background:${ch.color}"></div>
        <span class="unit-btn-name">${u.name}</span>
        <span class="unit-btn-cnt">${cnt}</span>
      </div>`;
    });
    html += `</div></div>`;
  });
  wrap.innerHTML = html;
}

function toggleChNav(prefix, chId) {
  const hd = document.getElementById(prefix+'-ch-'+chId);
  const ul = document.getElementById(prefix+'-ul-'+chId);
  hd.classList.toggle('open');
  ul.classList.toggle('open');
}

function renderTheoryNav() {
  buildNav('sb-chapters-wrap','sidebar');
  buildNav('drawer-chapters-wrap','drawer');
  setSbActive(ST.theoryView === 'overview' ? null : ST.theoryView);
}

// ════════════════════════════════════════════════════════════
// DRAWER
// ════════════════════════════════════════════════════════════
function openDrawer() {
  document.getElementById('drawer-overlay').classList.add('open');
  document.getElementById('drawer').classList.add('open');
  renderTheoryNav();
}
function closeDrawer() {
  document.getElementById('drawer-overlay').classList.remove('open');
  document.getElementById('drawer').classList.remove('open');
}

function renderOverview() {
  const freqCnt = CONCEPTS.filter(c=>c.tag==='freq').length;
  let html = `<div class="ov-wrap">
    <div class="ov-hero">
      <div class="ov-hero-title">CMA 2次試験 直感的理解集</div>
      <div class="ov-hero-sub">全15単元・${CONCEPTS.length}コンセプトを「直感的理解」でマスター。<br>公式の前に「なぜそうなるか」の感覚を掴む。</div>
      <div class="ov-stats">
        <div class="ov-stat"><div class="ov-stat-n">${CONCEPTS.length}</div><div class="ov-stat-l">コンセプト</div></div>
        <div class="ov-stat"><div class="ov-stat-n">${freqCnt}</div><div class="ov-stat-l">頻出★★★</div></div>
        <div class="ov-stat"><div class="ov-stat-n">15</div><div class="ov-stat-l">単元</div></div>
        <div class="ov-stat"><div class="ov-stat-n">${DRILL_Q.length}</div><div class="ov-stat-l">ドリル問題</div></div>
      </div>
    </div>`;
  CHAPTERS.forEach(ch => {
    const units = UNITS.filter(u=>u.ch===ch.id);
    html += `<div class="ov-ch-title" style="color:${ch.color}">${ch.name}</div>
    <div class="ov-unit-grid">`;
    units.forEach(u => {
      const cnt = (C_BY_UNIT[u.id]||[]).length;
      const freqN = (C_BY_UNIT[u.id]||[]).filter(c=>c.tag==='freq').length;
      html += `<div class="ov-unit-card" onclick="showUnit('${u.id}')">
        <div class="ov-unit-dot" style="background:${ch.color}"></div>
        <div class="ov-unit-info">
          <div class="ov-unit-name">${u.name}</div>
          <div class="ov-unit-cnt">${cnt}コンセプト（頻出${freqN}）</div>
        </div>
        <div class="ov-unit-arr">›</div>
