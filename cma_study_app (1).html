// ════════════════════════════════════════════════════════════
// THEORY: UNIT PAGE
// ════════════════════════════════════════════════════════════
function renderUnit(unitId) {
  const u = UNIT_MAP[unitId];
  const ch = CH_MAP[u.ch];
  const concepts = C_BY_UNIT[unitId] || [];
  const freqList = concepts.filter(c=>c.tag==='freq');
  const stdList = concepts.filter(c=>c.tag!=='freq');

  let html = `<div class="unit-wrap">
    <div class="unit-hd">
      <div class="unit-hd-eyebrow" style="color:${ch.color}">${ch.name}</div>
      <div class="unit-hd-title">${u.name}</div>
      <div class="unit-hd-meta">
        <span class="unit-hd-cnt">全${concepts.length}コンセプト</span>
        <button class="unit-expand-btn" onclick="toggleAllCards(true)">全展開</button>
        <button class="unit-expand-btn" onclick="toggleAllCards(false)">全収束</button>
      </div>
    </div>
    <div class="unit-content">`;

  if(freqList.length) {
    html += `<div class="section-label">📌 頻出★★★ — ${freqList.length}件</div>`;
    freqList.forEach(c => html += buildCard(c));
  }
  if(stdList.length) {
    html += `<div class="section-label" style="margin-top:8px">📖 標準・発展 — ${stdList.length}件</div>`;
    stdList.forEach(c => html += buildCard(c));
  }
  html += `</div></div>`;
  document.getElementById('theory-body').innerHTML = html;
}

function buildCard(c) {
  const tagLabel = c.tag==='freq'?'頻出★★★':c.tag==='std'?'標準★★':'発展';
  let body = `<div class="cc-article">`;

  if(c.intuition) body += `<div class="art-intuition"><div class="art-intuition-label">💡 直感的理解</div>${esc(c.intuition).replace(/\n/g,'<br>')}</div>`;
  if(c.formula) body += `<div class="art-formula"><div class="art-formula-label">📐 公式</div>${esc(c.formula).replace(/\n/g,'<br>')}</div>`;
  if(c.steps) {
    body += `<div class="art-steps">`;
    c.steps.forEach((s,i)=> body+=`<div class="art-step"><div class="art-step-n">${i+1}</div><div class="art-step-t">${esc(s)}</div></div>`);
    body += `</div>`;
  }
  if(c.compare) {
    body += `<div class="art-table-wrap"><table class="art-table"><thead><tr>`;
    c.compare.headers.forEach(h=> body+=`<th>${esc(h)}</th>`);
    body += `</tr></thead><tbody>`;
    c.compare.rows.forEach(row=>{
      body += '<tr>';
      row.forEach((cell,i)=> body+=`<td${i===0?' style="font-weight:700;color:var(--t2)"':''}>${esc(String(cell))}</td>`);
      body += '</tr>';
    });
    body += `</tbody></table></div>`;
  }
  if(c.example) body += `<div class="art-example"><div class="art-example-label">📐 計算例</div>${esc(c.example).replace(/\n/g,'<br>')}</div>`;
  if(c.warn) body += `<div class="art-warn"><div class="art-warn-label">⚠️ ミスしやすい点</div>${esc(c.warn).replace(/\n/g,'<br>')}</div>`;
  if(c.tip) body += `<div class="art-tip"><div class="art-tip-label">✨ 試験のポイント</div>${esc(c.tip).replace(/\n/g,'<br>')}</div>`;
  body += `</div>`;

  return `<div class="cc" id="cc-${c.id}">
    <div class="cc-hd" onclick="toggleCard('${c.id}')">
      <div class="cc-icon" style="background:${c.color}22">${c.icon}</div>
      <div class="cc-info">
        <div class="cc-name">${c.name}</div>
        <span class="cc-tag ${c.tag}">${tagLabel}</span>
      </div>
      <span class="cc-arr">›</span>
    </div>
    <div class="cc-body">${body}</div>
  </div>`;
}

function toggleCard(id) {
  const el = document.getElementById('cc-'+id);
  if(!el) return;
  el.classList.toggle('open');
  // scroll to show
  if(el.classList.contains('open')) {
    setTimeout(()=>{ el.scrollIntoView({behavior:'smooth',block:'nearest'}); },150);
  }
}
function toggleAllCards(open) {
  document.querySelectorAll('.cc').forEach(el => {
    if(open) el.classList.add('open');
    else el.classList.remove('open');
  });
}

// ════════════════════════════════════════════════════════════
// DRILL
// ════════════════════════════════════════════════════════════
// ── DRILL FILTER STATE ──
let drillFilter = {unit:'all', activeQ: DRILL_Q.slice()};

function getFilteredDrillQ() {
  if(drillFilter.unit === 'all') return DRILL_Q;
  return DRILL_Q.filter(q => q.unit === drillFilter.unit);
}

function renderDrill() {
  if(!ST.drill.active) renderDrillHome();
  else if(ST.drill.idx >= drillFilter.activeQ.length) renderDrillScore();
  else renderDrillQ();
}

function renderDrillHome() {
  // Build unit filter buttons
  const unitCounts = {};
  UNITS.forEach(u => { unitCounts[u.id] = DRILL_Q.filter(q=>q.unit===u.id).length; });
  const totalDone = Object.values(ST.drill.unitResults||{}).reduce((s,r)=>s+r.done,0);
  const totalCorrect = Object.values(ST.drill.unitResults||{}).reduce((s,r)=>s+r.correct,0);

  // Overall stats bar
  let statsHtml = '';
  if(totalDone > 0) {
    const pct = Math.round(100*totalCorrect/totalDone);
    statsHtml = `<div style="background:var(--s2);border:1px solid var(--border2);border-radius:10px;padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:12px">
      <div style="font-size:28px;font-weight:900;background:linear-gradient(135deg,var(--gold),var(--acc3));-webkit-background-clip:text;-webkit-text-fill-color:transparent">${pct}%</div>
      <div>
        <div style="font-size:12px;font-weight:700">通算正答率</div>
        <div style="font-size:11px;color:var(--t2)">${totalCorrect}/${totalDone}問正解</div>
      </div>
      <div style="flex:1"></div>
      <button class="drill-btn ghost" onclick="resetAllDrill()" style="font-size:11px;padding:6px 12px">リセット</button>
    </div>`;
  }

  // Chapter groups with units
  let unitFilterHtml = `<div style="margin-bottom:16px">
    <div style="font-size:10px;font-weight:900;color:var(--t3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px">出題範囲を選択</div>
    <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px">
      <div class="df-btn${drillFilter.unit==='all'?' on':''}" onclick="setDrillUnit('all',this)">全単元（${DRILL_Q.length}問）</div>
    </div>`;

  CHAPTERS.forEach(ch => {
    const units = UNITS.filter(u=>u.ch===ch.id && unitCounts[u.id]>0);
    if(!units.length) return;
    unitFilterHtml += `<div style="font-size:9px;font-weight:700;color:${ch.color};letter-spacing:.08em;text-transform:uppercase;margin:6px 0 4px;padding-left:2px">${ch.name.replace('第','').replace('章','').trim()}</div>
    <div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:2px">`;
    units.forEach(u => {
      const ur = ST.drill.unitResults?.[u.id];
      const done = ur?.done||0;
      const correct = ur?.correct||0;
      const pct = done>0 ? Math.round(100*correct/done) : null;
      const badge = pct!==null ? ` <span style="font-size:9px;opacity:.7">${pct}%</span>` : '';
      unitFilterHtml += `<div class="df-btn${drillFilter.unit===u.id?' on':''}" onclick="setDrillUnit('${u.id}',this)" style="font-size:10px;padding:4px 10px">
        ${u.name.replace(/^\d-\d\s/,'')}（${unitCounts[u.id]}）${badge}
      </div>`;
    });
    unitFilterHtml += `</div>`;
  });
  unitFilterHtml += `</div>`;

  const filtered = getFilteredDrillQ();
  const unitLabel = drillFilter.unit==='all' ? `全${DRILL_Q.length}問` : `${filtered.length}問`;
  const unitName = drillFilter.unit==='all' ? '全単元' : UNIT_MAP[drillFilter.unit]?.name || '';

  document.getElementById('drill-body').innerHTML = `
    <div style="max-width:680px;margin:0 auto">
      ${statsHtml}
      ${unitFilterHtml}
      <div style="background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:20px;text-align:center">
        <div style="font-size:36px;margin-bottom:10px">🎯</div>
        <div style="font-size:17px;font-weight:900;margin-bottom:4px">${unitName}</div>
        <div style="color:var(--t2);font-size:12px;margin-bottom:20px">${unitLabel}の択一ドリル</div>
        <button class="drill-btn primary" onclick="startDrill()" style="font-size:14px;padding:12px 36px">ドリル開始 ›</button>
      </div>
    </div>`;
}

function setDrillUnit(uid, el) {
  drillFilter.unit = uid;
  renderDrillHome();
}

function resetAllDrill() {
  if(!confirm('全単元の記録をリセットしますか？')) return;
  ST.drill.unitResults = {};
  try { localStorage.removeItem('cma_drill'); } catch(e){}
  renderDrillHome();
}

function startDrill() {
  drillFilter.activeQ = getFilteredDrillQ().slice(); // copy
  // shuffle
  for(let i=drillFilter.activeQ.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [drillFilter.activeQ[i],drillFilter.activeQ[j]]=[drillFilter.activeQ[j],drillFilter.activeQ[i]];
  }
  ST.drill.active = true;
  ST.drill.idx = 0;
  ST.drill.results = [];
  ST.drill.answered = null;
  saveDrill();
  renderDrillQ();
}

function renderDrillQ() {
  const activeQ = drillFilter.activeQ;
  const q = activeQ[ST.drill.idx];
  if(!q) { renderDrillScore(); return; }
  const ch = CH_MAP[UNIT_MAP[q.unit]?.ch];
  const unitName = UNIT_MAP[q.unit]?.name || q.unit;
  const total = activeQ.length;

  // Progress dots (max 30 shown)
  const showDots = total <= 30;
  let progHtml = '';
  if(showDots) {
    progHtml = `<div class="drill-progress-row">${activeQ.map((_,i)=>{
      let cls = i<ST.drill.idx ? (ST.drill.results[i]?'done':'wrong') : i===ST.drill.idx?'curr':'';
      return `<div class="dp-dot ${cls}"></div>`;
    }).join('')}</div>`;
  } else {
    const pct = Math.round(100*ST.drill.idx/total);
    progHtml = `<div style="margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--t3);margin-bottom:4px">
        <span>Q${ST.drill.idx+1}/${total}</span>
        <span>${pct}%</span>
      </div>
      <div style="height:4px;background:var(--border2);border-radius:2px">
        <div style="height:4px;background:linear-gradient(90deg,var(--acc),var(--cyan));border-radius:2px;width:${pct}%;transition:width .3s"></div>
      </div>
    </div>`;
  }

  document.getElementById('drill-body').innerHTML = `
    <div class="drill-card" style="max-width:680px;margin:0 auto">
      ${progHtml}
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
        <div style="font-size:10px;font-weight:700;color:var(--t3)">Q${ST.drill.idx+1}/${total}</div>
        <div class="drill-unit-badge" style="background:${ch?.color||'var(--acc)'}22;border-color:${ch?.color||'var(--acc)'}44;color:${ch?.color||'var(--acc3)'}">
          ${unitName.replace(/^\d-\d\s/,'')}
        </div>
      </div>
      <div class="drill-q">${esc(q.q)}</div>
      <div class="drill-choices" id="drill-choices">
        ${q.choices.map((c,i)=>`
          <div class="drill-choice" id="dc-${i}" onclick="answerDrill(${i})">
            <div class="dc-key">${'ABCD'[i]}</div>
            <div class="dc-text">${esc(c.t)}</div>
          </div>`).join('')}
      </div>
      <div class="drill-exp" id="drill-exp">
        <div class="drill-exp-label">解説</div>
        <div id="drill-exp-text" style="white-space:pre-wrap"></div>
      </div>
      <div class="drill-actions">
        <button class="drill-btn ghost" onclick="stopDrill()">終了</button>
        <button class="drill-btn primary" id="drill-next" onclick="nextDrill()" style="display:none">次の問題 ›</button>
      </div>
    </div>`;
}

function answerDrill(ci) {
  if(ST.drill.answered !== null) return;
  const q = drillFilter.activeQ[ST.drill.idx];
  const ok = q.choices[ci].ok;
  ST.drill.answered = ci;
  ST.drill.results.push(ok);
  // Track per-unit results
  if(!ST.drill.unitResults) ST.drill.unitResults = {};
  if(!ST.drill.unitResults[q.unit]) ST.drill.unitResults[q.unit] = {done:0, correct:0};
  ST.drill.unitResults[q.unit].done++;
  if(ok) ST.drill.unitResults[q.unit].correct++;
  saveDrill();

  q.choices.forEach((_,i)=>{
    const el = document.getElementById('dc-'+i);
    el.classList.add('locked');
    if(q.choices[i].ok) el.classList.add('correct');
    else if(i===ci&&!ok) el.classList.add('wrong');
  });
  document.getElementById('drill-exp-text').textContent = q.exp;
  document.getElementById('drill-exp').classList.add('show');
  document.getElementById('drill-next').style.display='';
}

function nextDrill() {
  ST.drill.idx++;
  ST.drill.answered = null;
  if(ST.drill.idx >= drillFilter.activeQ.length) renderDrillScore();
  else renderDrillQ();
}

function stopDrill() {
  ST.drill.active = false;
  renderDrillHome();
}

function renderDrillScore() {
  ST.drill.active = false;
  const correct = ST.drill.results.filter(r=>r).length;
  const total = drillFilter.activeQ.length;
  const wrong = total - correct;
  const pct = Math.round(100*correct/total);
  const msg = pct>=90?'🏆 完璧！合格確実':pct>=70?'🌟 優秀！あと少し！':pct>=50?'💪 もう一歩！苦手を復習':' 📚 基礎から復習しよう';
  const unitLabel = drillFilter.unit==='all'?'全単元':(UNIT_MAP[drillFilter.unit]?.name||'');

  // Per-unit breakdown for this session
  const sessionByUnit = {};
  drillFilter.activeQ.forEach((q,i)=>{
    if(!sessionByUnit[q.unit]) sessionByUnit[q.unit]={done:0,correct:0};
    sessionByUnit[q.unit].done++;
    if(ST.drill.results[i]) sessionByUnit[q.unit].correct++;
  });
  let breakdownHtml = '';
  if(drillFilter.unit==='all') {
    const rows = Object.entries(sessionByUnit).map(([uid,r])=>{
      const p = Math.round(100*r.correct/r.done);
      const bar = `<div style="height:3px;background:var(--border2);border-radius:2px;margin-top:3px"><div style="height:3px;background:${p>=70?'var(--green)':'var(--acc)'};border-radius:2px;width:${p}%"></div></div>`;
      return `<div style="background:var(--s2);border-radius:8px;padding:8px 10px;font-size:11px">
        <div style="display:flex;justify-content:space-between;margin-bottom:2px">
          <span style="color:var(--t2)">${UNIT_MAP[uid]?.name?.replace(/^\d-\d\s/,'')||uid}</span>
          <span style="font-weight:700;color:${p>=70?'var(--green)':'var(--t1)'}">${r.correct}/${r.done}</span>
        </div>${bar}</div>`;
    }).join('');
    breakdownHtml = `<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:20px;text-align:left">${rows}</div>`;
  }

  document.getElementById('drill-body').innerHTML = `
    <div class="drill-card score-card" style="max-width:680px;margin:0 auto">
      <div style="font-size:12px;color:var(--t2);margin-bottom:8px">${unitLabel}</div>
      <div class="score-num">${pct}%</div>
      <div class="score-sub">${correct} / ${total} 問正解</div>
      <div class="score-msg">${msg}</div>
      <div class="score-detail" style="margin-bottom:20px">
        <div class="score-detail-item"><div class="score-detail-n" style="color:var(--green)">${correct}</div><div class="score-detail-l">正解</div></div>
        <div class="score-detail-item"><div class="score-detail-n" style="color:var(--red)">${wrong}</div><div class="score-detail-l">不正解</div></div>
      </div>
      ${breakdownHtml}
      <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
        <button class="drill-btn primary" onclick="startDrill()" style="font-size:14px;padding:12px 28px">もう一度</button>
        <button class="drill-btn ghost" onclick="stopDrill()" style="font-size:14px;padding:12px 20px">単元選択に戻る</button>
      </div>
    </div>`;
}

// ════════════════════════════════════════════════════════════
// PAST QUIZ
// ════════════════════════════════════════════════════════════
function renderPastQuiz() {
  // Build filter row: year + unit
  const filterRow = document.getElementById('pq-filter-row');
  filterRow.innerHTML = `
    <div style="display:flex;flex-wrap:wrap;gap:6px;width:100%">
      <div style="display:flex;gap:5px;flex-wrap:wrap">
        ${['all','2025','2024','2023'].map(y=>`
          <div class="df-btn${ST.pqFilter===y?' on':''}" onclick="setPqFilter('${y}',this)">${y==='all'?'全年度':y+'年'}</div>
        `).join('')}
      </div>
      <div style="display:flex;gap:5px;flex-wrap:wrap">
        <div class="df-btn${ST.pqUnit==='all'?' on':''}" onclick="setPqUnit('all',this)" style="font-size:10px">全単元</div>
        ${UNITS.map(u=>{
          const ch = CH_MAP[u.ch];
          const cnt = PAST_Q.filter(q=>q.unit===u.id).length;
          if(!cnt) return '';
          return `<div class="df-btn${ST.pqUnit===u.id?' on':''}" onclick="setPqUnit('${u.id}',this)" style="font-size:10px;padding:4px 9px">${u.name.replace(/^\d-\d\s/,'')}（${cnt}）</div>`;
        }).join('')}
      </div>
    </div>`;

  let qs = PAST_Q;
  if(ST.pqFilter !== 'all') qs = qs.filter(q=>q.year===ST.pqFilter);
  if(ST.pqUnit !== 'all') qs = qs.filter(q=>q.unit===ST.pqUnit);

  let html = `<div style="font-size:12px;color:var(--t2);margin-bottom:12px">${qs.length}問を表示中</div>`;
  qs.forEach((q,qi)=> html += buildPqCard(q, qi));
  document.getElementById('pq-body').innerHTML = html || `<div class="empty"><div class="empty-icon">📭</div><div class="empty-msg">該当する問題がありません</div></div>`;
}

function setPqFilter(y, el) {
  ST.pqFilter = y;
  renderPastQuiz();
}

function setPqUnit(uid, el) {
  ST.pqUnit = uid;
  renderPastQuiz();
}

function buildPqCard(q, qi) {
  const ch = CH_MAP[UNIT_MAP[q.unit]?.ch];
  const unitName = UNIT_MAP[q.unit]?.name || q.unit;
  const kpsHtml = (q.kps||[]).map(k=>`<div class="pq-kp-item"><div class="pq-kp-dot"></div><div>${esc(k)}</div></div>`).join('');
  const cmsHtml = (q.cms||[]).map(m=>`<div class="pq-miss-item"><div class="pq-miss-dot"></div><div>${esc(m)}</div></div>`).join('');
  const summaryHtml = q.summary ? `<div style="background:var(--s2);border-radius:8px;border-left:3px solid var(--cyan);padding:10px 12px;margin-bottom:10px;font-size:12px;line-height:1.7;color:var(--t2)">${esc(q.summary)}</div>` : '';

  return `<div class="pq-card">
    <div class="pq-card-hd">
      <div class="pq-year-badge" style="background:linear-gradient(135deg,${ch?.color||'var(--acc)'},${ch?.color||'var(--acc)'}99)">${q.year.slice(2)}<br>${q.session}</div>
      <div class="pq-meta">
        <div class="pq-topic">${q.year}年 ${q.session}試験 第${q.qnum}問</div>
        <div style="font-size:11px;color:${ch?.color||'var(--acc3)'};font-weight:700;margin-bottom:3px">${unitName}</div>
        <div style="font-size:11.5px;color:var(--t2);margin-bottom:4px;line-height:1.4">${esc(q.topic)}</div>
        <div class="pq-tags">${(q.tags||[]).map(t=>`<span class="pq-tag">${t}</span>`).join('')}</div>
      </div>
      <div class="pq-pts">${q.pts}点</div>
    </div>
    <div class="pq-card-body">
      ${summaryHtml}
      <div class="pq-answer-btn" id="pqbtn-${qi}" onclick="revealPq(${qi})">
        ▼ 解答・重要ポイントを見る
      </div>
      <div class="pq-answer-content" id="pqcontent-${qi}">
        ${q.ans ? `<div class="pq-answer-label">📝 公式解答（抜粋）</div>
        <div class="pq-answer-text">${esc(q.ans)}</div>` : ''}
        <div class="pq-points-row">
          ${kpsHtml ? `<div class="pq-kp-box">
            <div class="pq-kp-label">🔑 重要ポイント</div>
            ${kpsHtml}
          </div>` : ''}
          ${cmsHtml ? `<div class="pq-miss-box">
            <div class="pq-miss-label">⚠️ よくある間違い</div>
            ${cmsHtml}
          </div>` : ''}
        </div>
      </div>
    </div>
  </div>`;
}

function revealPq(qi) {
  const btn = document.getElementById('pqbtn-'+qi);
  const content = document.getElementById('pqcontent-'+qi);
  if(!btn || !content) return;
  btn.classList.add('revealed');
  btn.textContent = '✓ 解答を表示中';
  content.classList.add('show');
  btn.onclick = null;
}

// ════════════════════════════════════════════════════════════
// SEARCH
// ════════════════════════════════════════════════════════════
let searchTimer = null;
function onSearch(val) {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(()=>doSearch(val.trim()), 280);
}

function doSearch(q) {
  ST.search = q;
  if(!q) {
    showPage(ST.tab==='search'?'theory':ST.tab);
    return;
  }
  const lq = q.toLowerCase();
  const hits = CONCEPTS.filter(c=>
    c.name.toLowerCase().includes(lq)||
    (c.intuition||'').toLowerCase().includes(lq)||
    (c.formula||'').toLowerCase().includes(lq)||
    (c.example||'').toLowerCase().includes(lq)||
    (c.warn||'').toLowerCase().includes(lq)||
    (c.tip||'').toLowerCase().includes(lq)
  );

  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-item').forEach(b=>b.classList.remove('on'));
  document.getElementById('tab-search').classList.add('active');

  let html = `<div class="search-result-hd">「${esc(q)}」の検索結果</div>
    <div class="search-result-sub">${hits.length}件のコンセプトが見つかりました</div>`;
  if(!hits.length) {
    html += `<div class="empty"><div class="empty-icon">🔍</div><div class="empty-msg">一致するコンセプトが見つかりませんでした</div></div>`;
  } else {
    hits.forEach(c => html += buildCard(c));
  }
  document.getElementById('search-results-inner').innerHTML = html;
  document.getElementById('content').scrollTop = 0;
}

// ════════════════════════════════════════════════════════════
// UTIL
// ════════════════════════════════════════════════════════════
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

showPage('theory');
</script>
